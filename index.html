<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Infinite Relic - 装備完成版</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
margin:0;
}

#header{
background:#222;
padding:10px;
text-align:center;
font-size:22px;
}

#tabs{
display:flex;
}

.tabbtn{
flex:1;
padding:10px;
font-size:18px;
}

.tab{
display:none;
padding:10px;
}

.active{
display:block;
}

button{
font-size:16px;
margin:2px;
padding:6px;
}

.barbg{
background:#333;
height:16px;
}

.bar{
background:#00e676;
height:100%;
}

.enemy{
background:#ff5252;
}

.exp{
background:#40c4ff;
}

.common{color:white}
.uncommon{color:#00e676}
.rare{color:#00b0ff}
.epic{color:#aa00ff}
.legend{color:#ffd600}

.lock{
color:red;
}

.equipMark{
color:gold;
}

</style>

</head>

<body>

<div id="header">

Infinite Relic

<br>

階層 <span id="floor"></span>

</div>

<div id="tabs">

<button onclick="openTab('battle')" class="tabbtn">戦闘</button>

<button onclick="openTab('equip')" class="tabbtn">装備</button>

<button onclick="openTab('job')" class="tabbtn">ジョブ</button>

</div>


<!-- 戦闘 -->

<div id="battle" class="tab active">

<button onclick="attack()">攻撃</button>

<button onclick="autoToggle()" id="autoBtn">AUTO OFF</button>

<div id="player"></div>

<div class="barbg">
<div id="hpbar" class="bar"></div>
</div>

<div class="barbg">
<div id="expbar" class="bar exp"></div>
</div>

<div id="enemy"></div>

<div class="barbg">
<div id="enemybar" class="bar enemy"></div>
</div>

<input id="moveInput" placeholder="階層">

<button onclick="move()">移動</button>

</div>


<!-- 装備 -->

<div id="equip" class="tab">

装備中

<div id="equipped"></div>

<button onclick="discardAll()">

装備中以外を全て捨てる

</button>

<hr>

所持品

<div id="inventory"></div>

</div>


<!-- ジョブ -->

<div id="job" class="tab">

現在のジョブ

<div id="currentJob"></div>

<hr>

<div id="jobList"></div>

</div>



<script>


////////////////
// セーブ
////////////////

function save(){

localStorage.save=JSON.stringify(game)

}

function load(){

let s=localStorage.save

if(s) game=JSON.parse(s)

}



////////////////
// 初期
////////////////

let rarityList=["common","uncommon","rare","epic","legend"]


let game={

floor:1,

player:{

level:1,
exp:0,
expMax:10,

hp:100,
maxHp:100,

atk:10,
def:5,

job:"戦士",

weapon:null,
armor:null

},

enemy:null,

auto:false,

inventory:[]

}

load()


////////////////
// 装備生成
////////////////

function createItem(){

return{

name:"武器"+rand(1,100),

atk:rand(1,10),

def:rand(0,5),

rarity:rarityList[rand(0,4)],

lock:false

}

}


////////////////
// 敵
////////////////

function spawn(){

game.enemy={

name:"敵"+game.floor,

hp:50+game.floor*10,

maxHp:50+game.floor*10,

atk:5+game.floor*2

}

}



////////////////
// 戦闘
////////////////

function attack(){

game.enemy.hp-=game.player.atk

if(game.enemy.hp<=0){

win()
return

}

game.player.hp-=game.enemy.atk

if(game.player.hp<=0){

game.player.hp=game.player.maxHp

game.floor=1

spawn()

}

update()
save()

}


function win(){

game.floor++

game.player.exp++

if(game.player.exp>=game.player.expMax){

game.player.exp=0
game.player.level++

game.player.maxHp+=10
game.player.atk+=2
game.player.def+=1

}

game.inventory.push(createItem())

spawn()

update()
save()

}



////////////////
// AUTO
////////////////

function autoToggle(){

game.auto=!game.auto

autoBtn.innerText=

game.auto?"AUTO ON":"AUTO OFF"

save()

}


setInterval(()=>{

if(game.auto)attack()

},800)



////////////////
// 装備
////////////////

function equip(i){

let item=game.inventory[i]

game.player.weapon=item

update()
save()

}



function unequip(){

game.player.weapon=null

update()
save()

}



////////////////
// ロック
////////////////

function lockItem(i){

game.inventory[i].lock=

!game.inventory[i].lock

update()
save()

}



////////////////
// 個別破棄
////////////////

function discard(i){

let item=game.inventory[i]

if(item.lock) return

if(item==game.player.weapon) return

game.inventory.splice(i,1)

update()
save()

}



////////////////
// 一括破棄
////////////////

function discardAll(){

game.inventory=

game.inventory.filter(item=>

item.lock ||
item==game.player.weapon

)

update()
save()

}



////////////////
// 移動
////////////////

function move(){

let f=parseInt(moveInput.value)

if(!f)return

game.floor=f

spawn()

update()
save()

}



////////////////
// UI
////////////////

function update(){


floor.innerText=game.floor


player.innerHTML=

"LV "+game.player.level+
"<br>HP "+game.player.hp+"/"+game.player.maxHp+
"<br>ATK "+game.player.atk+
"<br>DEF "+game.player.def



enemy.innerHTML=

game.enemy.name+
"<br>HP "+game.enemy.hp+"/"+game.enemy.maxHp



hpbar.style.width=

(game.player.hp/game.player.maxHp*100)+"%"


enemybar.style.width=

(game.enemy.hp/game.enemy.maxHp*100)+"%"


expbar.style.width=

(game.player.exp/game.player.expMax*100)+"%"



equipped.innerHTML=

"武器:"+

(game.player.weapon?

game.player.weapon.name+

"<button onclick='unequip()'>外す</button>"

:"なし")



inventory.innerHTML=

game.inventory.map((it,i)=>

"<div class='"+it.rarity+"'>"+

(it==game.player.weapon?"E ":"")+

it.name+

" ATK"+it.atk+

(it.lock?" 🔒":"")+

"<button onclick='equip("+i+")'>装備</button>"+

"<button onclick='lockItem("+i+")'>ロック</button>"+

"<button onclick='discard("+i+")'>捨てる</button>"+

"</div>"

).join("")

}



////////////////
// タブ
////////////////

function openTab(id){

document.querySelectorAll(".tab")

.forEach(t=>t.classList.remove("active"))

document.getElementById(id)

.classList.add("active")

}



////////////////
// util
////////////////

function rand(a,b){

return Math.floor(Math.random()*(b-a+1))+a

}



spawn()

update()

</script>

</body>
</html>
