<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Relic</title>

<style>

body{
font-family:sans-serif;
background:#111;
color:white;
margin:0;
}

#top{
background:#222;
padding:10px;
font-size:20px;
text-align:center;
}

#main{
padding:10px;
}

button{
font-size:18px;
margin:4px;
padding:10px;
}

.active{
background:#00aa00;
}

.enemy{
color:#ff6666;
}

.hpbar{
height:14px;
background:red;
}

.hpbg{
background:#333;
}

.expbar{
height:10px;
background:#00ccff;
}

.rarity0{color:white;}
.rarity1{color:#00ff00;}
.rarity2{color:#0099ff;}
.rarity3{color:#cc66ff;}
.rarity4{color:gold;}

</style>
</head>

<body>

<div id="top">
Infinite Relic
</div>

<div id="main">

階層: <span id="floor">1</span><br><br>

<div>

<button onclick="attack()">攻撃</button>

<button onclick="toggleAuto()" id="autoBtn">AUTO OFF</button>

</div>

<br>

<div id="player"></div>

<br>

<div id="enemy"></div>

<br>

<input id="moveInput" placeholder="移動階層">

<button onclick="moveFloor()">移動</button>

<br><br>

<div id="jobs"></div>

<br>

<div id="equip"></div>

<br>

<button onclick="save()">セーブ</button>

<button onclick="load()">ロード</button>

</div>

<script>

//////////////////////
// データ
//////////////////////

let game = {

floor:1,

player:{
level:1,
exp:0,
expMax:10,

hp:100,
maxHp:100,

atk:10,
def:5,

job:"戦士",

weapon:null,
armor:null
},

enemy:null,

auto:false

}

//////////////////////
// ジョブ
//////////////////////

let jobs=[

{
name:"戦士",
desc:"高HP高防御",
bonus:{hp:50,atk:5,def:5}
},

{
name:"魔法使い",
desc:"高攻撃",
bonus:{hp:10,atk:15,def:2}
}

]

//////////////////////
// 装備
//////////////////////

let weapons=[

{name:"錆びた剣",atk:3,rarity:0},

{name:"騎士の剣",atk:7,rarity:1},

{name:"英雄剣",atk:15,rarity:2}

]

let armors=[

{name:"布の服",def:2,rarity:0},

{name:"鎖鎧",def:5,rarity:1},

{name:"聖鎧",def:10,rarity:2}

]

//////////////////////
// 敵生成
//////////////////////

function spawnEnemy(){

let f=game.floor

let hp=20+f*10

let atk=5+f*3

let name="スライム"

if(f>10)name="ゴブリン"

if(f>30)name="オーク"

if(f>50)name="ドラゴン"

game.enemy={
name,
hp,
maxHp:hp,
atk
}

}

//////////////////////
// 戦闘
//////////////////////

function attack(){

if(!game.enemy)return

let dmg=Math.max(1,game.player.atk-game.enemy.atk/2)

game.enemy.hp-=dmg

if(game.enemy.hp<=0){

gainExp()

spawnEnemy()

return
}

enemyAttack()

update()

}

function enemyAttack(){

let dmg=Math.max(1,game.enemy.atk-game.player.def/2)

game.player.hp-=dmg

if(game.player.hp<=0){

game.player.hp=game.player.maxHp

game.floor=1

spawnEnemy()

}

}

//////////////////////
// 経験値
//////////////////////

function gainExp(){

game.player.exp+=5

if(game.player.exp>=game.player.expMax){

game.player.exp=0

game.player.level++

game.player.expMax*=1.2

game.player.maxHp+=10
game.player.atk+=2
game.player.def+=1

}

}

//////////////////////
// AUTO
//////////////////////

function toggleAuto(){

game.auto=!game.auto

document.getElementById("autoBtn").innerText=
game.auto?"AUTO ON":"AUTO OFF"

document.getElementById("autoBtn").className=
game.auto?"active":""

}

setInterval(()=>{

if(game.auto){

attack()

}

},1000)

//////////////////////
// 移動
//////////////////////

function moveFloor(){

let f=parseInt(moveInput.value)

if(!f)return

game.floor=f

spawnEnemy()

update()

}

//////////////////////
// 装備
//////////////////////

function equipWeapon(i){

game.player.weapon=weapons[i]

game.player.atk=10+weapons[i].atk

update()

}

function equipArmor(i){

game.player.armor=armors[i]

game.player.def=5+armors[i].def

update()

}

//////////////////////
// セーブ
//////////////////////

function save(){

localStorage.setItem("save",JSON.stringify(game))

}

function load(){

let s=localStorage.getItem("save")

if(s){

game=JSON.parse(s)

spawnEnemy()

update()

}

}

//////////////////////
// UI
//////////////////////

function update(){

floor.innerText=game.floor

player.innerHTML=`

LV ${game.player.level}<br>

HP ${game.player.hp}/${game.player.maxHp}

<div class="hpbg">

<div class="hpbar"
style="width:${game.player.hp/game.player.maxHp*100}%">
</div>

</div>

EXP ${game.player.exp}/${game.player.expMax}

`

enemy.innerHTML=`

<span class="enemy">

${game.enemy.name}

</span>

HP ${game.enemy.hp}/${game.enemy.maxHp}

<div class="hpbg">

<div class="hpbar"
style="width:${game.enemy.hp/game.enemy.maxHp*100}%">
</div>

</div>

`

jobs.innerHTML=

jobs.map(j=>`

<div>

${j.name}

<button onclick="changeJob('${j.name}')">

変更

</button>

</div>

`).join("")

equip.innerHTML=

weapons.map((w,i)=>

`<div class="rarity${w.rarity}">

${w.name}

<button onclick="equipWeapon(${i})">

装備

</button>

</div>`

).join("")

}

//////////////////////
// ジョブ変更
//////////////////////

function changeJob(name){

let job=jobs.find(j=>j.name==name)

game.player.job=name

game.player.maxHp+=job.bonus.hp

game.player.atk+=job.bonus.atk

game.player.def+=job.bonus.def

update()

}

//////////////////////
// 初期化
//////////////////////

spawnEnemy()

update()

</script>

</body>
</html>
