<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Relic - Ultimate v2</title>
<style>
    :root {
        --bg: #0f0f0f; --card: #1a1a1a; --primary: #00e676; 
        --secondary: #40c4ff; --danger: #ff5252; --text: #eee;
        --rare: #00b0ff; --epic: #aa00ff; --legend: #ffd600;
    }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 20px; }
    #top { background: var(--card); padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #333; }
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
    
    .bar { height: 10px; background: #333; border-radius: 5px; margin: 5px 0; overflow: hidden; }
    .fill { height: 100%; transition: width 0.3s; }
    #hp { background: var(--primary); }
    #exp { background: var(--secondary); }
    #enemyhp { background: var(--danger); }

    .nav { display: flex; flex-wrap: wrap; background: #222; }
    .nav button { flex: 1; padding: 12px; border: none; background: transparent; color: #888; font-weight: bold; }
    .nav button.active { color: var(--secondary); border-bottom: 3px solid var(--secondary); }

    .tab { display: none; padding: 15px; }
    .tab.active { display: block; }

    button { cursor: pointer; border-radius: 5px; border: none; padding: 8px 12px; font-weight: bold; }
    .btn-main { background: var(--primary); color: #000; width: 100%; padding: 15px; font-size: 1.1em; margin-bottom: 8px; }
    .btn-auto { background: #444; color: #fff; width: 100%; }
    .btn-auto.on { background: var(--danger); }

    .item-card { background: #252525; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #555; }
    .legend { border-left-color: var(--legend); box-shadow: 0 0 5px var(--legend); }
    
    #log { height: 100px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.85em; border-radius: 5px; display: flex; flex-direction: column-reverse; }
    .skill-text { color: var(--legend); font-weight: bold; font-style: italic; }
</style>
</head>
<body>

<div id="top">
    <div class="status-grid">
        <div id="p-info"></div>
        <div id="p-stats" style="text-align:right"></div>
    </div>
    HP <div class="bar"><div id="hp" class="fill"></div></div>
    EXP <div class="bar"><div id="exp" class="fill"></div></div>
    <button class="btn-main" onclick="attack()">ATTACK</button>
    <button id="autoBtn" class="btn-auto" onclick="toggleAuto()">AUTO OFF</button>
</div>

<div class="nav">
    <button onclick="showTab('battle', this)" class="active">戦闘</button>
    <button onclick="showTab('equip', this)">装備</button>
    <button onclick="showTab('job', this)">ジョブ</button>
    <button onclick="showTab('other', this)">設定</button>
</div>

<div id="battle" class="tab active">
    <div id="e-name" style="color:var(--danger); font-weight:bold"></div>
    <div class="bar"><div id="enemyhp" class="fill"></div></div>
    <div id="log"></div>
</div>

<div id="equip" class="tab">
    <div style="margin-bottom: 15px;">
        <button onclick="sortInventory('atk')">攻撃順</button>
        <button onclick="sortInventory('def')">防御順</button>
        <button onclick="clearTrash()" style="background:var(--danger)">装備外を破棄</button>
    </div>
    <div id="inventory"></div>
</div>

<div id="job" class="tab">
    <div id="jobList"></div>
</div>

<div id="other" class="tab">
    階層移動: <input type="number" id="floorIn" style="width:50px"> 
    <button onclick="moveFloor()">GO</button>
    <hr>
    <button onclick="resetGame()" style="background:#666">データ初期化</button>
    <p style="font-size: 12px; color: #888;">※このゲームはオートセーブされます</p>
</div>

<script>
let p, e, autoIdx;
const jobs = {
    "剣士": { atk: 1.2, def: 1.1, skill: "連撃", desc: "たまに2回攻撃", proc: 0.3 },
    "ナイト": { atk: 1.0, def: 1.6, skill: "パリィ", desc: "たまにダメージ無効", proc: 0.25 },
    "アサシン": { atk: 1.7, def: 0.8, skill: "急所突き", desc: "たまに3倍ダメージ", proc: 0.2 },
    "魔法使い": { atk: 2.2, def: 0.6, skill: "ドレイン", desc: "与えたダメージ分回復", proc: 0.2 }
};

function init() {
    const saved = localStorage.getItem("IR_Save");
    if (saved) {
        p = JSON.parse(saved);
        // ロード時に欠落しているプロパティを補完
        if(!p.inventory) p.inventory = [];
    } else {
        p = { floor: 1, lv: 1, exp: 0, expMax: 50, hp: 100, maxhp: 100, job: "剣士", inventory: [], weapon: null, armor: null, auto: false };
    }
    spawn();
    refresh();
}

function save() { localStorage.setItem("IR_Save", JSON.stringify(p)); }

function spawn() {
    const f = p.floor;
    const pre = ["飢えた","狂暴な","古の","邪悪な","黄金の"][Math.floor(Math.random()*5)];
    const base = ["スライム","ゴブリン","ミミック","デーモン","ドラゴン"][Math.floor(Math.random()*5)];
    e = { name: pre + base, hp: 40 + f*20, maxhp: 40 + f*20, atk: 5 + f*4, def: 2 + f*3 };
}

function calc() {
    p.maxhp = 80 + p.lv * 20;
    let a = 10 + p.lv * 3, d = 5 + p.lv * 2;
    if (p.weapon) a += p.weapon.atk;
    if (p.armor) d += p.armor.def;
    p.atk = Math.floor(a * jobs[p.job].atk);
    p.def = Math.floor(d * jobs[p.job].def);
}

function attack() {
    let msg = "";
    let dmg = Math.max(1, p.atk - e.def);
    
    // スキル判定
    const jobData = jobs[p.job];
    if (Math.random() < jobData.proc) {
        if (p.job === "剣士") { dmg *= 2; msg = `<span class="skill-text">【${jobData.skill}】2回連続攻撃！</span>`; }
        if (p.job === "アサシン") { dmg *= 3; msg = `<span class="skill-text">【${jobData.skill}】クリティカル！</span>`; }
        if (p.job === "魔法使い") { p.hp = Math.min(p.maxhp, p.hp + dmg); msg = `<span class="skill-text">【${jobData.skill}】体力を吸収！</span>`; }
    }

    e.hp -= dmg;
    addLog(`⚔️ ${dmg}のダメージ！ ${msg}`);

    if (e.hp <= 0) return win();

    // 敵の攻撃
    let edmg = Math.max(1, e.atk - p.def);
    if (p.job === "ナイト" && Math.random() < 0.25) {
        edmg = 0; addLog(`<span class="skill-text">【パリィ】攻撃を弾いた！</span>`);
    } else {
        p.hp -= edmg;
        addLog(`💥 ${edmg}のダメージを受けた`);
    }

    if (p.hp <= 0) {
        p.hp = p.maxhp; p.floor = Math.max(1, p.floor - 1);
        addLog("💀 敗北… 階層が戻った");
        spawn();
        save();
    }
    refresh();
}

function win() {
    addLog(`✨ ${e.name}を倒した！`);
    p.exp += 15 + p.floor;
    p.floor++;
    if (Math.random() < 0.5) drop();
    while (p.exp >= p.expMax) {
        p.lv++; p.exp -= p.expMax; p.expMax = Math.floor(p.expMax * 1.3);
        p.hp = p.maxhp; addLog("🆙 レベルアップ！");
    }
    spawn();
    save(); // オートセーブ
    refresh();
}

function drop() {
    const isWep = Math.random() < 0.5;
    const rarities = ["common","common","uncommon","rare","epic","legend"];
    const rare = rarities[Math.floor(Math.random() * (p.floor > 20 ? 6 : 4))];
    const item = {
        id: Date.now() + Math.random(),
        type: isWep ? "weapon" : "armor",
        name: (isWep ? ["鉄剣","名刀","魔剣"][Math.floor(Math.random()*3)] : ["布服","重鎧","輝鎧"][Math.floor(Math.random()*3)]),
        atk: Math.floor(Math.random() * p.floor * 2) + 2,
        def: Math.floor(Math.random() * p.floor * 2) + 2,
        rarity: rare
    };
    p.inventory.push(item);
    addLog(`🎁 ${item.name}を拾った！`);
}

function toggleEquip(id) {
    const it = p.inventory.find(i => i.id === id);
    if (it.type === "weapon") p.weapon = (p.weapon?.id === id) ? null : it;
    else p.armor = (p.armor?.id === id) ? null : it;
    save();
    refresh();
}

function sortInventory(key) {
    p.inventory.sort((a, b) => b[key] - a[key]);
    refresh();
}

function clearTrash() {
    p.inventory = p.inventory.filter(i => i.id === p.weapon?.id || i.id === p.armor?.id);
    save();
    refresh();
}

function refresh() {
    calc();
    document.getElementById("p-info").innerHTML = `<b>Lv.${p.lv} ${p.job}</b> (F:${p.floor})`;
    document.getElementById("p-stats").innerHTML = `ATK:${p.atk} DEF:${p.def}`;
    document.getElementById("hp").style.width = (p.hp / p.maxhp * 100) + "%";
    document.getElementById("exp").style.width = (p.exp / p.expMax * 100) + "%";
    
    document.getElementById("e-name").innerText = `${e.name} (HP:${e.hp})`;
    document.getElementById("enemyhp").style.width = (e.hp / e.maxhp * 100) + "%";
    
    document.getElementById("autoBtn").innerText = p.auto ? "AUTO ON" : "AUTO OFF";
    document.getElementById("autoBtn").className = p.auto ? "btn-auto on" : "btn-auto";

    document.getElementById("inventory").innerHTML = p.inventory.map(it => {
        const isEq = (p.weapon?.id === it.id || p.armor?.id === it.id);
        return `
            <div class="item-card ${it.rarity}">
                <div><b>${it.name}</b> ${isEq?'[装備中]':''}<br>
                <small>${it.type === 'weapon' ? 'ATK' : 'DEF'}:${it.type === 'weapon' ? it.atk : it.def} (${it.rarity})</small></div>
                <button onclick="toggleEquip(${it.id})" style="background:${isEq?'#666':'#444'}">${isEq?'外す':'装備'}</button>
            </div>
        `;
    }).join("");

    document.getElementById("jobList").innerHTML = Object.keys(jobs).map(j => `
        <div class="item-card">
            <div><b>${j}</b> - ${jobs[j].skill}<br><small>${jobs[j].desc}</small></div>
            <button onclick="p.job='${j}';save();refresh();" ${p.job===j?'disabled':''}>選択</button>
        </div>
    `).join("");
}

function toggleAuto() {
    p.auto = !p.auto;
    if (p.auto) autoIdx = setInterval(attack, 600);
    else clearInterval(autoIdx);
    refresh();
}

function addLog(m) {
    const l = document.getElementById("log");
    l.innerHTML += `<div>${m}</div>`;
    if(l.childNodes.length > 25) l.removeChild(l.firstChild);
}

function showTab(id, btn) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

function moveFloor() {
    p.floor = parseInt(document.getElementById("floorIn").value) || 1;
    spawn(); save(); refresh();
}

function resetGame() { if(confirm("消去しますか？")) { localStorage.clear(); location.reload(); } }

init();
</script>
</body>
</html>
