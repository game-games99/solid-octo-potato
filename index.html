<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Immortal Undead</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
margin:0;
text-align:center;
}

h1{
color:#66ff66;
margin:10px;
}

.tabbar{
display:flex;
}

.tabbar button{
flex:1;
padding:12px;
background:#333;
color:white;
border:none;
}

.panel{
padding:10px;
}

#attack{
font-size:26px;
padding:20px;
width:90%;
background:#e53935;
color:white;
border-radius:10px;
margin:10px;
}

#auto{
font-size:18px;
padding:14px;
width:90%;
background:#1e88e5;
color:white;
border-radius:10px;
}

.item{
border:1px solid #444;
padding:6px;
margin:4px;
font-size:13px;
}

.hpbar{
background:#333;
height:18px;
}

.hpfill{
background:#4caf50;
height:18px;
}

.log{
max-height:150px;
overflow:auto;
font-size:12px;
text-align:left;
}

</style>
</head>

<body>

<h1>Immortal Undead</h1>

<div class="tabbar">

<button onclick="openTab('battle')">戦闘</button>
<button onclick="openTab('inventory')">装備</button>
<button onclick="openTab('skills')">スキル</button>

</div>

<div id="battle" class="panel">

<div id="player"></div>

<div id="enemy"></div>

<div class="hpbar">
<div id="enemyhp" class="hpfill"></div>
</div>

<button id="attack" onclick="fight()">こうげき</button>
<button id="auto" onclick="toggleAuto()">オート戦闘</button>

<div class="log" id="log"></div>

</div>

<div id="inventory" class="panel" style="display:none">

<h3>装備インベントリ</h3>

<div id="items"></div>

</div>

<div id="skills" class="panel" style="display:none">

<h3>スキル</h3>

<div id="skillui"></div>

</div>

<script>

/* ---------- データ ---------- */

let player={
job:"ゾンビ",
baseAtk:10,
baseHp:100,
hp:100,
gearAtk:0,
gearHp:0,
skillPoint:0
}

let inventory=[]

let skills={
atk:0,
hp:0,
loot:0,
crit:0
}

let worldLevel=1
let enemy={}
let auto=false

/* ---------- 配列 ---------- */

const ranks=[
{name:"ノーマル",mult:1,color:"white"},
{name:"強敵",mult:2,color:"cyan"},
{name:"エリート",mult:5,color:"violet"},
{name:"ボス",mult:12,color:"orange"},
{name:"災厄",mult:40,color:"red"}
]

const adjectives=[
"狂気の","呪われた","古代の","闇の","混沌の","深淵の"
]

const jobs=[
"村人","騎士","魔法使い","忍者","盗賊","勇者",
"炎戦士","氷魔導士","雷騎士","闇召喚士"
]

const gearPrefix=[
"壊れた","鉄の","古代の","闇の","聖なる","伝説の"
]

const gearType=[
"剣","斧","鎧","兜","指輪","弓"
]

const gearSuffix=[
"力","生命","炎","氷","雷","混沌"
]

/* ---------- タブ ---------- */

function openTab(id){

document.getElementById("battle").style.display="none"
document.getElementById("inventory").style.display="none"
document.getElementById("skills").style.display="none"

document.getElementById(id).style.display="block"

}

/* ---------- ステ ---------- */

function playerAtk(){
return player.baseAtk+player.gearAtk+skills.atk*3
}

function playerHp(){
return player.baseHp+player.gearHp+skills.hp*30
}

/* ---------- 敵 ---------- */

function nextEnemy(){

let rank=ranks[Math.floor(Math.random()*ranks.length)]

enemy={
name:rank.name+" "+rand(adjectives)+" "+rand(jobs),
rank:rank,
hp:Math.floor((50+playerAtk()*2)*(1+worldLevel*0.05)*rank.mult),
atk:Math.floor((8+playerHp()*0.05)*(1+worldLevel*0.03)*rank.mult)
}

enemy.maxHp=enemy.hp

if(Math.random()<0.02){

enemy.name="★伝説★ "+enemy.name
enemy.hp*=3
enemy.atk*=3

log("伝説の敵出現！")

}

draw()

}

function rand(a){
return a[Math.floor(Math.random()*a.length)]
}

/* ---------- 戦闘 ---------- */

function fight(){

enemy.hp-=playerAtk()
player.hp-=enemy.atk

if(enemy.hp<=0){
victory()
return
}

if(player.hp<=0){
death()
return
}

draw()

}

function victory(){

log("敵撃破")

player.skillPoint++

dropGear()

player.hp=playerHp()

worldLevel++

nextEnemy()

}

function death(){

log("死亡")

player.baseAtk+=3
player.baseHp+=10

player.hp=playerHp()

worldLevel++

nextEnemy()

}

/* ---------- 装備 ---------- */

function dropGear(){

let item={
name:rand(gearPrefix)+rand(gearType)+"の"+rand(gearSuffix),
atk:Math.floor(Math.random()*8)+1,
hp:Math.floor(Math.random()*20)+5
}

inventory.push(item)

log("装備獲得："+item.name)

drawInventory()

}

function equip(i){

let item=inventory[i]

player.gearAtk+=item.atk
player.gearHp+=item.hp

inventory.splice(i,1)

drawInventory()

draw()

}

/* ---------- インベントリUI ---------- */

function drawInventory(){

let html=""

inventory.forEach((item,i)=>{

html+=`
<div class="item">

${item.name}<br>
ATK+${item.atk} HP+${item.hp}<br>

<button onclick="equip(${i})">装備</button>

</div>
`

})

document.getElementById("items").innerHTML=html

}

/* ---------- オート ---------- */

function toggleAuto(){

auto=!auto

log("オート："+auto)

}

setInterval(()=>{

if(auto){
fight()
}

},600)

/* ---------- スキルUI ---------- */

function drawSkills(){

document.getElementById("skillui").innerHTML=`

攻撃 ${skills.atk}
<button onclick="up('atk')">+</button><br>

HP ${skills.hp}
<button onclick="up('hp')">+</button><br>

ドロップ ${skills.loot}
<button onclick="up('loot')">+</button><br>

回避 ${skills.crit}
<button onclick="up('crit')">+</button><br>

SP ${player.skillPoint}

`

}

function up(s){

if(player.skillPoint<=0)return

skills[s]++

player.skillPoint--

drawSkills()

}

/* ---------- UI ---------- */

function draw(){

document.getElementById("player").innerHTML=`

職業 ${player.job}<br>
HP ${player.hp}/${playerHp()}<br>
攻撃 ${playerAtk()}<br>
装備ATK ${player.gearAtk}<br>
装備HP ${player.gearHp}<br>
世界Lv ${worldLevel}

`

document.getElementById("enemy").innerHTML=`
<span style="color:${enemy.rank.color}">
${enemy.name}
</span><br>

HP ${enemy.hp}/${enemy.maxHp}<br>
攻撃 ${enemy.atk}
`

document.getElementById("enemyhp").style.width=
(enemy.hp/enemy.maxHp*100)+"%"

drawSkills()

}

/* ---------- ログ ---------- */

function log(t){

let l=document.getElementById("log")

l.innerHTML=t+"<br>"+l.innerHTML

}

/* ---------- セーブ ---------- */

function save(){

localStorage.setItem("immortalSave",
JSON.stringify({player,inventory,skills,worldLevel})
)

}

function load(){

let s=localStorage.getItem("immortalSave")

if(s){

let d=JSON.parse(s)

player=d.player
inventory=d.inventory
skills=d.skills
worldLevel=d.worldLevel

}

}

setInterval(save,3000)

/* ---------- 起動 ---------- */

load()

nextEnemy()

drawInventory()

</script>

</body>
</html>
