<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NecroRise</title>
<style>
body { font-family: sans-serif; background: #111; color: #eee; text-align: center; }
#game { max-width: 500px; margin: 20px auto; }
button { padding: 10px 20px; font-size: 18px; margin-top: 10px; }
.status, .enemy-status { margin: 10px 0; }
</style>
</head>
<body>
<div id="game">
<h1>NecroRise</h1>

<div class="status">
  <div>HP: <span id="playerHP"></span></div>
  <div>ATK: <span id="playerATK"></span></div>
  <div>装備ATK: <span id="gearATK"></span></div>
  <div>装備HP: <span id="gearHP"></span></div>
  <div>死亡回数: <span id="deathCount"></span></div>
  <div>現在階: <span id="currentFloor"></span>/30</div>
  <div>ダンジョン: <span id="dungeonType"></span></div>
</div>

<div class="enemy-status">
  <div>敵: <span id="enemyName"></span></div>
  <div>HP: <span id="enemyHP"></span></div>
  <div>ATK: <span id="enemyATK"></span></div>
</div>

<button id="attackBtn">こうげき</button>
<div id="log"></div>
</div>

<script>
// プレイヤー
let player = {
  baseATK: 10,
  baseHP: 100,
  gearATK: 0,
  gearHP: 0,
  deathCount: 0,
  worldLevel: 1,
  currentHP: 100
};

// ダンジョン
let dungeonTypes = ["村", "街", "砦", "城"];
let dungeon = { type: "", floor: 1, level: 1, maxFloors: 30, enemy: null };

// 形容詞と職業200種ランダム生成
let adjectives = ["狂気の","闇の","深淵の","虚無の","混沌の","影の"];
let professions = [];
for(let i=1;i<=200;i++){ professions.push("職業"+i); }

// 拠点ボーナス
let dungeonBonuses = {
  "村": {HP: 40},
  "街": {HPMultiplier: 0.05},
  "砦": {ATK: 8},
  "城": {ATKMultiplier: 0.05}
};

// 装備ランダム生成関数（24000パターン対応）
function generateEquipment() {
  // ATK 1~20, HP 5~50 の範囲でランダム
  let atk = Math.floor(Math.random()*20)+1;
  let hp = Math.floor(Math.random()*46)+5;
  return {ATK: atk, HP: hp};
}

// UI更新
function updateUI() {
  document.getElementById("playerHP").innerText = player.currentHP;
  document.getElementById("playerATK").innerText = player.baseATK;
  document.getElementById("gearATK").innerText = player.gearATK;
  document.getElementById("gearHP").innerText = player.gearHP;
  document.getElementById("deathCount").innerText = player.deathCount;
  document.getElementById("currentFloor").innerText = dungeon.floor;
  document.getElementById("dungeonType").innerText = dungeon.type;
  document.getElementById("enemyName").innerText = dungeon.enemy.name;
  document.getElementById("enemyHP").innerText = dungeon.enemy.currentHP;
  document.getElementById("enemyATK").innerText = dungeon.enemy.ATK;
}

// 敵生成
function generateEnemy() {
  let adj = adjectives[Math.floor(Math.random()*adjectives.length)];
  let prof = professions[Math.floor(Math.random()*professions.length)];
  let rankMult = 1 + Math.floor(Math.random()*3);
  let name = adj + prof;
  let baseHP = 20 + dungeon.floor*5 + player.baseATK*2;
  let baseATK = 5 + dungeon.floor*2 + player.baseHP*0.05;
  return {name: name, HP: baseHP, currentHP: baseHP, ATK: baseATK, rankMult: rankMult};
}

// ダンジョン生成
function generateDungeon() {
  dungeon.type = dungeonTypes[Math.floor(Math.random()*dungeonTypes.length)];
  dungeon.floor = 1;
  dungeon.level = player.worldLevel;
  dungeon.enemy = generateEnemy();
  player.currentHP = player.baseHP + player.gearHP;
  log("新しいダンジョン ("+dungeon.type+") が生成されました！");
}

// 戦闘処理
function attackEnemy() {
  let playerDamage = player.baseATK + player.gearATK;
  dungeon.enemy.currentHP -= playerDamage;
  log("プレイヤーの攻撃: " + playerDamage);
  if(dungeon.enemy.currentHP <= 0) {
    log("敵を倒した！");
    let eq = generateEquipment();
    player.gearATK += eq.ATK;
    player.gearHP += eq.HP;
    log("装備獲得: ATK+"+eq.ATK+" HP+"+eq.HP);
    if(dungeon.floor === dungeon.maxFloors) {
      conquerDungeon();
    } else {
      dungeon.floor++;
      dungeon.enemy = generateEnemy();
      log("次の階層に進む...");
    }
  } else {
    player.currentHP -= dungeon.enemy.ATK;
    log("敵の攻撃: " + dungeon.enemy.ATK);
    if(player.currentHP <= 0) { playerDies(); }
  }
  updateUI();
}

// 拠点占領
function conquerDungeon() {
  log("ダンジョン制覇！拠点ボーナス獲得！");
  let bonus = dungeonBonuses[dungeon.type];
  if(bonus.HP) player.baseHP += bonus.HP;
  if(bonus.HPMultiplier) player.baseHP += player.baseHP*bonus.HPMultiplier;
  if(bonus.ATK) player.baseATK += bonus.ATK;
  if(bonus.ATKMultiplier) player.baseATK += player.baseATK*bonus.ATKMultiplier;
  generateDungeon();
}

// 死亡処理
function playerDies() {
  player.deathCount++;
  log("プレイヤーは死亡...");
  generateDungeon();
}

// ログ表示
function log(msg) {
  let logDiv = document.getElementById("log");
  logDiv.innerHTML = msg + "<br>" + logDiv.innerHTML;
}

// 初期化
generateDungeon();
updateUI();
document.getElementById("attackBtn").addEventListener("click", attackEnemy);
</script>
</body>
</html>
