<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Infinite Relic - Fixed Edition</title>
<style>
    :root {
        --bg: #0d0d0d; --card: #1a1a1a; --primary: #00e676; 
        --secondary: #40c4ff; --danger: #ff5252; --text: #eee;
        --common: #9e9e9e; --uncommon: #4caf50; --rare: #2196f3; 
        --epic: #9c27b0; --legend: #ffc107; --boss: #ff1744;
    }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; user-select: none; }
    
    /* UI Overlap Fix */
    #control-panel { background: #000; padding: 10px; border-bottom: 1px solid #333; font-size: 0.8em; }
    .ctrl-row { display: flex; gap: 15px; align-items: center; margin-bottom: 5px; }

    #top { background: var(--card); padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #333; }
    .status-row { display: flex; justify-content: space-between; font-size: 0.85em; margin-bottom: 5px; color: var(--secondary); }
    .bar { height: 8px; background: #333; border-radius: 4px; margin: 4px 0; overflow: hidden; }
    .fill { height: 100%; transition: width 0.15s; }
    #hp { background: var(--primary); }
    #exp { background: var(--secondary); }
    #jobexp { background: #ff4081; }

    .nav { display: flex; background: #222; }
    .nav button { flex: 1; padding: 12px; border: none; background: transparent; color: #888; }
    .nav button.active { color: var(--secondary); border-bottom: 3px solid var(--secondary); }

    .tab { display: none; padding: 15px; }
    .tab.active { display: block; }

    .item-card { background: #222; padding: 10px; margin-bottom: 8px; border-radius: 8px; border-left: 5px solid; }
    .item-card.common { border-color: var(--common); }
    .item-card.uncommon { border-color: var(--uncommon); }
    .item-card.rare { border-color: var(--rare); }
    .item-card.epic { border-color: var(--epic); }
    .item-card.legend { border-color: var(--legend); box-shadow: 0 0 8px rgba(255,193,7,0.4); }

    .btn-main { width:100%; padding:15px; background:var(--primary); font-weight:bold; border-radius:8px; border:none; color:#000; font-size: 1.2em; margin-bottom: 8px; }
    #log { height: 130px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.75em; border-radius: 5px; display: flex; flex-direction: column-reverse; }

    .btn-action { padding: 6px 12px; border-radius: 4px; border: none; background: #444; color: #fff; font-size: 0.8em; }
    .btn-danger { background: var(--danger); }
</style>
</head>
<body>

<div id="control-panel">
    <div class="ctrl-row">
        <label><input type="checkbox" id="checkAuto" onchange="toggleAuto(this.checked)"> オート探索</label>
        <label><input type="checkbox" id="checkStay" onchange="toggleStay(this.checked)"> 階層維持</label>
    </div>
    <div class="ctrl-row">
        拾う最低レア: 
        <select id="lootFilter" onchange="p.lootFilter = this.value; save();">
            <option value="common">全部</option>
            <option value="uncommon">UC以上</option>
            <option value="rare">Rare以上</option>
            <option value="epic">Epic以上</option>
            <option value="legend">Legendのみ</option>
        </select>
    </div>
</div>

<div id="top">
    <div class="status-row">
        <span id="p-main-info">Lv.1 (1F)</span>
        <span id="p-job-info">剣士 Lv.1</span>
    </div>
    <div style="font-size:0.75em; margin-bottom:4px;">
        <span id="p-stats">⚔️0 🛡️0</span> | <span id="p-crit">🎯5%</span>
    </div>
    HP <div class="bar"><div id="hp" class="fill"></div></div>
    EXP <div class="bar"><div id="exp" class="fill"></div></div>
    JOB <div class="bar"><div id="jobexp" class="fill"></div></div>
    <button class="btn-main" id="attackBtn">ATTACK</button>
</div>

<div class="nav">
    <button onclick="showTab('battle', this)" class="active">戦闘</button>
    <button onclick="showTab('equip', this)">装備</button>
    <button onclick="showTab('job', this)">職業</button>
    <button onclick="showTab('move', this)">移動</button>
</div>

<div id="battle" class="tab active">
    <div id="e-name" style="font-weight:bold; margin-bottom:5px;"></div>
    <div class="bar" style="height:12px;"><div id="enemyhp" class="fill" style="background:var(--danger)"></div></div>
    <div id="log"></div>
</div>

<div id="equip" class="tab">
    <div style="display:flex; gap:5px; margin-bottom:10px;">
        <button class="btn-action" onclick="setEquipTab('weapon')" style="flex:1">武器</button>
        <button class="btn-action" onclick="setEquipTab('armor')" style="flex:1">防具</button>
        <button class="btn-action" onclick="setEquipTab('acc')" style="flex:1">装飾</button>
    </div>
    <button class="btn-action btn-danger" onclick="bulkDelete()" style="width:100%; margin-bottom:10px;">表示中の全装備を売却（Epic含む/Legend除外）</button>
    <div id="inventory"></div>
</div>

<div id="job" class="tab"><div id="jobList"></div></div>

<div id="move" class="tab">
    最高到達: <span id="maxFloorDisp">1</span>F
    <input type="range" id="floorRange" min="1" style="width:100%; margin: 20px 0;" oninput="updateFloorVal(this.value)">
    <div id="floorVal" style="text-align:center; font-size:2em; font-weight: bold; color: var(--secondary);">1</div>
    <button class="btn-main" onclick="moveFloor()" style="background:var(--secondary)">移動実行</button>
    
    <div style="margin-top:20px; border-top:1px solid #333; padding-top:10px;">
        <textarea id="saveInput" style="width:100%; background:#000; color:#0f0; font-size:0.6em;" rows="3"></textarea>
        <button class="btn-action" onclick="copySaveCode()" style="width:48%">コピー</button>
        <button class="btn-action" onclick="importSave()" style="width:48%">復元</button>
    </div>
</div>

<script>
let p, e, autoIdx;
let currentEquipTab = 'weapon';
const SAVE_KEY = "IR_FIXED_V7";
const RARE_LEVELS = { "common": 0, "uncommon": 1, "rare": 2, "epic": 3, "legend": 4 };

// モンスター二つ名
const enemyPre = ["凶暴な", "飢えた", "深淵の", "呪われた", "光る", "名もなき", "古の", "汚染された"];
const enemyName = ["スライム", "ゴブリン", "オーク", "スケルトン", "ドラゴン", "魔導士", "ゴーレム", "影"];

const itemPre = [{n:"壊れた", m:0.6, c:0}, {n:"普通の", m:1.0, c:2}, {n:"鋭い", m:1.3, c:10}, {n:"伝説の", m:2.5, c:20}];

const jobData = {
    "剣士": { req:[], skills:["連撃","構え"]},
    "ナイト": { req:[], skills:["パリィ","反撃"]},
    "魔法使い": { req:[], skills:["ドレイン","魔力"]},
    "暗殺者": { req:[], skills:["急所","毒刃"]},
    "勇者": { req:["剣士","ナイト"], skills:["聖剣","奇跡"]},
    "魔王": { req:["魔法使い","暗殺者"], skills:["終焉","滅尽"]}
};

function init() {
    const saved = localStorage.getItem(SAVE_KEY);
    p = saved ? JSON.parse(saved) : createNewPlayer();
    
    // バグ修正: 全ジョブの経験値・レベルを初期化/補完
    Object.keys(jobData).forEach(j => {
        if(!p.jobLevels[j]) p.jobLevels[j] = 1;
        if(p.jobExp[j] === undefined) p.jobExp[j] = 0;
    });

    document.getElementById("checkAuto").checked = !!p.auto;
    document.getElementById("checkStay").checked = !!p.stay;
    document.getElementById("lootFilter").value = p.lootFilter || "common";
    
    if (p.auto) toggleAuto(true);
    spawn(); refresh();
}

function createNewPlayer() {
    return { floor:1, maxFloor:1, lv:1, exp:0, expMax:40, hp:100, maxhp:100, job:"剣士", inventory:[], weapon:null, armor:null, acc:null, auto:false, stay:false, lootFilter:"common", jobLevels:{}, jobExp:{} };
}

function spawn() {
    const f = p.floor;
    const isBoss = f % 50 === 0;
    const pre = enemyPre[Math.floor(Math.random()*enemyPre.length)];
    const name = enemyName[Math.floor(Math.random()*enemyName.length)];
    const mult = isBoss ? 15 : 1;
    e = { 
        name: (isBoss ? "【守護者】" : "") + pre + name, 
        hp: Math.floor((20+f*15)*mult), maxhp: Math.floor((20+f*15)*mult), 
        atk: Math.floor((2+f*3)*(isBoss?1.8:1)), def: Math.floor((1+f*1.5)*(isBoss?2:1)) 
    };
}

function attack() {
    if (e.hp <= 0) return;
    calc();
    let isCrit = Math.random() < (p.critRate / 100);
    let dmg = Math.max(1, p.atk - e.def) * (0.9 + Math.random()*0.2) * (isCrit ? 2 : 1);

    e.hp -= Math.floor(dmg);
    addLog(`${isCrit?'crit! ':''}⚔️ ${Math.floor(dmg)}`);
    if (e.hp <= 0) return win();

    let edmg = Math.max(1, e.atk - p.def);
    p.hp -= Math.floor(edmg);
    if (p.hp <= 0) { 
        p.hp = p.maxhp; 
        if(!p.stay) p.floor = Math.max(1, p.floor-5); 
        spawn(); 
        addLog("💀敗北...");
    }
    refresh();
}

function win() {
    p.exp += Math.floor(15 + p.floor * 2);
    // ジョブ経験値加算
    p.jobExp[p.job] = (p.jobExp[p.job] || 0) + 20;
    if (p.jobExp[p.job] >= p.jobLevels[p.job]*60) {
        p.jobExp[p.job] = 0;
        p.jobLevels[p.job]++;
        addLog(`<span style="color:var(--secondary)">✨Job Level Up!</span>`);
    }

    if (p.exp >= p.expMax) {
        p.lv++; p.exp = 0; p.expMax = Math.floor(p.expMax*1.2); p.hp = p.maxhp;
        addLog(`<span style="color:var(--primary)">🎉Player Level Up!</span>`);
    }

    if (!p.stay) { p.floor++; if(p.floor > p.maxFloor) p.maxFloor = p.floor; }
    if (Math.random() < 0.3 || (p.floor-1) % 50 === 0) drop();
    spawn(); save(); refresh();
}

function drop() {
    const r = Math.random();
    let rare = "common";
    if (r < 0.03) rare = "legend"; else if (r < 0.1) rare = "epic"; else if (r < 0.25) rare = "rare"; else if (r < 0.5) rare = "uncommon";
    
    // 自動売却チェック
    if (RARE_LEVELS[rare] < RARE_LEVELS[p.lootFilter]) return;

    let type = ["weapon", "armor", "acc"][Math.floor(Math.random()*3)];
    const pre = itemPre[Math.floor(Math.random()*itemPre.length)];
    const rb = 1 + (RARE_LEVELS[rare] * 0.5);
    let item = { id:Date.now()+Math.random(), type, rarity:rare, name:pre.n+(type==="weapon"?"剣":type==="armor"?"鎧":"珠"), atk:0, def:0, hp:0, crit:pre.c };
    
    if (type === "weapon") item.atk = Math.floor(p.floor * 3 * rb * pre.m);
    else if (type === "armor") item.def = Math.floor(p.floor * 2 * rb * pre.m);
    else {
        item.hp = Math.floor(p.floor * 15 * rb);
        item.crit += 5;
    }

    p.inventory.push(item);
    addLog(`<span style="color:var(--${rare})">🎁${item.name}入手</span>`);
}

function calc() {
    p.maxhp = 100 + p.lv * 25;
    let a = 10 + p.lv * 5, d = 5 + p.lv * 3, c = 5;
    [p.weapon, p.armor, p.acc].forEach(i => { if(i){ a+=i.atk; d+=i.def; p.maxhp+=i.hp; c+=i.crit; } });
    p.atk = a; p.def = d; p.critRate = c;
}

function refresh() {
    calc();
    document.getElementById("p-main-info").innerText = `Lv.${p.lv} (${p.floor}F)`;
    document.getElementById("p-job-info").innerText = `${p.job} Lv.${p.jobLevels[p.job]}`;
    document.getElementById("p-stats").innerText = `⚔️${p.atk} 🛡️${p.def}`;
    document.getElementById("p-crit").innerText = `🎯${p.critRate}%`;
    document.getElementById("hp").style.width = (p.hp/p.maxhp*100) + "%";
    document.getElementById("exp").style.width = (p.exp/p.expMax*100) + "%";
    document.getElementById("jobexp").style.width = (p.jobExp[p.job]/(p.jobLevels[p.job]*60)*100) + "%";
    document.getElementById("enemyhp").style.width = (e.hp/e.maxhp*100) + "%";
    document.getElementById("e-name").innerText = e.name;
    document.getElementById("maxFloorDisp").innerText = p.maxFloor;

    document.getElementById("inventory").innerHTML = p.inventory.filter(it => it.type === currentEquipTab).map(it => {
        const isEq = (p.weapon?.id===it.id || p.armor?.id===it.id || p.acc?.id===it.id);
        let s = it.atk?`⚔️${it.atk}`:it.def?`🛡️${it.def}`:`HP${it.hp}`;
        return `<div class="item-card ${it.rarity}">
            <b>${isEq?'[E]':''}${it.name}</b> <small>(${it.rarity})</small><br>
            <small>${s} / 🎯${it.crit}%</small>
            <div style="margin-top:5px; display:flex; gap:5px;">
                <button class="btn-action" onclick="toggleEquip(${it.id})">${isEq?'外す':'装備'}</button>
                <button class="btn-action btn-danger" onclick="deleteItem(${it.id})">売却</button>
            </div>
        </div>`;
    }).join("");

    document.getElementById("jobList").innerHTML = Object.keys(jobData).map(j => {
        let can = jobData[j].req.every(r => (p.jobLevels[r]||0) >= 20);
        return `<div class="item-card" style="opacity:${can?1:0.5}; border-color:${p.job===j?'var(--legend)':'#444'}">
            <b>${j} (Lv.${p.jobLevels[j]})</b><br>
            <button class="btn-action" onclick="p.job='${j}';save();refresh();" ${!can||p.job===j?'disabled':''}>転職</button>
        </div>`;
    }).join("");
}

function bulkDelete() {
    p.inventory = p.inventory.filter(it => it.type !== currentEquipTab || p.weapon?.id===it.id || p.armor?.id===it.id || p.acc?.id===it.id || RARE_LEVELS[it.rarity] >= 4);
    save(); refresh();
}
function deleteItem(id) { p.inventory = p.inventory.filter(i => i.id !== id); save(); refresh(); }
function toggleEquip(id) {
    let it = p.inventory.find(i => i.id === id);
    if(it.type==="weapon") p.weapon = p.weapon?.id===id?null:it;
    else if(it.type==="armor") p.armor = p.armor?.id===id?null:it;
    else p.acc = p.acc?.id===id?null:it;
    save(); refresh();
}
function toggleAuto(v) { 
    p.auto = v; 
    clearInterval(autoIdx);
    if(v) autoIdx = setInterval(attack, 600); 
    save(); 
}
function toggleStay(v) { p.stay = v; save(); }
function setEquipTab(t) { currentEquipTab = t; refresh(); }
function save() { localStorage.setItem(SAVE_KEY, JSON.stringify(p)); }
function copySaveCode() { save(); document.getElementById("saveInput").value = btoa(JSON.stringify(p)); alert("コピー完了"); }
function importSave() { try { p = JSON.parse(atob(document.getElementById("saveInput").value)); save(); location.reload(); } catch(e){ alert("失敗"); } }
function updateFloorVal(v) { document.getElementById("floorVal").innerText = v; }
function moveFloor() { p.floor = parseInt(document.getElementById("floorRange").value); spawn(); save(); refresh(); }
function showTab(id, btn) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}
function addLog(m) {
    const l = document.getElementById("log");
    l.innerHTML += `<div>${m}</div>`;
    if(l.childNodes.length > 20) l.removeChild(l.firstChild);
}

init();
</script>
</body>
</html>
