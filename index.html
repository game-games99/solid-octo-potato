<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NecroRise - Rebirth</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0a; color: #d1d1d1; text-align: center; margin: 0; }
    #game { max-width: 500px; margin: 0 auto; padding: 20px; }
    
    /* タブメニュー */
    .tabs { display: flex; justify-content: center; margin-bottom: 20px; border-bottom: 1px solid #444; }
    .tab-btn { background: none; border: none; color: #888; padding: 10px 20px; cursor: pointer; font-size: 16px; }
    .tab-btn.active { color: #fff; border-bottom: 2px solid #e74c3c; font-weight: bold; }
    
    .tab-content { display: none; min-height: 300px; }
    .tab-content.active { display: block; }

    /* ステータス表示 */
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #1a1a1a; padding: 15px; border-radius: 8px; text-align: left; }
    .status-item { border-bottom: 1px solid #333; padding: 5px 0; }
    .label { color: #888; font-size: 12px; display: block; }
    .value { font-size: 18px; color: #fff; }

    /* エネミーエリア */
    .enemy-area { background: #221111; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #442222; }
    .enemy-name { font-size: 24px; color: #e74c3c; margin-bottom: 10px; }
    
    /* 攻撃ボタン */
    #attackBtn { 
        width: 100%; height: 80px; font-size: 24px; font-weight: bold;
        background: linear-gradient(to bottom, #c0392b, #8e44ad); color: white;
        border: none; border-radius: 10px; cursor: pointer; touch-action: manipulation;
        box-shadow: 0 4px 0 #641e16; transition: 0.1s;
    }
    #attackBtn:active { transform: translateY(4px); box-shadow: none; background: #c0392b; }

    #log { text-align: left; height: 150px; overflow-y: auto; background:#000; padding:10px; border-radius:5px; margin-top:10px; font-size:12px; color: #aaa; }
    .highlight { color: #f1c40f; }
</style>
</head>
<body>

<div id="game">
    <h1>NecroRise</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('battle')">戦闘</button>
        <button class="tab-btn" onclick="showTab('status')">詳細ステータス</button>
    </div>

    <div id="battle" class="tab-content active">
        <div class="enemy-area">
            <div id="dungeonInfo" style="font-size: 14px; color: #888;"></div>
            <div id="enemyName" class="enemy-name">---</div>
            <div>敵HP: <span id="enemyHP" class="value">0</span> / ATK: <span id="enemyATK" class="value">0</span></div>
        </div>

        <div style="margin-bottom: 15px;">
            <span>あなたのHP: <span id="playerHP" style="font-size: 24px; color: #2ecc71;">0</span></span>
        </div>

        <button id="attackBtn">こうげき（長押し可）</button>
    </div>

    <div id="status" class="tab-content">
        <div class="status-grid">
            <div class="status-item"><span class="label">基礎攻撃力</span><span id="pBaseATK" class="value">0</span></div>
            <div class="status-item"><span class="label">装備攻撃力</span><span id="pGearATK" class="value">0</span></div>
            <div class="status-item"><span class="label">基礎HP</span><span id="pBaseHP" class="value">0</span></div>
            <div class="status-item"><span class="label">装備HP</span><span id="pGearHP" class="value">0</span></div>
            <div class="status-item"><span class="label">死亡回数</span><span id="pDeath" class="value">0</span></div>
            <div class="status-item"><span class="label">世界レベル</span><span id="pWorld" class="value">0</span></div>
        </div>
    </div>

    <div id="log"></div>
</div>

<script>
// --- ゲームデータ定義 ---
let player = {
    baseATK: 10,
    baseHP: 100,
    gearATK: 0,
    gearHP: 0,
    deathCount: 0,
    worldLevel: 1,
    currentHP: 100
};

let dungeonTypes = ["村", "街", "砦", "城"];
let dungeon = { type: "", floor: 1, level: 1, maxFloors: 30, enemy: null };
let adjectives = ["狂気の","闇の","深淵の","虚無の","混沌の","影の"];
let professions = Array.from({length: 200}, (_, i) => `職業${i+1}`);

let dungeonBonuses = {
    "村": {HP: 40}, "街": {HPMultiplier: 0.05}, "砦": {ATK: 8}, "城": {ATKMultiplier: 0.05}
};

// --- タブ切り替えロジック ---
function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
}

// --- システム関数 ---
function updateUI() {
    // バトル画面
    document.getElementById("playerHP").innerText = player.currentHP;
    document.getElementById("dungeonInfo").innerText = `${dungeon.type} - ${dungeon.floor}/${dungeon.maxFloors}階`;
    document.getElementById("enemyName").innerText = dungeon.enemy.name;
    document.getElementById("enemyHP").innerText = dungeon.enemy.currentHP;
    document.getElementById("enemyATK").innerText = dungeon.enemy.ATK;

    // 詳細ステータス画面
    document.getElementById("pBaseATK").innerText = player.baseATK;
    document.getElementById("pGearATK").innerText = player.gearATK;
    document.getElementById("pBaseHP").innerText = player.baseHP;
    document.getElementById("pGearHP").innerText = player.gearHP;
    document.getElementById("pDeath").innerText = player.deathCount;
    document.getElementById("pWorld").innerText = player.worldLevel;
}

function log(msg) {
    let logDiv = document.getElementById("log");
    logDiv.innerHTML = `<div>${msg}</div>` + logDiv.innerHTML;
    if (logDiv.children.length > 50) logDiv.lastElementChild.remove();
}

function generateEnemy() {
    let adj = adjectives[Math.floor(Math.random()*adjectives.length)];
    let prof = professions[Math.floor(Math.random()*professions.length)];
    let name = adj + prof;
    let baseHP = 20 + dungeon.floor * 5 + player.baseATK * 2;
    let baseATK = Math.floor(5 + dungeon.floor * 2 + player.baseHP * 0.05);
    return {name: name, HP: baseHP, currentHP: baseHP, ATK: baseATK};
}

function generateDungeon() {
    dungeon.type = dungeonTypes[Math.floor(Math.random()*dungeonTypes.length)];
    dungeon.floor = 1;
    dungeon.enemy = generateEnemy();
    player.currentHP = player.baseHP + player.gearHP;
    log(`<span class="highlight">${dungeon.type}ダンジョンに潜入しました。</span>`);
    updateUI();
}

function attackEnemy() {
    if (player.currentHP <= 0) return;

    let playerDamage = player.baseATK + player.gearATK;
    dungeon.enemy.currentHP -= playerDamage;

    if(dungeon.enemy.currentHP <= 0) {
        log(`敵を撃破: ${dungeon.enemy.name}`);
        // 装備獲得
        let atkPlus = Math.floor(Math.random()*20)+1;
        let hpPlus = Math.floor(Math.random()*46)+5;
        player.gearATK += atkPlus;
        player.gearHP += hpPlus;
        log(`戦利品: ATK+${atkPlus} / HP+${hpPlus}`);

        if(dungeon.floor === dungeon.maxFloors) {
            conquerDungeon();
        } else {
            dungeon.floor++;
            dungeon.enemy = generateEnemy();
        }
    } else {
        // 敵の反撃
        player.currentHP -= dungeon.enemy.ATK;
        if(player.currentHP <= 0) {
            player.currentHP = 0;
            playerDies();
        }
    }
    updateUI();
}

function conquerDungeon() {
    log(`<span class="highlight">ダンジョン制覇！</span>`);
    let bonus = dungeonBonuses[dungeon.type];
    if(bonus.HP) player.baseHP += bonus.HP;
    if(bonus.HPMultiplier) player.baseHP += Math.floor(player.baseHP * bonus.HPMultiplier);
    if(bonus.ATK) player.baseATK += bonus.ATK;
    if(bonus.ATKMultiplier) player.baseATK += Math.floor(player.baseATK * bonus.ATKMultiplier);
    generateDungeon();
}

function playerDies() {
    player.deathCount++;
    log(`<span style="color:red;">敗北... 再起の誓いによって新たなる力を得た。</span>`);
    generateDungeon();
}

// --- 長押し（オート攻撃）の実装 ---
let attackInterval = null;

const startAttack = (e) => {
    e.preventDefault(); // ブラウザのデフォルト動作（選択など）を防ぐ
    if (attackInterval) return;
    attackEnemy(); // 1回目は即実行
    attackInterval = setInterval(attackEnemy, 300); // 300ミリ秒ごとに攻撃
};

const stopAttack = () => {
    clearInterval(attackInterval);
    attackInterval = null;
};

// マウスとタッチの両方に対応
const btn = document.getElementById("attackBtn");
btn.addEventListener("mousedown", startAttack);
btn.addEventListener("mouseup", stopAttack);
btn.addEventListener("mouseleave", stopAttack);
btn.addEventListener("touchstart", startAttack);
btn.addEventListener("touchend", stopAttack);

// --- 初期化 ---
generateDungeon();
</script>

</body>
</html>
