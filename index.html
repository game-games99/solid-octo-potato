<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゾンビアタック</title>

<style>
body{
font-family:sans-serif;
background:#111;
color:#eee;
text-align:center;
}

button{
font-size:18px;
padding:10px 20px;
margin:10px;
}

#enemy{
font-size:24px;
margin:10px;
}

.bar{
width:300px;
height:20px;
background:#333;
margin:auto;
}

.hp{
height:20px;
background:red;
}

</style>
</head>

<body>

<h1>🧟ゾンビアタック</h1>

<div>
街: <span id="town">荒れた村</span><br>
階層: <span id="floor">1</span>/30
</div>

<hr>

<div id="enemy">敵</div>

<div class="bar">
<div id="enemyHP" class="hp"></div>
</div>

HP: <span id="enemyHPtext"></span>

<hr>

<button onclick="attack()">攻撃</button>

<hr>

<h3>プレイヤー</h3>

ATK: <span id="atk"></span><br>
HP: <span id="hp"></span><br>

街占領数: <span id="towns"></span>

<div id="log"></div>

<script>

let player = {

baseATK:10,
baseHP:100,

atk:10,
hp:100,
maxHP:100

}

let townCount = 0
let floor = 1

const townNames = [
"荒れた村",
"霧の町",
"血塗られた城",
"忘れられた都市",
"静寂の聖都"
]

const jobs = [
{name:"村人",mult:1},
{name:"農夫",mult:1.2},
{name:"盗賊",mult:1.5},
{name:"兵士",mult:2},
{name:"騎士",mult:3},
{name:"魔法使い",mult:3},
{name:"勇者",mult:6}
]

const traits = [
{name:"ただの",mult:1},
{name:"つよい",mult:1.5},
{name:"巨大な",mult:2.5},
{name:"狂気の",mult:4},
{name:"伝説の",mult:10}
]

let enemy = {}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function createEnemy(){

let job = random(jobs)
let trait = random(traits)

let base = 30 * Math.pow(1.18,floor)

let hp = Math.floor(base * job.mult * trait.mult)

enemy = {

name: trait.name + job.name,
hp: hp,
maxHP: hp,
atk: Math.floor(5 * job.mult * trait.mult)

}

updateEnemy()
}

function updateEnemy(){

document.getElementById("enemy").innerText = enemy.name

let ratio = enemy.hp / enemy.maxHP * 100

document.getElementById("enemyHP").style.width = ratio+"%"

document.getElementById("enemyHPtext").innerText =
enemy.hp + " / " + enemy.maxHP
}

function updatePlayer(){

player.atk = Math.floor(player.baseATK * (1 + townCount*0.2))
player.maxHP = Math.floor(player.baseHP * (1 + townCount*0.2))

document.getElementById("atk").innerText = player.atk
document.getElementById("hp").innerText = player.hp + " / " + player.maxHP
document.getElementById("towns").innerText = townCount
document.getElementById("floor").innerText = floor

}

function attack(){

enemy.hp -= player.atk

if(enemy.hp < 0) enemy.hp = 0

if(enemy.hp <= 0){

log("敵を倒した: "+enemy.name)

floor++

if(floor > 30){

townClear()
return

}

createEnemy()

}else{

player.hp -= enemy.atk

if(player.hp <= 0){

playerDeath()
return

}

}

updateEnemy()
updatePlayer()

}

function playerDeath(){

log("死亡…転生する")

player.baseATK += 2
player.baseHP += 10

player.hp = player.baseHP

floor = 1

createEnemy()

updatePlayer()

}

function townClear(){

townCount++

log("街を占領した！")

floor = 1

player.hp = player.maxHP

document.getElementById("town").innerText = random(townNames)

createEnemy()

updatePlayer()

}

function log(text){

document.getElementById("log").innerHTML =
text + "<br>" + document.getElementById("log").innerHTML

}

createEnemy()
updatePlayer()

</script>

</body>
</html>
