<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Infinite Relic</title>
<style>

body{
background:#000;
color:#fff;
font-family:sans-serif;
text-align:center;
}

button{
font-size:18px;
margin:5px;
}

.tab{
margin-top:10px;
}

.hidden{
display:none;
}

.bar{
width:90%;
height:20px;
background:#333;
margin:auto;
}

.fill{
height:100%;
background:red;
}

</style>
</head>
<body>

<h1>Infinite Relic</h1>

階層: <span id="floor">1</span><br><br>

<button onclick="attack()">攻撃</button>
<button onclick="toggleAuto()" id="autoBtn">AUTO OFF</button>

<h2>プレイヤー</h2>

LV <span id="lv"></span><br>

HP
<span id="hp"></span>
<div class="bar">
<div id="hpBar" class="fill"></div>
</div>

EXP
<span id="exp"></span>

<h2>敵</h2>

<span id="enemyName"></span>

HP
<span id="enemyHp"></span>

<div class="bar">
<div id="enemyBar" class="fill"></div>
</div>

<br>

<input type="number" id="moveInput">
<button onclick="move()">移動</button>

<br><br>

<button onclick="openTab('job')">ジョブ</button>
<button onclick="openTab('equip')">装備</button>

<div id="jobTab" class="tab hidden">
<h3>ジョブ</h3>
<div id="jobList"></div>
</div>

<div id="equipTab" class="tab hidden">
<h3>装備</h3>

装備中:
<div id="equipped"></div>

<hr>

所持武器:
<div id="weaponList"></div>

<button onclick="discardAll()">
装備以外を全て捨てる
</button>

</div>

<br>

<button onclick="save()">セーブ</button>
<button onclick="load()">ロード</button>

<script>

const jobs=[

{name:"戦士",atk:2,hp:20},

{name:"騎士",atk:1,hp:40},

{name:"盗賊",atk:3,hp:10}

]

const weaponMaster=[

{name:"錆びた剣",atk:2},

{name:"騎士の剣",atk:5},

{name:"英雄の剣",atk:10},

{name:"王者の剣",atk:20},

{name:"神話の剣",atk:50}

]

let player={

lv:1,

hp:100,

maxHp:100,

atk:5,

exp:0,

job:0,

weapons:[0],

equip:0

}

let floor=1

let enemy

let auto=false

function newEnemy(){

enemy={

name:["スライム","ゴブリン","オーク","ドラゴン"][Math.min(3,Math.floor(floor/10))],

hp:30+floor*5,

maxHp:30+floor*5,

atk:3+floor

}

}

function totalAtk(){

return player.atk
+jobs[player.job].atk
+weaponMaster[player.equip].atk

}

function attack(){

enemy.hp-=totalAtk()

if(enemy.hp<=0){

player.exp+=10

if(player.exp>=player.lv*10){

player.exp=0
player.lv++

player.maxHp+=10
player.hp=player.maxHp

player.weapons.push(
Math.floor(Math.random()*weaponMaster.length)
)

}

newEnemy()

}

player.hp-=enemy.atk

if(player.hp<=0){

player.hp=player.maxHp

}

update()

}

function toggleAuto(){

auto=!auto

document.getElementById("autoBtn").innerText=
auto?"AUTO ON":"AUTO OFF"

}

setInterval(()=>{

if(auto)attack()

},1000)

function move(){

floor=parseInt(
document.getElementById("moveInput").value
)

newEnemy()

update()

}

function openTab(name){

document.getElementById("jobTab").classList.add("hidden")
document.getElementById("equipTab").classList.add("hidden")

document.getElementById(name+"Tab").classList.remove("hidden")

}

function changeJob(i){

player.job=i
update()

}

function equip(i){

player.equip=i
update()

}

function discardAll(){

player.weapons=
[player.equip]

update()

}

function update(){

floorText.innerText=floor

lv.innerText=player.lv

hp.innerText=
Math.floor(player.hp)
+"/"+
Math.floor(player.maxHp)

exp.innerText=
Math.floor(player.exp)
+"/"+
player.lv*10

hpBar.style.width=
(player.hp/player.maxHp*100)+"%"

enemyName.innerText=enemy.name

enemyHp.innerText=
Math.floor(enemy.hp)
+"/"+
Math.floor(enemy.maxHp)

enemyBar.style.width=
(enemy.hp/enemy.maxHp*100)+"%"

jobList.innerHTML=""

jobs.forEach((j,i)=>{

jobList.innerHTML+=

`
<button onclick="changeJob(${i})">

${j.name}

</button>

`

})

equipped.innerText=
weaponMaster[player.equip].name

weaponList.innerHTML=""

player.weapons.forEach(i=>{

weaponList.innerHTML+=

`
<div>

${weaponMaster[i].name}

<button onclick="equip(${i})">

装備

</button>

</div>

`

})

}

function save(){

localStorage.save=
JSON.stringify({
player,floor
})

}

function load(){

let s=
JSON.parse(localStorage.save)

player=s.player

floor=s.floor

newEnemy()

update()

}

newEnemy()

update()

</script>

</body>
</html>
