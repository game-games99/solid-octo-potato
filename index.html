<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Relic</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
margin:0;
}

#header{
background:#222;
padding:10px;
text-align:center;
font-size:22px;
}

#tabs{
display:flex;
}

.tabbtn{
flex:1;
padding:10px;
font-size:18px;
}

.tab{
display:none;
padding:10px;
}

.active{
display:block;
}

button{
font-size:18px;
margin:4px;
padding:8px;
}

.barbg{
background:#333;
height:16px;
}

.bar{
background:red;
height:100%;
}

.exp{
background:#00ccff;
}

</style>

</head>

<body>

<div id="header">

Infinite Relic

<br>

階層 <span id="floor"></span>

</div>

<div id="tabs">

<button class="tabbtn" onclick="openTab('battle')">戦闘</button>

<button class="tabbtn" onclick="openTab('equip')">装備</button>

<button class="tabbtn" onclick="openTab('job')">ジョブ</button>

</div>

<!-- 戦闘 -->

<div id="battle" class="tab active">

<button onclick="attack()">攻撃</button>

<button onclick="autoToggle()" id="autoBtn">AUTO OFF</button>

<div id="player"></div>

<div class="barbg">

<div id="hpbar" class="bar"></div>

</div>

<div class="barbg">

<div id="expbar" class="bar exp"></div>

</div>

<div id="enemy"></div>

<div class="barbg">

<div id="enemybar" class="bar"></div>

</div>

<input id="moveInput" placeholder="階層">

<button onclick="move()">移動</button>

</div>

<!-- 装備 -->

<div id="equip" class="tab">

装備中<br>

武器: <span id="weapon"></span><br>

防具: <span id="armor"></span>

<hr>

所持品

<div id="inventory"></div>

</div>

<!-- ジョブ -->

<div id="job" class="tab">

現在のジョブ

<div id="currentJob"></div>

<hr>

<div id="jobList"></div>

</div>

<script>

////////////////
// データ
////////////////

let game={

floor:1,

player:{

level:1,
exp:0,
expMax:10,

hp:100,
maxHp:100,

atk:10,
def:5,

job:"戦士",

weapon:null,
armor:null

},

enemy:null,

auto:false,

inventory:[]

}

////////////////
// ジョブ
////////////////

let jobs=[

{name:"戦士",hp:30,atk:5,def:5},

{name:"騎士",hp:50,atk:3,def:10},

{name:"魔法使い",hp:10,atk:15,def:2}

]

////////////////
// 装備生成
////////////////

function createItem(){

return{

name:"剣"+rand(1,100),

atk:rand(1,10),

def:rand(0,5)

}

}

////////////////
// 敵
////////////////

function spawn(){

game.enemy={

name:"敵"+game.floor,

hp:50+game.floor*10,

maxHp:50+game.floor*10,

atk:5+game.floor*2

}

}

////////////////
// 戦闘
////////////////

function attack(){

let dmg=game.player.atk

game.enemy.hp-=dmg

if(game.enemy.hp<=0){

win()

return

}

game.player.hp-=game.enemy.atk

if(game.player.hp<=0){

game.player.hp=game.player.maxHp

game.floor=1

spawn()

}

update()

}

function win(){

game.floor++

game.player.exp+=5

if(game.player.exp>=game.player.expMax){

game.player.exp=0

game.player.level++

game.player.maxHp+=10
game.player.atk+=2
game.player.def+=1

}

game.inventory.push(createItem())

spawn()

update()

}

////////////////
// AUTO
////////////////

function autoToggle(){

game.auto=!game.auto

autoBtn.innerText=

game.auto?"AUTO ON":"AUTO OFF"

}

setInterval(()=>{

if(game.auto)attack()

},1000)

////////////////
// 移動
////////////////

function move(){

let f=parseInt(moveInput.value)

if(!f)return

game.floor=f

spawn()

update()

}

////////////////
// 装備
////////////////

function equip(i){

game.player.weapon=game.inventory[i]

game.player.atk+=game.inventory[i].atk

update()

}

////////////////
// ジョブ
////////////////

function changeJob(i){

let j=jobs[i]

game.player.job=j.name

game.player.maxHp+=j.hp
game.player.atk+=j.atk
game.player.def+=j.def

update()

}

////////////////
// UI
////////////////

function update(){

floor.innerText=game.floor

player.innerHTML=

"LV "+game.player.level+
"<br>HP "+game.player.hp+"/"+game.player.maxHp+
"<br>EXP "+game.player.exp+"/"+game.player.expMax

enemy.innerHTML=

game.enemy.name+
"<br>HP "+game.enemy.hp+"/"+game.enemy.maxHp

hpbar.style.width=

(game.player.hp/game.player.maxHp*100)+"%"

expbar.style.width=

(game.player.exp/game.player.expMax*100)+"%"

enemybar.style.width=

(game.enemy.hp/game.enemy.maxHp*100)+"%"

weapon.innerText=

game.player.weapon?
game.player.weapon.name:"なし"

inventory.innerHTML=

game.inventory.map((it,i)=>

it.name+

"<button onclick='equip("+i+")'>装備</button><br>"

).join("")

currentJob.innerText=game.player.job

jobList.innerHTML=

jobs.map((j,i)=>

j.name+

"<button onclick='changeJob("+i+")'>変更</button><br>"

).join("")

}

////////////////
// タブ
////////////////

function openTab(name){

document.querySelectorAll(".tab")

.forEach(t=>t.classList.remove("active"))

document.getElementById(name)

.classList.add("active")

}

////////////////
// util
////////////////

function rand(a,b){

return Math.floor(Math.random()*(b-a+1))+a

}

spawn()

update()

</script>

</body>
</html>
