<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haxla Tower</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
margin:0;
font-size:18px;
}

#top{
background:#1a1a1a;
padding:10px;
position:sticky;
top:0;
}

button{
font-size:18px;
padding:10px;
margin:4px;
border-radius:8px;
border:none;
}

#auto.on{background:#00c853;}
#auto.off{background:#444;}

.bar{
height:20px;
background:#333;
border-radius:5px;
margin:5px 0;
}

.fill{
height:100%;
background:#00e676;
border-radius:5px;
}

.enemyfill{
background:#ff5252;
}

.expfill{
background:#40c4ff;
}

.tab{display:none;padding:10px;}
.active{display:block;}

.log{
height:150px;
overflow:auto;
background:#000;
padding:5px;
}

</style>
</head>
<body>

<div id="top">

<div id="playerStats"></div>

<div class="bar">
<div id="hpbar" class="fill"></div>
</div>

EXP
<div class="bar">
<div id="expbar" class="fill expfill"></div>
</div>

<button onclick="attack()">攻撃</button>
<button id="auto" class="off" onclick="toggleAuto()">AUTO</button>

<br>

<button onclick="tab('battle')">戦闘</button>
<button onclick="tab('job')">ジョブ</button>
<button onclick="tab('move')">移動</button>

</div>


<div id="battle" class="tab active">

<div id="enemyStats"></div>

<div class="bar">
<div id="enemyhp" class="fill enemyfill"></div>
</div>

<div id="log" class="log"></div>

</div>


<div id="job" class="tab">

<div id="jobList"></div>

</div>


<div id="move" class="tab">

<input id="floorInput" type="number">
<button onclick="moveFloor()">移動</button>

</div>


<script>


// ===== プレイヤー =====

let player={

level:1,
exp:0,
expMax:50,

hp:100,
maxhp:100,

atk:10,
def:5,

floor:1,

job:"剣士",

auto:false

}


// ===== ジョブ =====

let jobs={

剣士:{
desc:"バランス型",
atk:1.2,
def:1,
skill:"強撃：150％ダメージ"
},

ナイト:{
desc:"防御特化",
atk:1,
def:1.4,
skill:"鉄壁：被ダメ20％減"
},

アサシン:{
desc:"高火力",
atk:1.5,
def:0.8,
skill:"致命撃：20％で2倍"
}

}


// ===== 敵 =====

let enemy

function createEnemy(){

let f=player.floor

if(f==1000){

enemy={
name:"塔の管理者",
hp:50000,
atk:800,
def:400,
boss:true
}

}

else if(f%100==0){

enemy={
name:"階層ボス",
hp:1000*f,
atk:50*f,
def:30*f,
boss:true
}

}

else{

enemy={
name:getEnemyName(f),
hp:100+f*30,
atk:10+f*5,
def:5+f*3
}

}

enemy.maxhp=enemy.hp

}


// ===== 敵名 =====

function getEnemyName(f){

if(f<100)return"スライム"
if(f<300)return"ゴブリン"
if(f<500)return"オーク"
if(f<700)return"ドラゴン"
if(f<900)return"魔王軍"
return"神獣"

}


// ===== 戦闘 =====

function attack(){

let job=jobs[player.job]

let atk=player.atk*job.atk

let dmg=Math.max(1,Math.floor(atk-enemy.def))

enemy.hp-=dmg

log("攻撃 "+dmg)


if(enemy.hp<=0){

win()

}else{

enemyAttack()

}

update()

}


function enemyAttack(){

let job=jobs[player.job]

let def=player.def*job.def

let dmg=Math.max(1,Math.floor(enemy.atk-def))

player.hp-=dmg

log("被ダメ "+dmg)


if(player.hp<=0){

player.hp=player.maxhp

player.floor--

createEnemy()

}

}


// ===== 勝利 =====

function win(){

log("撃破")

player.exp+=20

player.floor++

if(player.floor>1000)player.floor=1000

levelup()

createEnemy()

}


// ===== レベルアップ =====

function levelup(){

while(player.exp>=player.expMax){

player.exp-=player.expMax

player.level++

player.expMax=Math.floor(player.expMax*1.3)

let hp=20
let atk=5
let def=3

player.maxhp+=hp
player.atk+=atk
player.def+=def

player.hp=player.maxhp

log("LvUP HP+"+hp+" ATK+"+atk+" DEF+"+def)

}

}


// ===== AUTO =====

function toggleAuto(){

player.auto=!player.auto

auto.className=player.auto?"on":"off"

loop()

}

function loop(){

if(!player.auto)return

attack()

setTimeout(loop,800)

}


// ===== UI更新 =====

function update(){

playerStats.innerHTML=`

階層:${player.floor}<br>

Lv:${player.level}<br>

HP:${player.hp}/${player.maxhp}<br>

ATK:${player.atk}<br>

DEF:${player.def}<br>

JOB:${player.job}

`


enemyStats.innerHTML=`

${enemy.name}<br>

HP:${enemy.hp}/${enemy.maxhp}<br>

ATK:${enemy.atk}<br>

DEF:${enemy.def}

`


hpbar.style.width=(player.hp/player.maxhp*100)+"%"

enemyhp.style.width=(enemy.hp/enemy.maxhp*100)+"%"

expbar.style.width=(player.exp/player.expMax*100)+"%"

}


// ===== ジョブUI =====

function loadJobs(){

let html=""

for(let j in jobs){

let job=jobs[j]

html+=`

<div>

<b>${j}</b><br>

${job.desc}<br>

${job.skill}<br>

<button onclick="changeJob('${j}')">変更</button>

<hr>

</div>

`

}

jobList.innerHTML=html

}


function changeJob(j){

player.job=j

update()

}


// ===== 移動 =====

function moveFloor(){

let f=parseInt(floorInput.value)

if(isNaN(f))return

if(f<1)f=1
if(f>1000)f=1000

player.floor=f

createEnemy()

update()

}


// ===== ログ =====

function log(t){

log.innerHTML=t+"<br>"+log.innerHTML

}


// ===== タブ =====

function tab(t){

document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"))

document.getElementById(t).classList.add("active")

}


// ===== 起動 =====

createEnemy()

loadJobs()

update()


</script>

</body>
</html>
