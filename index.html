    let n = BigInt(val);
    if (n < 1000000000000000n) return n.toLocaleString();
    const units = ["aa", "ab", "ac", "ad", "ae", "af", "ag", "ah", "ai", "aj"];
    let unitIdx = -1; let base = n / 1000000000000n;
    while (base >= 1000n && unitIdx < units.length - 1) { base /= 1000n; unitIdx++; }
    return base.toString() + (unitIdx === -1 ? "" : units[unitIdx]);
}

const RELIC_MASTER = [
    {id:0, star:999, name:"再起の誓い", atk:0, hp:0, desc:"不屈の魂に刻まれた、再誕の原点。"},
    {id:101, star:1, name:"剣士の欠片", atk:7.4, hp:0}, {id:106, star:1, name:"衛兵の欠片", atk:0, hp:45.2}, {id:116, star:1, name:"メモリーダスト", atk:1.3, hp:10.9},
    {id:117, star:2, name:"メモリースターダスト", atk:111, hp:1111},
    {id:201, star:2, name:"聖騎士の欠片", atk:41.2, hp:682.4}, {id:301, star:3, name:"聖龍騎士の欠片", atk:874.3, hp:6924.1},
    {id:401, star:4, name:"【不退転】武神の魂", atk:65000, hp:180000, desc:"獲得遺物ボーナス増加。"},
    {id:501, star:5, name:"断絶の権能", atk:382660, hp:916330, desc:"受けるダメージを軽減。"},
    {id:601, star:6, name:"絶対統率レリック・オーバーロード", atk:1500000, hp:4500000, desc:"条件付き与ダメ増加。"},
    {id:701, star:7, name:"パンドラの箱", atk:155528931, hp:355528931, desc:"神を屠る唯一の条件。"},
    {id:801, star:999, name:"秩序のリバランス", atk:0, hp:0, desc:"【救済】絶対ダメージ変換。"},
    {id:901, star:8, name:"天律崩壊オメガ・コア", atk:0, hp:0, desc:"遺物獲得ごとに永続成長。"}
];

function saveGame() {
    const data = { ...player, baseAtk: player.baseAtk.toString(), baseHP: player.baseHP.toString(), maxDmg: player.maxDmg.toString(), currentBossHP: currentBossHP.toString(), extraAtkBonus: player.extraAtkBonus, extraHpBonus: player.extraHpBonus };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}

function loadGame() {
    let saved = localStorage.getItem(SAVE_KEY);
    if(saved) {
        const p = JSON.parse(saved); Object.assign(player, p);
        player.baseAtk = BigInt(p.baseAtk); player.baseHP = BigInt(p.baseHP); player.maxDmg = BigInt(p.maxDmg);
        currentBossHP = BigInt(p.currentBossHP || player.bossMaxHP);
    }
    if(!player.storySeen) document.getElementById("story-modal").style.display = "flex";
}

function applySerialCode() {
    const code = document.getElementById("serial-input-box").value.trim().toUpperCase();
    const resultMsg = document.getElementById("serial-result-msg");
    const inputArea = document.getElementById("serial-input-area");
    const resultArea = document.getElementById("serial-result-area");
    let success = false; let message = "";

    if (code === "DEBUG_EVOLUTION") {
        player.hasHado = player.hasGreatHado = player.hasDivineGuide = false;
        player.hasWorldOrder = player.hasCrown = player.hasMeta = false;
        player.inventory[116] = 999999;
        player.inventory[117] = 999999;
        player.totalLevel = 1000;
        player.inventory[901] = (player.inventory[901] || 0) + 1;
        success = true;
        message = `<span style="color:#00d4ff;">進化検証モード有効化</span><br>攻撃して覚醒を発生させてください。`;
    } else if (code === "RESET_ALL") {
        resetData(); return;
    } else {
        message = "無効なコードです。";
    }
    resultMsg.innerHTML = message; inputArea.style.display = "none"; resultArea.style.display = "block";
    if(success) { saveGame(); triggerUIUpdate(); }
}

function getRelicBonus() {
    let atk = 0, hp = 0, mult = 1.0;
    const hasOmega = (player.inventory[901] || 0) > 0;
    
    if (hasOmega) {
        const diff = player.totalRelics - player.lastProcessedRelicCount;
        if (diff > 0) {
            const boost = Math.sqrt(Number(player.baseAtk) * Number(player.baseHP)) * 0.000001 * diff;
            player.extraAtkBonus = (BigInt(player.extraAtkBonus || "0") + BigInt(Math.floor(boost))).toString();
            player.extraHpBonus = (BigInt(player.extraHpBonus || "0") + BigInt(Math.floor(boost * 2))).toString();
            player.lastProcessedRelicCount = player.totalRelics;
        }
    }

    let compCount = 0;
    for (let s = 1; s <= 7; s++) {
        const allOfType = RELIC_MASTER.filter(m => m.star === s && m.id !== 117 && m.id !== 0);
        if (allOfType.length > 0 && allOfType.every(m => (player.inventory[m.id] || 0) > 0)) compCount++;
    }
    const compBonus = Math.pow(2.0, compCount);

    Object.entries(player.inventory).forEach(([id, count]) => {
        const r = RELIC_MASTER.find(m => m.id == id); if(!r || r.star >= 8 && r.star !== 999) return;
        let bA = (r.atk || 0) * count, bH = (r.hp || 0) * count;
        if(r.star === 1 && player.hasHado) { bA *= 100; bH *= 100; }
        if(r.star === 2 && player.hasGreatHado) { bA *= 100; bH *= 100; }
        if(r.star === 3 && player.hasDivineGuide) { bA *= 100; bH *= 100; }
        if(r.star === 4 && player.hasWorldOrder) { bA *= 10; bH *= 10; }
        if(r.star === 5 && player.hasCrown) { bA *= 10; bH *= 10; }
        if(r.star === 6 && player.hasMeta) { bA *= 10; bH *= 10; }
        atk += bA; hp += bH;
    });

    return { atk: BigInt(Math.floor(atk * compBonus)) + BigInt(player.extraAtkBonus), hp: BigInt(Math.floor(hp * compBonus)) + BigInt(player.extraHpBonus), mult, compCount, compBonus };
}

function attack() {
    if(isModalOpen) return;
    player.totalClicks++;
    const bonus = getRelicBonus();
    const totalAtkVal = BigInt(Math.floor(Number(player.baseAtk + bonus.atk) * bonus.mult));
    let finalDmg = BigInt(Math.floor(Number(totalAtkVal) * (0.8 + Math.random() * 0.4)));

    // 覚醒チェック
    const dust = player.inventory[116] || 0; const stardust = player.inventory[117] || 0;
    if(!player.hasHado && dust >= 100000) { openHadoModal('hado'); return; }
    if(player.hasHado && !player.hasGreatHado && dust >= 200000) { openHadoModal('great'); return; }
    if(player.hasGreatHado && !player.hasDivineGuide && dust >= 300000) { openHadoModal('divine'); return; }
    if(player.hasDivineGuide && !player.hasWorldOrder && stardust >= 100000) { openCosmicModal('world'); return; }
    if(player.hasWorldOrder && !player.hasCrown && stardust >= 200000) { openCosmicModal('crown'); return; }
    if(player.hasCrown && !player.hasMeta && stardust >= 300000) { openCosmicModal('meta'); return; }

    if(finalDmg >= currentBossHP) {
        if(!player.isCleared && (player.inventory[701] || 0) > 0) { player.isCleared = true; showClearModal(); }
        else { currentBossHP = BigInt(player.bossMaxHP); }
    } else { currentBossHP -= finalDmg; }

    player.baseHP += BigInt(player.totalLevel); // 簡易再起
    addLog(`<span style="color:#007bff;">${formatV(finalDmg)} ダメージ！</span>`);
    saveGame(); triggerUIUpdate();
}

function openHadoModal(type) {
    stopAttack(); isModalOpen = true;
    let t = "", m = "";
    if(type==='hado'){ t="破軍の号令"; m="★1遺物の上昇値が100倍に。"; player.hasHado=true; }
    else if(type==='great'){ t="破軍の大号令"; m="★2遺物の上昇値が100倍に。"; player.hasGreatHado=true; }
    else if(type==='divine'){ t="天帝の導き"; m="★3遺物の上昇値が100倍に。"; player.hasDivineGuide=true; }
    document.getElementById("hado-modal-title").innerText = t;
    document.getElementById("hado-modal-msg").innerHTML = m;
    document.getElementById("hado-awaken-modal").style.display = "flex";
}
function openCosmicModal(type) {
    stopAttack(); isModalOpen = true;
    let t = "", m = "";
    if(type==='world'){ t="ワールドオーダー"; m="★4遺物の上昇値が10倍に。"; player.hasWorldOrder=true; }
    else if(type==='crown'){ t="クラウン・オブ・オーソリティ"; m="★5遺物の上昇値が10倍に。"; player.hasCrown=true; }
    else if(type==='meta'){ t="メタ・オーソリティ"; m="★6遺物の上昇値が10倍に。"; player.hasMeta=true; }
    document.getElementById("cosmic-modal-title").innerText = t;
    document.getElementById("cosmic-modal-msg").innerHTML = m;
    document.getElementById("cosmic-awaken-modal").style.display = "flex";
}

function triggerUIUpdate() { if(!needsUIUpdate){ needsUIUpdate=true; requestAnimationFrame(refreshUI); } }
function refreshUI() {
    const b = getRelicBonus(); const lv = player.totalLevel;
    document.getElementById("p-atk").textContent = formatV(player.baseAtk + b.atk);
    document.getElementById("p-hp").textContent = formatV(player.baseHP + b.hp);
    document.getElementById("bosshp-cur").textContent = formatV(currentBossHP);
    document.getElementById("hp-bar-fill").style.width = `${Number(currentBossHP * 100n / BigInt(player.bossMaxHP))}%`;
    document.getElementById("st-rank-lv").textContent = `Lv.${lv}`;
    document.getElementById("st-rank-title").textContent = RANK_NAMES[Math.min(9, Math.floor(lv/100))];
    needsUIUpdate = false;
    renderRelics();
}

function renderRelics() {
    const container = document.getElementById("relic-list");
    container.innerHTML = Object.entries(player.inventory).map(([id, c]) => {
        const m = RELIC_MASTER.find(x => x.id == id); if(!m || c<=0) return "";
        let bA = m.atk * c, bH = m.hp * c;
        if(m.star === 1 && player.hasHado) bA *= 100;
        if(id == 901) { bA = BigInt(player.extraAtkBonus); bH = BigInt(player.extraHpBonus); }
        return `<div class="relic-card"><div class="relic-name">★${m.star} ${m.name}×${c}</div><div class="relic-effect-box">ATK+${formatV(bA)}</div></div>`;
    }).join("");
}

function showTab(id) { document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active")); document.getElementById(id).classList.add("active"); }
function addLog(h) { const l=document.getElementById("log"); l.innerHTML = `<div>${h}</div>` + l.innerHTML; }
function stopAttack() { clearInterval(attackInterval); attackInterval = null; }
function closeHadoModal() { document.getElementById("hado-awaken-modal").style.display="none"; isModalOpen=false; saveGame(); }
function closeCosmicModal() { document.getElementById("cosmic-awaken-modal").style.display="none"; isModalOpen=false; saveGame(); }
function closeStory() { document.getElementById("story-modal").style.display="none"; player.storySeen=true; saveGame(); }
function openSerialModal() { stopAttack(); isModalOpen=true; document.getElementById("serial-modal").style.display="flex"; }
function closeSerialModal() { document.getElementById("serial-modal").style.display="none"; isModalOpen=false; }
function resetData() { localStorage.clear(); location.reload(); }

const btn = document.getElementById("attackBtn");
btn.addEventListener("pointerdown", () => { if(!isModalOpen) attackInterval = setInterval(attack, 150); });
window.addEventListener("pointerup", stopAttack);

loadGame(); triggerUIUpdate();
</script>
