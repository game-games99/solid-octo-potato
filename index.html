<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Haxla RPG Ultimate+</title>

<style>

body{
background:#111;
color:#fff;
font-family:sans-serif;
}

.panel{
background:#222;
margin:5px;
padding:10px;
border-radius:10px;
}

button{
padding:10px;
margin:3px;
}

.autoOn{
background:green;
}

.autoOff{
background:gray;
}

.item{
border:1px solid #555;
margin:5px;
padding:5px;
}

.equip{
color:cyan;
}

</style>

</head>
<body>


<div class="panel">

階層 <span id="floor"></span>

Lv <span id="level"></span>

<br>

HP
<span id="hp"></span>
/
<span id="maxhp"></span>

<br>

攻撃
<span id="atk"></span>

防御
<span id="def"></span>

<br>

転生Pt
<span id="rp"></span>

</div>



<div class="panel">

<button onclick="startBattle()">戦闘</button>

<button id="autoBtn" onclick="toggleAuto()" class="autoOff">

AUTO

</button>

<button onclick="openEquip()">装備</button>

<button onclick="openJob()">ジョブ</button>

<button onclick="move()">移動</button>

<button onclick="openRebirth()">転生</button>

<button onclick="openSkill()">スキル</button>

</div>



<div class="panel">

敵

<span id="enemyName"></span>

<br>

HP

<span id="enemyHP"></span>

</div>



<div class="panel" id="main"></div>



<script>


player={

floor:1,

level:1,

hp:100,

maxhp:100,

atk:10,

def:5,

rp:0,

rebirthSkill:{
atk:0,
def:0,
hp:0,
exp:0,
drop:0
},

weapon:null,

armor:null,

inventory:[],

job:"剣士",

jobSkill:{}

}


auto=false

enemy=null


enemyList=[

{name:"スライム",hp:50,atk:5},

{name:"ゴブリン",hp:80,atk:8},

{name:"オーク",hp:120,atk:12},

{name:"ダークナイト",hp:200,atk:20},

{name:"ドラゴン",hp:500,atk:40}

]



rarity=[

"Common",

"Rare",

"Epic",

"Legend"

]



function update(){

floor.innerText=player.floor

level.innerText=player.level

hp.innerText=Math.floor(player.hp)

maxhp.innerText=Math.floor(player.maxhp)

atk.innerText=Math.floor(player.atk)

def.innerText=Math.floor(player.def)

rp.innerText=player.rp


if(enemy){

enemyName.innerText=enemy.name

enemyHP.innerText=Math.floor(enemy.hp)

}

}



function toggleAuto(){

auto=!auto

autoBtn.className=auto?"autoOn":"autoOff"

}



function startBattle(){

enemy={

...enemyList[Math.floor(Math.random()*enemyList.length)]

}

enemy.hp+=player.floor*10

fight()

}



function fight(){

if(!enemy)return


enemy.hp-=player.atk


if(enemy.hp<=0){

drop()

player.floor++

enemy=null

update()

return

}


player.hp-=Math.max(1,enemy.atk-player.def)


if(player.hp<=0){

player.hp=player.maxhp

player.floor--

enemy=null

update()

return

}


update()


if(auto)

setTimeout(fight,500)

}



function drop(){

let type=Math.random()<0.5?"weapon":"armor"

let r=Math.floor(Math.random()*rarity.length)

let item={

type,

name:rarity[r]+" "+(type=="weapon"?"剣":"鎧"),

atk:type=="weapon"?r*5:0,

def:type=="armor"?r*5:0,

rarity:rarity[r]

}

player.inventory.push(item)

}



function openEquip(){

main.innerHTML=`

ステータス<br>

攻撃 ${player.atk}<br>

防御 ${player.def}<br>

HP ${player.maxhp}

`


player.inventory.forEach((item,i)=>{


main.innerHTML+=`

<div class=item>

${item.name}

<br>

ATK ${item.atk}

DEF ${item.def}

<br>

${player.weapon==item||player.armor==item?"装備中":""}

<br>

<button onclick="equip(${i})">

装備

</button>

<button onclick="discard(${i})">

捨てる

</button>

</div>

`

})


}



function equip(i){

let item=player.inventory[i]


if(item.type=="weapon")

player.weapon=item

else

player.armor=item


calcStat()

openEquip()

}



function discard(i){

player.inventory.splice(i,1)

openEquip()

}



function calcStat(){

player.atk=10+(player.weapon?player.weapon.atk:0)+player.rebirthSkill.atk

player.def=5+(player.armor?player.armor.def:0)+player.rebirthSkill.def

player.maxhp=100+player.rebirthSkill.hp

}



function move(){

let f=prompt("移動階層")

if(!f)return

f=parseInt(f)

if(isNaN(f))return

player.floor=f

update()

}



function openRebirth(){

main.innerHTML=`

転生Pt ${player.rp}

<br>

攻撃強化

<button onclick="rebirthUp('atk')">

強化

</button>

<br>

防御強化

<button onclick="rebirthUp('def')">

強化

</button>

<br>

HP強化

<button onclick="rebirthUp('hp')">

強化

</button>

`

}



function rebirthUp(type){

if(player.rp<=0)return

player.rp--

player.rebirthSkill[type]+=5

calcStat()

openRebirth()

}



function openSkill(){

main.innerHTML=`

強撃

敵に150%ダメージ

<br>

防御

ダメージ20%軽減

`

}



function openJob(){

main.innerHTML=`

剣士

攻守バランス

<br>

ナイト

防御特化

<br>

魔法使い

高火力

<br>

アサシン

高速攻撃

<br>

僧侶

回復

<br>

バーサーカー

超攻撃

`

}



update()

</script>


</body>
</html>
