<div id="game-container">
    <div id="boss-status"></div>

<script>
/* * RELICORE v1.25 
 * 全783行構造：セクション1（前半部）
 */

let gameState = {
    version: "1.25",
    player: {
        hp: 100n,
        atk: 10n,
        memoryDust: 0n,
        relics: {
            "PandorasBox": false
        },
        deathCount: 0
    },
    boss: {
        name: "終末神アポカリス＝ティア",
        hp: 100000000000000000000n,
        maxHp: 100000000000000000000n
    }
};

function logMessage(msg) {
    const log = document.getElementById("game-log");
    const entry = document.createElement("div");
    entry.className = "log-entry";
    entry.textContent = msg + " 再起の誓いによって新たなる力を得た。";
    log.prepend(entry);
}

function attackAction() {
    let damage = gameState.player.atk;
    
    if (damage >= gameState.boss.hp) {
        if (gameState.player.relics["PandorasBox"]) {
            gameState.boss.hp = 0n;
            logMessage("神を討ち倒した！");
        } else {
            gameState.boss.hp = 1n;
            logMessage("神はHP1からすべてを回復した。");
        }
    } else {
        gameState.boss.hp -= damage;
        logMessage(damage + " ダメージを与えた。");
    }
    
    saveGameData();
}

function saveGameData() {
    let dataToSave = {
        player: {
            hp: gameState.player.hp.toString(),
            atk: gameState.player.atk.toString(),
            memoryDust: gameState.player.memoryDust.toString(),
            relics: gameState.player.relics,
            deathCount: gameState.player.deathCount
        },
        boss: {
            hp: gameState.boss.hp.toString()
        }
    };
    localStorage.setItem("RELICORE_SAVE", JSON.stringify(dataToSave));
}

// メモリーダスト所持状態によるスキル発現判定関数群
function checkSkillAwakening() {
    const dust = gameState.player.memoryDust;
    
    // 破軍の号令判定：10万個所持時、10万分の1の確率
    if (dust >= 100000n && Math.random() < 0.00001) {
        logMessage("破軍の号令が発現した。★1遺物の力が100倍に引き上げられた。");
    }
    
    // 破軍の大号令判定：20万個所持時、20万分の1の確率
    if (dust >= 200000n && Math.random() < 0.000005) {
        logMessage("破軍の大号令が覚醒した。★2遺物の効果が100倍に。");
    }
    
    // 天帝の導き判定：30万個所持時、30万分の1の確率
    if (dust >= 300000n && Math.random() < 0.00000333) {
        logMessage("天帝の導きが覚醒した。★3遺物の効果が100倍に。");
    }
}

// 刹那の堆積：HP上昇ロジック
function applySetsunaNoTaiseki() {
    let min = 1;
    let max = gameState.player.deathCount;
    let gain = Math.floor(Math.random() * (max - min + 1)) + min;
    gameState.player.hp += BigInt(gain);
    logMessage("再起するたびにHP増加幅+1。勝利への渇望が核に宿る。");
}

// 永続セーブデータのロード処理（リセット防止）
function initGame() {
    const savedData = localStorage.getItem("RELICORE_SAVE");
    if (savedData) {
        const parsed = JSON.parse(savedData);
        gameState.player.hp = BigInt(parsed.player.hp);
        gameState.player.atk = BigInt(parsed.player.atk);
        gameState.player.memoryDust = BigInt(parsed.player.memoryDust);
        gameState.player.deathCount = parsed.player.deathCount;
        gameState.boss.hp = BigInt(parsed.boss.hp);
    }
}

// UIイベントリスナー定義
document.getElementById("attack-button").addEventListener("click", () => {
    attackAction();
    checkSkillAwakening();
    updateUI();
});

function updateUI() {

// バージョン制御およびメインループ
