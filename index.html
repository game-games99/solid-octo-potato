<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Relic - Ultimate</title>

<style>

body{
background:#111;
color:#fff;
font-family:sans-serif;
margin:0;
font-size:18px;
}

#top{

background:#1a1a1a;
padding:10px;
position:sticky;
top:0;

}

button{

font-size:18px;
padding:10px;
margin:4px;
border:none;
border-radius:8px;

}

.tab{display:none;padding:10px;}
.active{display:block;}

.bar{

height:20px;
background:#333;
border-radius:6px;
margin:4px 0;

}

.fill{

height:100%;
background:#00e676;
border-radius:6px;

}

.enemy{background:#ff5252;}
.exp{background:#40c4ff;}

.common{color:#fff;}
.uncommon{color:#00e676;}
.rare{color:#00b0ff;}
.epic{color:#aa00ff;}
.legend{color:#ffd600;}

.item{

border-bottom:1px solid #333;
padding:5px;

}

</style>

</head>

<body>


<div id="top">

<div id="player"></div>

HP
<div class="bar"><div id="hp" class="fill"></div></div>

EXP
<div class="bar"><div id="exp" class="fill exp"></div></div>


<button onclick="attack()">攻撃</button>

<button onclick="autoToggle()" id="autoBtn">AUTO OFF</button>

<br>

<button onclick="tab('battle')">戦闘</button>
<button onclick="tab('equip')">装備</button>
<button onclick="tab('job')">ジョブ</button>
<button onclick="tab('move')">移動</button>


<button onclick="save()">セーブ</button>
<button onclick="load()">ロード</button>


</div>


<div id="battle" class="tab active">

<div id="enemy"></div>

<div class="bar">
<div id="enemyhp" class="fill enemy"></div>
</div>

<div id="log"></div>

</div>


<div id="equip" class="tab">

装備中

<div id="equipped"></div>

<hr>

所持品

<div id="inventory"></div>

<button onclick="clearEquip()">
未装備を一括破棄
</button>

</div>


<div id="job" class="tab">

現在：
<span id="jobNow"></span>

<hr>

<div id="jobList"></div>

</div>


<div id="move" class="tab">

<input id="floorInput" type="number" placeholder="階層">

<button onclick="moveFloor()">

移動

</button>

</div>



<script>


let player
let enemy



const jobs={

剣士:{
atk:1.2,
def:1,
desc:"バランス型"
},

ナイト:{
atk:1,
def:1.5,
desc:"防御特化"
},

アサシン:{
atk:1.5,
def:0.8,
desc:"高火力"
},

魔法使い:{
atk:1.7,
def:0.7,
desc:"最大火力"
}

}



const weaponNames=[
"錆びた剣",
"鉄の剣",
"騎士剣",
"英雄剣",
"聖剣",
"神剣"
]



const armorNames=[

"布の服",
"革鎧",
"鎖鎧",
"騎士鎧",
"聖鎧",
"神鎧"

]



const rarity=[
"common",
"uncommon",
"rare",
"epic",
"legend"
]



function newPlayer(){

player={

floor:1,
level:1,
exp:0,
expMax:50,

hp:100,
maxhp:100,

atk:10,
def:5,

job:"剣士",

weapon:null,
armor:null,

inventory:[],

auto:false

}

}



function save(){

localStorage.ultimateSave=
JSON.stringify(player)

alert("セーブ完了")

}



function load(){

let data=localStorage.ultimateSave

if(data){

player=
JSON.parse(data)

createEnemy()

refresh()

alert("ロード完了")

}

}



function createEnemy(){

let f=player.floor

enemy={

name:["スライム","ゴブリン","オーク","騎士","悪魔","神兵"][rand(6)],

hp:50+f*20,

atk:5+f*5,

def:3+f*3

}

enemy.maxhp=enemy.hp

}



function calc(){

player.atk=10+player.level*3
player.def=5+player.level*2

if(player.weapon){

player.atk+=player.weapon.atk
player.def+=player.weapon.def

}

if(player.armor){

player.atk+=player.armor.atk
player.def+=player.armor.def

}


let j=jobs[player.job]

player.atk=
Math.floor(player.atk*j.atk)

player.def=
Math.floor(player.def*j.def)

}



function attack(){

let dmg=
Math.max(1,player.atk-enemy.def)

enemy.hp-=dmg

log("攻撃 "+dmg)


if(enemy.hp<=0){

win()

}else{

enemyAttack()

}

refresh()

}



function enemyAttack(){

let dmg=
Math.max(1,enemy.atk-player.def)

player.hp-=dmg

log("被弾 "+dmg)


if(player.hp<=0){

player.hp=player.maxhp

player.floor--

createEnemy()

}

}



function win(){

log("撃破")

player.exp+=20

player.floor++

drop()

levelup()

createEnemy()

}



function levelup(){

while(player.exp>=player.expMax){

player.exp-=player.expMax

player.level++

player.expMax=
Math.floor(player.expMax*1.3)

player.maxhp+=20

player.hp=player.maxhp

}

calc()

}



function drop(){

if(Math.random()<0.7){

let type=
Math.random()<0.5?"weapon":"armor"


let item={

type,

name:
(type=="weapon"?
weaponNames[rand(6)]
:
armorNames[rand(6)]),

atk:rand(10),

def:rand(10),

rarity:
rarity[rand(5)]

}

player.inventory.push(item)

}

}



function equip(i){

let it=player.inventory[i]

if(it.type=="weapon")
player.weapon=it

else
player.armor=it


calc()

refresh()

}



function clearEquip(){

player.inventory=
player.inventory.filter(

it=>it!=player.weapon
&& it!=player.armor

)

refresh()

}



function moveFloor(){

let f=
parseInt(floorInput.value)

if(!isNaN(f)){

player.floor=f

createEnemy()

refresh()

}

}



function autoToggle(){

player.auto=!player.auto

if(player.auto)
auto()

refresh()

}



function auto(){

if(!player.auto)return

attack()

setTimeout(auto,500)

}



function refresh(){

calc()


player.innerHTML=

"階層:"+player.floor+

"<br>Lv:"+player.level+

"<br>ATK:"+player.atk+

"<br>DEF:"+player.def+

"<br>JOB:"+player.job



hp.style.width=

(player.hp/player.maxhp*100)+"%"



exp.style.width=

(player.exp/player.expMax*100)+"%"



enemyhp.style.width=

(enemy.hp/enemy.maxhp*100)+"%"


enemy.innerHTML=

enemy.name+
"<br>HP:"+enemy.hp


autoBtn.innerHTML=

player.auto?
"AUTO ON":
"AUTO OFF"



equipped.innerHTML=

"武器:"+
(player.weapon?player.weapon.name:"なし")+

"<br>防具:"+
(player.armor?player.armor.name:"なし")



inventory.innerHTML=

player.inventory.map(

(it,i)=>

'<div class="item '+it.rarity+'">'+

it.name+

" ATK:"+it.atk+

" DEF:"+it.def+

'<button onclick="equip('+i+')">装備</button>'

+"</div>"

).join("")



jobNow.innerHTML=player.job



jobList.innerHTML=

Object.keys(jobs).map(

j=>

j+
" "+jobs[j].desc+

'<button onclick="changeJob("'+j+'")">変更</button><hr>'

).join("")



}



function changeJob(j){

player.job=j

calc()

refresh()

}



function log(t){

log.innerHTML=
t+"<br>"+log.innerHTML

}



function rand(v){

return Math.floor(Math.random()*v)

}



function tab(t){

document.querySelectorAll(".tab")

.forEach(x=>x.classList.remove("active"))

document.getElementById(t)

.classList.add("active")

}



newPlayer()

createEnemy()

refresh()

</script>

</body>
</html>
