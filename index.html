<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RELICORE v1.22</title>
    <style>
        /* スタイル・フィルタリング：重複を整理し軽量化 */
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; user-select: none; }
        .app { max-width: 500px; margin: 0 auto; background: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; text-align: center; background: #222; border-bottom: 1px solid #333; }
        .hp-container { width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; margin: 8px 0; }
        .hp-bar { height: 100%; background: #e74c3c; transition: width 0.2s; }
        .val-enemy-hp { font-size: 1.6rem; font-weight: bold; color: #e74c3c; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .stat-card { background: #2a2a2a; padding: 8px; border-radius: 4px; border-left: 3px solid #3498db; }
        .stat-card.hp { border-left-color: #e74c3c; }
        .label { font-size: 0.7rem; color: #888; }
        .value { font-size: 1.1rem; font-weight: bold; }
        
        /* タブ：再起タブの白背景を廃止し、全体で統一感のあるデザインへ */
        .tabs { display: flex; background: #eee; }
        .tab { flex: 1; padding: 12px; text-align: center; color: #666; cursor: pointer; font-weight: bold; }
        .tab.active { color: #3498db; border-bottom: 3px solid #3498db; }
        
        .content { flex: 1; padding: 12px; overflow-y: auto; }
        .panel { display: none; }
        .panel.active { display: block; }
        
        .btn-atk { width: 100%; padding: 16px; background: #3498db; color: #fff; border: none; border-radius: 8px; font-size: 1.4rem; font-weight: bold; cursor: pointer; margin-bottom: 12px; }
        .log { background: #fff; color: #222; height: 320px; border-radius: 4px; padding: 10px; font-size: 0.85rem; overflow-y: auto; line-height: 1.5; }
        
        /* 再起アイテム：青背景・装飾を削除し軽量化 */
        .vow-card { background: #fff; color: #222; padding: 12px; border-radius: 4px; margin-bottom: 10px; border-bottom: 2px solid #ddd; }
        .vow-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .vow-name { font-weight: bold; }
        .vow-lv { color: #f39c12; font-weight: bold; }
        .vow-eff { background: #f0f0f0; padding: 6px; border-radius: 3px; font-size: 0.85rem; color: #3498db; font-weight: bold; margin-bottom: 6px; }
        .vow-det { font-size: 0.75rem; color: #666; }
        
        .ver { text-align: right; padding: 8px; font-size: 0.7rem; color: #444; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div id="e-name">溢れし災厄</div>
        <div class="hp-container"><div id="e-bar" class="hp-bar"></div></div>
        <div id="e-hp" class="val-enemy-hp">0</div>
    </div>

    <div class="stats-row">
        <div class="stat-card"><div class="label">ATK</div><div id="p-atk" class="value">0</div></div>
        <div class="stat-card hp"><div class="label">HP</div><div id="p-hp" class="value">0</div></div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="shTab('btl')">討伐</div>
        <div class="tab" onclick="shTab('vow')">再起</div>
        <div class="tab" onclick="shTab('rlc')">遺物</div>
        <div class="tab" onclick="shTab('det')">詳細</div>
    </div>

    <div class="content">
        <div id="p-btl" class="panel active">
            <button class="btn-atk" onclick="doAtk()">こうげき</button>
            <div id="log" class="log"></div>
        </div>
        <div id="p-vow" class="panel"></div>
        <div id="p-rlc" class="panel"><div id="rlc-list"></div></div>
        <div id="p-det" class="panel"></div>
    </div>
    <div class="ver">RELICORE v1.22</div>
</div>

<script>
    // --- 内部データ構造 (一切削らず維持) ---
    const S_KEY = "RELICORE_DATA_SAVE";
    let p = {
        atk: 57.74, aU: "ab", hp: 791.44, hU: "aa",
        dust: 200000, dCnt: 15000, rlc: [],
        v: {
            f: { lv: 10, b: 10, f: 50000, g: 250000 },
            s: { lv: 10, c: 250010, l: 28868829, b: 250000 },
            i: { lv: 10, mn: 30, mx: 100, b: 20 },
            n: { lv: 10, mn: 1, mx: 10 },
            k: { lv: 10 }, d: { lv: 10 }
        },
        flags: { gun: false, ten: false }
    };
    let e = { n: "溢れし災厄", h: 57.38, m: 57.38, u: "ac" };

    function init() {
        load();
        upd();
    }

    function shTab(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('p-' + id).classList.add('active');
        if(id === 'vow') rv();
    }

    function upd() {
        document.getElementById('e-hp').innerText = e.h + e.u;
        document.getElementById('e-bar').style.width = (e.h / e.m * 100) + "%";
        document.getElementById('p-atk').innerText = p.atk + p.aU;
        document.getElementById('p-hp').innerText = p.hp + p.hU;
    }

    // --- 再起タブ描画：v1.16風の内訳表示を復元 ---
    function rv() {
        const c = document.getElementById('p-vow');
        const v = p.v;
        c.innerHTML = `
            <div class="vow-card">
                <div class="vow-top"><span class="vow-name">不退転の力</span><span class="vow-lv">Lv.${v.f.lv} (MAX)</span></div>
                <div class="vow-eff">ボーナス : +${v.f.b + v.f.f + v.f.g} 【不退転：+${v.f.f}】【強欲：+${v.f.g}】</div>
                <div class="vow-det">戦闘を経験するたびにランダムな遺物を（1+所持数）つ獲得する。</div>
            </div>
            <div class="vow-card">
                <div class="vow-top"><span class="vow-name">刹那の堆積</span><span class="vow-lv">Lv.${v.s.lv} (MAX)</span></div>
                <div class="vow-eff">HP増加 : +${v.s.c} / 上限 : ${v.s.l.toLocaleString()} 【刹那：+${v.s.b}】</div>
                <div class="vow-det">再起するたびにHP増加幅+1。勝利への渇望が核に宿る。</div>
            </div>
            <div class="vow-card">
                <div class="vow-top"><span class="vow-name">因果の拒絶</span><span class="vow-lv">Lv.${v.i.lv} (MAX)</span></div>
                <div class="vow-eff">無効化 : ${v.i.mn}% ～ ${v.i.mx}% 【因果：+${v.i.b}%】</div>
                <div class="vow-det">稀に攻撃を無効化する。経験値が深まるごとに下限が向上。</div>
            </div>
            <div class="vow-card">
                <div class="vow-top"><span class="vow-name">反撃の狼煙</span><span class="vow-lv">Lv.${v.n.lv} (MAX)</span></div>
                <div class="vow-eff">確定 : ${v.n.mn} ～ ${v.n.mx}個 (★3込)</div>
                <div class="vow-det">生存時★3以上の遺物を確定で入手する。</div>
            </div>
        `;
    }

    function doAtk() {
        const l = document.getElementById('log');
        // 破軍の号令・天帝の導きの発現チェック (ダミー確率ロジック)
        if (!p.flags.gun && p.dust >= 100000 && Math.random() < 1/100000) {
            p.flags.gun = true;
            l.innerHTML = `<div style="color:gold;">【覚醒】破軍の号令が発現！</div>` + l.innerHTML;
        }

        const d = p.atk;
        l.innerHTML = `<div>${e.n}に ${d}${p.aU} のダメージ！</div>` + 
                      `<div style="color:#e67e22;">再起の誓いによって新たなる力を得た</div>` + l.innerHTML;
        
        // 100行超えたら古いログを削る軽量化フィルタリング
        if(l.children.length > 100) l.removeChild(l.lastChild);
        
        save();
        upd();
    }

    function save() { localStorage.setItem(S_KEY, JSON.stringify(p)); }
    function load() {
        const s = localStorage.getItem(S_KEY);
        if(s) {
            const parsed = JSON.parse(s);
            // 既存の重要フラグや数値を上書きせずマージ
            p = Object.assign(p, parsed);
        }
    }

    window.onload = init;
</script>
</body>
</html>
