<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RELICORE - v1.2.3</title>
<style>
  :root { --bg: #ffffff; --panel: #f8f9fa; --border: #dee2e6; --primary: #007bff; --text: #212529; --hp: #dc3545; --dark: #1a1a1a; --gold: #d4af37; --growth: #ff69b4; --relic-purple: #6610f2; --relic-bg: #fcfaff; }
  * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  
  /* --- 称号エリアのデザイン --- */
  .rank-display { text-align: center; padding: 22px; border-radius: 16px; margin-bottom: 15px; border: 3px solid #444; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); background: #000; color: #fff; position: relative; overflow: hidden; }
  .rank-lv { font-size: 0.8em; margin-bottom: 4px; font-weight: bold; color: #888; letter-spacing: 1px; }
  .rank-title { font-size: 1.6em; font-weight: bold; letter-spacing: 4px; position: relative; z-index: 2; }

  /* 段階別スタイル */
  .rank-iron { border-color: #666; }
  .rank-abyss { border-color: #00d4ff; box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
  .rank-magenta { border-color: #ff00ff; box-shadow: 0 0 20px rgba(255, 0, 255, 0.4); }
  .rank-regal { border-color: var(--gold); background: linear-gradient(145deg, #000 0%, #221a00 100%); animation: rank-pulse 3s infinite alternate; }
  .rank-divine { border-color: #fff; box-shadow: 0 0 35px rgba(255, 255, 255, 0.6); }
  .rank-god { border: 4px solid; border-image: linear-gradient(to right, red, orange, yellow, green, cyan, blue, violet) 1; animation: god-glow 2s infinite linear; }

  @keyframes rank-pulse { from { transform: scale(1); } to { transform: scale(1.02); } }
  @keyframes god-glow { 0% { box-shadow: 0 0 20px red; } 50% { box-shadow: 0 0 20px blue; } 100% { box-shadow: 0 0 20px red; } }

  /* モーダル */
  #rank-up-modal, #rare-drop-modal, #hado-awaken-modal, #upgrade-modal, #story-modal, #clear-modal, #policy-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; justify-content: center; align-items: center; padding: 20px; }
  #rank-up-modal, #hado-awaken-modal, #story-modal, #clear-modal { background: rgba(0,0,0,0.9); }
  #rare-drop-modal, #upgrade-modal, #policy-modal { background: rgba(0,0,0,0.8); pointer-events: none; }
  .rare-card { background: #000; border: 2px solid #fff; border-radius: 15px; padding: 30px; text-align: center; color: #fff; pointer-events: auto; transform: scale(0); animation: card-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  @keyframes card-pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  .rank-up-content { background: #000; border: 2px solid var(--growth); border-radius: 20px; padding: 40px 20px; text-align: center; color: #fff; max-width: 450px; width: 95%; animation: hb-p 2s infinite; }
  @keyframes hb-p { 0% { transform: scale(1); } 5% { transform: scale(1.05); } 10% { transform: scale(1); } }

  #header { background: var(--dark); color: #fff; padding: 12px 10px; border-bottom: 2px solid #000; flex-shrink: 0; }
  .hp-bar-container { background: #333; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 5px; }
  #hp-bar-fill { height: 100%; background: linear-gradient(90deg, #b02a37, #dc3545); transition: width 0.15s; }
  .hp-val-display { font-size: 1.4em; font-weight: bold; color: #ff6b6b; font-family: monospace; }
  .status-box { display: flex; gap: 8px; margin-top: 10px; }
  .stat-card { flex: 1; background: rgba(255,255,255,0.08); padding: 5px 10px; border-radius: 6px; border-left: 3px solid var(--primary); }
  
  .nav { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .nav button { flex: 1; padding: 12px 0; border: none; background: none; color: #6c757d; font-weight: bold; }
  .nav button.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #fff; }

  #content-area { flex-grow: 1; overflow: hidden; background: #fff; }
  .tab { display: none; padding: 10px; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 150px; }
  .tab.active { display: block; }

  .btn-attack { width: 100%; padding: 16px; background: var(--primary); color: #fff; font-size: 1.3em; font-weight: bold; border: none; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 4px 0 #0056b3; }
  #log { height: 350px; font-size: 0.8em; background: #fafafa; border: 1px solid var(--border); padding: 10px; overflow-y: auto; border-radius: 8px; }

  .relic-list-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .relic-card-ui { grid-column: span 2; border: 1px solid #e0d5f0; padding: 6px; border-radius: 6px; background: var(--relic-bg); border-left: 3px solid var(--relic-purple); font-size: 0.65em; }
  .relic-card-ui.star-high { grid-column: span 3; border-width: 2px; }

  .st-box { background: #fff; border-left: 4px solid #28a745; padding: 10px; margin-bottom: 10px; font-size: 0.85em; }
  .ver-footer { position: fixed; bottom: 4px; right: 4px; color: #bbb; font-size: 0.65em; pointer-events: none; }
  .story-btn { background: none; border: 1px solid gold; color: gold; padding: 10px 30px; cursor: pointer; }
</style>
</head>
<body>

<div id="story-modal"><div style="color:#fff; text-align:center;"><p>奪われた魂、再起の誓い...</p><button class="story-btn" onclick="closeStory()">魂に刻印する</button></div></div>
<div id="rank-up-modal"><div class="rank-up-content"><h3>覚醒</h3><p id="rank-up-msg-text"></p><button class="story-btn" onclick="closeRankUpModal()">高みへ</button></div></div>
<div id="rare-drop-modal" onclick="closeRareModal()"><div id="rare-card-content" class="rare-card"><h2 id="rare-name-label"></h2><p id="rare-desc-label"></p></div></div>
<div id="clear-modal"><div class="rank-up-content"><h3>討伐成功</h3><p>神を屠りました。</p><button class="story-btn" onclick="closeClearModal()">次なる戦いへ</button></div></div>

<div id="header">
  <div style="text-align:center;">
    <div style="font-size:0.9em; color:#888;">終末神アポカリス＝ティア</div>
    <div class="hp-bar-container"><div id="hp-bar-fill"></div></div>
    <div class="hp-val-display" id="bosshp-cur"></div>
  </div>
  <div class="status-box">
    <div class="stat-card"><span>ATK</span><div id="p-atk"></div></div>
    <div class="stat-card" style="border-left-color:var(--hp);"><span>HP</span><div id="p-hp"></div></div>
  </div>
</div>

<div class="nav">
  <button onclick="showTab('battle')" id="nav-battle" class="active">討伐</button>
  <button onclick="showTab('vow')" id="nav-vow">再起</button>
  <button onclick="showTab('relic')" id="nav-relic">遺物</button>
  <button onclick="showTab('status')" id="nav-status">詳細</button>
</div>

<div id="content-area">
  <div id="battle" class="tab active"><button class="btn-attack" id="attackBtn">こうげき</button><div id="log"></div></div>
  <div id="vow" class="tab"><div id="vow-list"></div></div>
  <div id="relic" class="tab"><div class="relic-list-container" id="relic-list"></div></div>
  <div id="status" class="tab">
    <div class="rank-display" id="st-rank-area"><div class="rank-lv" id="st-rank-lv"></div><div class="rank-title" id="st-rank-title"></div></div>
    <div class="st-box">
      攻撃数: <span id="st-totalclicks"></span> / 経験値: <span id="v-death"></span><br>
      遺物数: <span id="st-totalrelics"></span> / 最終倍率: <span id="st-dmgmult"></span>
    </div>
    <button class="btn-attack" style="background:#dc3545; box-shadow:0 4px 0 #a71d2a;" onclick="resetData()">データリセット</button>
  </div>
</div>
<div class="ver-footer">RELICORE v1.2.3</div>

<script>
const SAVE_KEY = "relicore_p_data_v123";
const BOSS_MAX_HP_BASE = 100000000000000000000n;
const MAJIN_ATK_BASE = 999999999999n;
const PLAYER_TITLES = ["初心者", "修練者", "熟練者", "探求者", "到達者", "解放者", "支配者", "超越者", "救世主", "極致：唯一神"];

let player = { 
  inventory: { 0:1 }, deathCount:0, baseAtk:10n, baseHP:100n, maxDmg:0n, 
  storySeen:false, hasHado:false, isUra:false, bossMaxHP: BOSS_MAX_HP_BASE.toString(), 
  uraAtkMult: "1", totalClicks: 0, totalRelics: 0,
  maxLvReached: 1 // 称号モーダル初回判定用
};
let currentBossHP = BigInt(player.bossMaxHP);
let attackInterval = null;
let isModalOpen = false;

const RELIC_MASTER = [
  {id:0, star:8, name:"再起の誓い"},
  {id:101, star:1, name:"剣士の欠片", atk:7.4, hp:0}, {id:102, star:1, name:"狩人の欠片", atk:8.1, hp:0}, {id:103, star:1, name:"暗殺者の欠片", atk:9.6, hp:0}, {id:104, star:1, name:"狂戦士の欠片", atk:10.3, hp:0}, {id:105, star:1, name:"武闘家の欠片", atk:6.7, hp:0}, {id:106, star:1, name:"衛兵の欠片", atk:0, hp:45.2}, {id:107, star:1, name:"騎士の欠片", atk:0, hp:55.9}, {id:108, star:1, name:"重装兵の欠片", atk:0, hp:65.4}, {id:109, star:1, name:"修道士の欠片", atk:0, hp:40.3}, {id:110, star:1, name:"盾持ちの欠片", atk:0, hp:50.8}, {id:111, star:1, name:"魔法使いの欠片", atk:4.2, hp:35.7}, {id:112, star:1, name:"斥候の欠片", atk:3.9, hp:48.1}, {id:113, star:1, name:"冒険者の欠片", atk:5.4, hp:42.6}, {id:114, star:1, name:"見習いの欠片", atk:2.1, hp:30.5}, {id:115, star:1, name:"放浪者の欠片", atk:4.7, hp:44.2}, {id:116, star:1, name:"メモリーダスト", atk:1.3, hp:10.9},
  {id:201, star:2, name:"聖騎士の欠片", atk:41.2, hp:682.4}, {id:202, star:2, name:"龍騎士の欠片", atk:86.7, hp:423.1}, {id:203, star:2, name:"暗黒騎士の欠片", atk:134.2, hp:0}, {id:204, star:2, name:"賢者の欠片", atk:52.1, hp:711.2}, {id:205, star:2, name:"大魔道士の欠片", atk:118.9, hp:24.3}, {id:206, star:2, name:"暗殺王の欠片", atk:156.3, hp:12.7}, {id:207, star:2, name:"重装騎士の欠片", atk:0, hp:1248.6}, {id:208, star:2, name:"拳聖の欠片", atk:99.2, hp:315.4}, {id:209, star:2, name:"神官の欠片", atk:4.2, hp:1486.7}, {id:210, star:2, name:"冒険王の欠片", atk:73.3, hp:594.1},
  {id:301, star:3, name:"聖龍騎士の欠片", atk:874.3, hp:6924.1}, {id:302, star:3, name:"深淵魔導の欠片", atk:1324.1, hp:214.7}, {id:303, star:3, name:"金剛武神の欠片", atk:412.8, hp:14863.2}, {id:304, star:3, name:"暗黒皇帝の欠片", atk:1568.4, hp:0}, {id:305, star:3, name:"大聖者の欠片", atk:52.7, hp:15241.4}, {id:306, star:3, name:"影の支配者の欠片", atk:1410.9, hp:128.4}, {id:307, star:3, name:"竜血闘士の欠片", atk:1024.2, hp:4210.9}, {id:308, star:3, name:"天界騎士の欠片", atk:612.7, hp:9845.1}, {id:309, star:3, name:"虚空の暗殺者の欠片", atk:1624.8, hp:42.1}, {id:310, star:3, name:"極大賢者の欠片", atk:542.1, hp:11840.7},
  {id:401, star:4, name:"【不退転】武神の魂", atk:65000, hp:180000}, {id:402, star:4, name:"【刹那】聖者の遺志", atk:50000, hp:250000}, {id:403, star:4, name:"【因果】魔導王の記憶", atk:75000, hp:150000}, {id:404, star:4, name:"【反撃】勇者の残光", atk:90000, hp:120000}, {id:405, star:4, name:"【魂研】賢者の叡智", atk:55000, hp:220000}, {id:406, star:4, name:"【死刻】死神の鎌", atk:110000, hp:80000},
  {id:501, star:5, name:"断絶の権能", atk:382660, hp:916330}, {id:502, star:5, name:"強欲の権能", atk:649800, hp:812400}, {id:503, star:5, name:"超越の権能", atk:524180, hp:689450}, {id:504, star:5, name:"破壊の権能", atk:999999, hp:0},
  {id:601, star:6, name:"絶対統率レリック・オーバーロード", atk:1500000, hp:4500000, mult:1.1}, {id:602, star:6, name:"魂律解放レリ・クシア", atk:2500000, hp:3500000, mult:1.1}, {id:603, star:6, name:"原初核冠レリコア・レガリア", atk:2000000, hp:4000000, mult:1.1}, {id:604, star:6, name:"虚無終焉レリ・ノヴァ", atk:5000000, hp:0, mult:1.1},
  {id:701, star:7, name:"パンドラの箱", atk:150000000, hp:350000000, mult:100.0}
];

function getExpThreshold(lv) { if (lv <= 1) return 0; let t = 1000; for (let i = 2; i < lv; i++) t *= i; return t; }
function getLevelByDeath() { let lv = 1; while (lv < 10 && player.deathCount >= getExpThreshold(lv + 1)) lv++; return lv; }

function getRelicBonus() {
  let atk = 0, hp = 0, mult = 1.0, count = 0;
  Object.entries(player.inventory).forEach(([id, n]) => {
    if(id=="0") return; count += n; const r = RELIC_MASTER.find(m=>m.id==id); if(!r) return;
    let bA = (r.atk||0)*n, bH = (r.hp||0)*n; if(player.hasHado && r.star==1) { bA*=10; bH*=10; }
    atk += bA; hp += bH; if(r.mult) mult *= Math.pow(r.mult, n);
  });
  if(player.inventory[602]) atk += (count * player.inventory[602]);
  return { atk: BigInt(Math.floor(atk)), hp: BigInt(Math.floor(hp)), mult };
}

function calcFinalDmgMult() { 
  const lv = getLevelByDeath() + (player.inventory[601] || 0);
  let mult = 1.0 + (player.totalClicks * (0.0000004 * lv + (player.inventory[406] || 0) * 0.000004));
  mult += ((player.inventory[504] || 0) * 0.01) + (Object.keys(player.inventory).length * 0.01 * (player.inventory[603] || 0)) + (9.99 * (player.inventory[604] || 0));
  return mult * Math.pow(1.1, (player.inventory[503] || 0)); 
}

function refreshUI() {
  const b = getRelicBonus(); const lv = getLevelByDeath();
  const fMult = calcFinalDmgMult();
  document.getElementById("p-atk").innerText = BigInt(Math.floor(Number(player.baseAtk + b.atk) * b.mult)).toLocaleString();
  document.getElementById("p-hp").innerText = BigInt(Math.floor(Number(player.baseHP + b.hp) * b.mult)).toLocaleString();
  document.getElementById("bosshp-cur").innerText = currentBossHP.toLocaleString();
  document.getElementById("hp-bar-fill").style.width = `${Number(currentBossHP * 100n / BigInt(player.bossMaxHP))}%`;
  
  const area = document.getElementById("st-rank-area"); const title = document.getElementById("st-rank-title");
  document.getElementById("st-rank-lv").innerText = `魂の核 Lv.${lv}`;
  title.innerText = PLAYER_TITLES[Math.min(9, lv-1)];
  area.className = "rank-display " + (lv<=3?"rank-iron":lv<=5?"rank-abyss":lv==6?"rank-magenta":lv<=8?"rank-regal":lv==9?"rank-divine":"rank-god");

  const tid = document.querySelector(".tab.active").id;
  if(tid=='relic') renderRelics(); else if(tid=='status') {
    document.getElementById("st-totalclicks").innerText = player.totalClicks;
    document.getElementById("v-death").innerText = player.deathCount;
    document.getElementById("st-totalrelics").innerText = player.totalRelics;
    document.getElementById("st-dmgmult").innerText = fMult.toFixed(6);
  } else if(tid=='vow') renderVow(lv);
}

function renderVow(lv) {
  const effLv = lv + (player.inventory[601] || 0);
  const v = [
    {n:"不退転の力", d:"遺物ボーナス増加", h:`+${effLv-1 + (player.inventory[401]||0)}`},
    {n:"刹那の堆積", d:"HP増加幅増加", h:`+${effLv + (player.inventory[402]||0)*5}`},
    {n:"因果の拒絶", d:"ダメージ無効化", h:`${Math.min(90, effLv*2 + (player.inventory[403]||0))}%`},
    {n:"死を刻む", d:"現在ダメージ倍率", h:`x${calcFinalDmgMult().toFixed(3)}`}
  ];
  document.getElementById("vow-list").innerHTML = v.map(s=>`<div style="border-left:4px solid gold; padding:8px; margin-bottom:8px; background:#fff;"><b>${s.n}</b> <small style="color:#888;">(実効Lv.${effLv})</small><br><span style="color:var(--primary); font-weight:bold;">${s.h}</span><br><small>${s.d}</small></div>`).join("");
}

function renderRelics() {
  document.getElementById("relic-list").innerHTML = Object.entries(player.inventory).filter(([id,n])=>n>0).map(([id,n])=>{
    const m = RELIC_MASTER.find(x=>x.id==id);
    return `<div class="relic-card-ui ${m.star>=4?'star-high':''}"><b>★${m.star} ${m.name}</b><br>所持:${n}</div>`;
  }).join("");
}

function attack() {
  if(isModalOpen) return; player.totalClicks++;
  const b = getRelicBonus(); const fMult = calcFinalDmgMult();
  let dmg = BigInt(Math.floor(Number(player.baseAtk + b.atk) * b.mult * (0.8 + Math.random()*0.4) * fMult)) || 1n;
  if(dmg > player.maxDmg) player.maxDmg = dmg;

  if(dmg >= currentBossHP) {
    if(player.inventory[701]) { currentBossHP = 0n; isModalOpen = true; document.getElementById("clear-modal").style.display = "flex"; }
    else { currentBossHP = BigInt(player.bossMaxHP); addLog("<span style='color:red;'>神の回帰：HP全回復</span>"); }
  } else {
    currentBossHP -= dmg; if(currentBossHP < 1n) currentBossHP = 1n;
  }

  // 反撃と成長
  const lv = getLevelByDeath(); const effLv = lv + (player.inventory[601] || 0);
  let enemyDmg = BigInt(Math.floor(Number(MAJIN_ATK_BASE * BigInt(player.uraAtkMult)) * (1 - (Math.random() * (100 - (effLv*2)) / 100))));
  const curMaxHP = BigInt(Math.floor(Number(player.baseHP + b.hp) * b.mult));

  if(curMaxHP > enemyDmg) {
    addLog(`攻撃：${dmg.toLocaleString()} ダメージ`);
    if(Math.random() < (0.05 + (player.inventory[401]||0)*0.01)) dropRelic(lv);
  } else {
    let up = BigInt(Math.floor(Math.random() * player.deathCount) + effLv + (player.inventory[402]||0)*5 + 1);
    player.baseHP += up; player.deathCount += (effLv + (player.inventory[405]||0));
    addLog(`<span style="color:#888;">再起の誓いによって新たなる力を得た (+HP)</span>`);
    dropRelic(lv);
  }
  
  // 称号モーダル：新規レベル到達時のみ表示
  if(getLevelByDeath() > player.maxLvReached) {
    player.maxLvReached = getLevelByDeath();
    openRankUpModal(player.maxLvReached);
  }

  saveGame(); refreshUI();
}

function dropRelic(lv) {
  const roll = Math.random() * 100; let star = 1;
  if(roll < 0.1) star = 7; else if(roll < 1) star = 6; else if(roll < 5) star = 5; else if(roll < 15) star = 4; else if(roll < 35) star = 3; else if(roll < 65) star = 2;
  const pool = RELIC_MASTER.filter(r => r.star === star);
  if(pool.length > 0) {
    const r = pool[Math.floor(Math.random() * pool.length)];
    const isNew = !player.inventory[r.id] || player.inventory[r.id] === 0;
    player.inventory[r.id] = (player.inventory[r.id] || 0) + 1;
    player.totalRelics++;
    // 遺物モーダル：新規獲得時のみ表示
    if(isNew && r.star >= 4) {
      isModalOpen = true;
      document.getElementById("rare-name-label").innerText = `★${r.star} ${r.name}`;
      document.getElementById("rare-desc-label").innerText = "新規獲得しました";
      document.getElementById("rare-drop-modal").style.display = "flex";
    }
  }
}

function addLog(h) {
  const l = document.getElementById("log"); const d = document.createElement("div"); d.style.padding="2px 0; border-bottom:1px solid #eee;"; d.innerHTML = h;
  l.prepend(d); if(l.childNodes.length > 15) l.removeChild(l.lastChild);
}

function openRankUpModal(n) { isModalOpen=true; document.getElementById("rank-up-msg-text").innerText = `魂の核が昇華した：${PLAYER_TITLES[n-1]}`; document.getElementById("rank-up-modal").style.display="flex"; }
function closeRankUpModal() { document.getElementById("rank-up-modal").style.display="none"; isModalOpen=false; refreshUI(); }
function closeRareModal() { document.getElementById("rare-drop-modal").style.display="none"; isModalOpen=false; }
function closeStory() { player.storySeen=true; document.getElementById("story-modal").style.display="none"; saveGame(); }
function closeClearModal() { player.isUra=true; player.bossMaxHP=(BigInt(player.bossMaxHP)*2n).toString(); player.uraAtkMult=(Number(player.uraAtkMult)*2).toString(); currentBossHP=BigInt(player.bossMaxHP); document.getElementById("clear-modal").style.display="none"; isModalOpen=false; refreshUI(); }
function showTab(id) { document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active")); document.getElementById(id).classList.add("active"); document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active")); document.getElementById("nav-"+id).classList.add("active"); refreshUI(); }
function saveGame() { localStorage.setItem(SAVE_KEY, JSON.stringify({...player, baseAtk:player.baseAtk.toString(), baseHP:player.baseHP.toString()})); }
function loadGame() { 
  let s = localStorage.getItem(SAVE_KEY); 
  if(s){ 
    let d=JSON.parse(s); Object.assign(player, d); 
    player.baseAtk=BigInt(d.baseAtk); player.baseHP=BigInt(d.baseHP); 
    currentBossHP=BigInt(player.bossMaxHP);
    // 既存データへの後付け対応
    if(!player.maxLvReached) player.maxLvReached = getLevelByDeath();
  } 
  if(!player.storySeen) document.getElementById("story-modal").style.display="flex"; 
}
function resetData() { if(confirm("全データを削除します。よろしいですか？")) { localStorage.clear(); location.reload(); } }

const abtn = document.getElementById("attackBtn");
abtn.addEventListener("pointerdown", (e)=>{ e.preventDefault(); if(!isModalOpen && !attackInterval) { attack(); attackInterval = setInterval(attack, 120); } });
window.addEventListener("pointerup", ()=>{ clearInterval(attackInterval); attackInterval=null; });

loadGame(); refreshUI();
</script>
</body>
</html>
