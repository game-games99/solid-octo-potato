<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RELICORE v1.25</title>
<style>
    body { background: #000; color: #fff; font-family: monospace; padding: 20px; margin: 0; }
    #game-log { height: 300px; overflow-y: auto; border: 1px solid #444; padding: 10px; margin-bottom: 10px; background: #111; font-size: 0.9em; }
    button { padding: 15px 30px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; }
    button:hover { background: #555; }
    #status { margin-bottom: 20px; }
</style>
</head>
<body>

<div id="status">
    <div id="boss-hp">神のHP: 読み込み中...</div>
    <div id="player-stats">ATK: 10 / HP: 100</div>
</div>
<div id="game-log"></div>
<button id="attack-button">攻撃</button>

<script>
    let gameState = {
        player: { hp: 100n, atk: 10n, memoryDust: 0n, deathCount: 0, relics: { "PandorasBox": true } },
        boss: { name: "終末神アポカリス＝ティア", hp: 100000000000000000000n, maxHp: 100000000000000000000n }
    };

    function logMessage(msg) {
        const log = document.getElementById("game-log");
        const entry = document.createElement("div");
        entry.textContent = msg + " 再起の誓いによって新たなる力を得た。";
        log.prepend(entry);
    }

    function updateUI() {
        document.getElementById("boss-hp").textContent = "神のHP: " + gameState.boss.hp.toString();
        document.getElementById("player-stats").textContent = "ATK: " + gameState.player.atk.toString() + " / HP: " + gameState.player.hp.toString();
    }

    function attackAction() {
        let damage = gameState.player.atk;
        if (damage >= gameState.boss.hp) {
            if (gameState.player.relics["PandorasBox"]) {
                gameState.boss.hp = 0n;
                logMessage("神を討ち倒した！");
            } else {
                gameState.boss.hp = 1n;
                logMessage("神はHP1からすべてを回復した。");
            }
        } else {
            gameState.boss.hp -= damage;
            logMessage(damage + " ダメージを与えた。");
        }
        saveGame();
        updateUI();
    }

    function saveGame() {
        localStorage.setItem("RELICORE_SAVE", JSON.stringify({
            p: { hp: gameState.player.hp.toString(), atk: gameState.player.atk.toString(), dust: gameState.player.memoryDust.toString() },
            b: { hp: gameState.boss.hp.toString() }
        }));
    }

    function init() {
        const saved = localStorage.getItem("RELICORE_SAVE");
        if (saved) {
            const data = JSON.parse(saved);
            gameState.player.hp = BigInt(data.p.hp);
            gameState.player.atk = BigInt(data.p.atk);
            gameState.boss.hp = BigInt(data.b.hp);
        }
        updateUI();
    }

    document.getElementById("attack-button").addEventListener("click", attackAction);
    init();
</script>
</body>
</html>
