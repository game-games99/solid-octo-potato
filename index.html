<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Immortal Undead</title>
<style>
body{
background:#111;
color:#eee;
font-family:monospace;
text-align:center;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}

.box{
border:1px solid #555;
padding:10px;
margin:10px;
}
</style>
</head>

<body>

<h1>Immortal Undead</h1>

<div class="box">
<h3>Player</h3>
<div id="player"></div>
</div>

<div class="box">
<h3>Enemy</h3>
<div id="enemy"></div>
</div>

<div class="box">
<button onclick="fight()">Fight</button>
<button onclick="nextEnemy()">Next Enemy</button>
</div>

<div class="box">
<h3>Log</h3>
<div id="log"></div>
</div>

<script>

let player = {
baseAtk:10,
baseHp:100,
gearAtk:0,
gearHp:0,
hp:100,
job:"Zombie",
deaths:0,
bases:0
}

let worldLevel=1

const adjectives=[
"Mad","Cursed","Ancient","Dark","Bloody","Chaos","Void",
"Abyss","Fallen","Savage","Doom","Infernal","Shadow",
"Forgotten","Raging","Night","Phantom","Dread"
]

const jobs=[
"Villager","Farmer","Thief","Assassin","Knight",
"Soldier","Mage","Priest","Hunter","Mercenary",
"Dark Knight","Paladin","Warrior","Bandit",
"Summoner","Alchemist","Berserker","Hero"
]

const places=[
"Village","Town","Fort","Castle","Ruins"
]

const ranks=[
{n:"Normal",m:1},
{n:"Strong",m:2},
{n:"Elite",m:5},
{n:"Boss",m:15},
{n:"Catastrophe",m:50}
]

let enemy={}

function rand(a){
return a[Math.floor(Math.random()*a.length)]
}

function nextEnemy(){

let adj=rand(adjectives)
let job=rand(jobs)
let place=rand(places)
let rank=rand(ranks)

let baseHp=50+Math.random()*50
let baseAtk=5+Math.random()*10

let pAtk=getPlayerAtk()
let pHp=getPlayerHp()

enemy={
name:rank.n+" "+adj+" "+job+" ("+place+")",
job:job,
hp:Math.floor((baseHp+pAtk*2)*(1+worldLevel*0.05)*rank.m),
atk:Math.floor((baseAtk+pHp*0.05)*(1+worldLevel*0.03)*rank.m),
maxHp:0
}

enemy.maxHp=enemy.hp

draw()

}

function getPlayerAtk(){
return player.baseAtk+player.gearAtk
}

function getPlayerHp(){
return player.baseHp+player.gearHp
}

function fight(){

let pAtk=getPlayerAtk()

enemy.hp-=pAtk

player.hp-=enemy.atk

log("You hit "+pAtk)
log(enemy.name+" hits "+enemy.atk)

if(enemy.hp<=0){
victory()
return
}

if(player.hp<=0){
death()
return
}

draw()

}

function victory(){

log("Enemy defeated!")

player.job=enemy.job

dropGear()

if(Math.random()<0.2){
player.bases++
log("Base captured!")
}

worldLevel++

player.hp=getPlayerHp()

nextEnemy()

}

function dropGear(){

let atk=Math.floor(Math.random()*10)+1
let hp=Math.floor(Math.random()*20)+5

player.gearAtk+=atk
player.gearHp+=hp

log("Gear absorbed +ATK "+atk+" +HP "+hp)

}

function death(){

log("You died")

player.deaths++

player.baseAtk+=2
player.baseHp+=10

player.hp=getPlayerHp()

worldLevel++

nextEnemy()

}

function draw(){

document.getElementById("player").innerHTML=
`
Job: ${player.job}<br>
HP: ${player.hp}/${getPlayerHp()}<br>
ATK: ${getPlayerAtk()}<br>
Base ATK: ${player.baseAtk}<br>
Base HP: ${player.baseHp}<br>
Gear ATK: ${player.gearAtk}<br>
Gear HP: ${player.gearHp}<br>
Deaths: ${player.deaths}<br>
Bases: ${player.bases}<br>
World Level: ${worldLevel}
`

document.getElementById("enemy").innerHTML=
`
${enemy.name}<br>
HP: ${enemy.hp}/${enemy.maxHp}<br>
ATK: ${enemy.atk}
`

}

function log(t){
document.getElementById("log").innerHTML=t+"<br>"+document.getElementById("log").innerHTML
}

nextEnemy()

</script>

</body>
</html>
