<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haxla Tower</title>

<style>
body{background:#111;color:#fff;font-family:sans-serif;margin:0;font-size:18px}
#top{background:#1a1a1a;padding:10px;position:sticky;top:0}
button{font-size:18px;padding:10px;margin:3px;border:none;border-radius:8px}
#auto.on{background:#00c853}
#auto.off{background:#444}
.bar{height:18px;background:#333;border-radius:5px;margin:4px 0}
.fill{height:100%;background:#00e676;border-radius:5px}
.enemyfill{background:#ff5252}
.expfill{background:#40c4ff}
.tab{display:none;padding:10px}
.active{display:block}
.item{border-bottom:1px solid #333;padding:5px}
.common{color:#fff}
.uncommon{color:#00e676}
.rare{color:#00b0ff}
.epic{color:#aa00ff}
.legend{color:#ffd600}
.equipMark{color:#ffd600;font-weight:bold}
</style>
</head>

<body>

<div id="top">

<div id="playerStats"></div>

HP
<div class="bar">
<div id="hpbar" class="fill"></div>
</div>

EXP
<div id="exptext"></div>

<div class="bar">
<div id="expbar" class="fill expfill"></div>
</div>

<button onclick="attack()">攻撃</button>

<button id="auto" class="off" onclick="toggleAuto()">AUTO OFF</button>

<br>

<button onclick="showTab('battle')">戦闘</button>
<button onclick="showTab('equip')">装備</button>
<button onclick="showTab('job')">ジョブ</button>
<button onclick="showTab('move')">移動</button>

</div>


<div id="battle" class="tab active">

<div id="enemyStats"></div>

<div class="bar">
<div id="enemyhp" class="fill enemyfill"></div>
</div>

<div id="log"></div>

</div>


<div id="equip" class="tab">

<b>装備中</b>

<div id="equipped"></div>

<hr>

<b>所持品</b>

<div id="inventory"></div>

</div>


<div id="job" class="tab">

<b>現在のジョブ:
<span id="currentJob"></span>
</b>

<hr>

<div id="jobList"></div>

</div>


<div id="move" class="tab">

<input id="floorInput" type="number" placeholder="1〜1000">

<button onclick="moveFloor()">移動</button>

</div>


<script>


// ===== セーブ =====

let player

function save(){

localStorage.haxla=JSON.stringify(player)

}

function load(){

if(localStorage.haxla){

player=JSON.parse(localStorage.haxla)

}else{

player={

floor:1,
level:1,

exp:0,
expMax:50,

hp:100,
maxhp:100,

baseAtk:10,
baseDef:5,

atk:10,
def:5,

job:"剣士",

weapon:null,
armor:null,

inventory:[],

auto:false

}

}

}

load()


// ===== ジョブ =====

const jobs={

剣士:{atk:1.2,def:1,desc:"バランス型"},

ナイト:{atk:1,def:1.6,desc:"防御特化"},

アサシン:{atk:1.6,def:0.8,desc:"高火力"},

魔法使い:{atk:1.8,def:0.6,desc:"超火力"}

}


// ===== 敵 =====

const enemyNames=[

"スライム","ウルフ","ゴブリン",

"オーク","トロール","ガーゴイル",

"デーモン","魔騎士","死神",

"天使","神兵","神獣",

"ドラゴン","リッチ","巨人"

]


let enemy


function createEnemy(){

let f=player.floor

let name=enemyNames[rand(0,enemyNames.length-1)]

let pow=f

enemy={

name,

hp:40+pow*12,

atk:6+pow*3,

def:3+pow*2

}

enemy.maxhp=enemy.hp

}


// ===== ステ計算 =====

function recalc(){

player.atk=player.baseAtk+player.level*3

player.def=player.baseDef+player.level*2


if(player.weapon){

player.atk+=player.weapon.atk

player.def+=player.weapon.def

}


if(player.armor){

player.atk+=player.armor.atk

player.def+=player.armor.def

}


let job=jobs[player.job]

player.atk=Math.floor(player.atk*job.atk)

player.def=Math.floor(player.def*job.def)

}


// ===== 戦闘 =====

function attack(){

if(!enemy)createEnemy()

let dmg=Math.max(1,player.atk-enemy.def)

enemy.hp-=dmg

log("→ "+enemy.name+" "+dmg)


if(enemy.hp<=0){

win()

}else{

enemyAttack()

}


updateUI()

}


function enemyAttack(){

let dmg=Math.max(1,enemy.atk-player.def)

player.hp-=dmg

log("← "+dmg)


if(player.hp<=0){

player.hp=player.maxhp

player.floor--

createEnemy()

}

}


// ===== 勝利 =====

function win(){

log(enemy.name+" 撃破")

player.exp+=20

player.floor++

createEnemy()

save()

}


// ===== 移動（修正済み） =====

function moveFloor(){

let val=document.getElementById("floorInput").value

if(val==="")return

let f=parseInt(val)

if(isNaN(f))return

player.floor=Math.max(1,Math.min(1000,f))

createEnemy()

updateUI()

save()

}


// ===== AUTO =====

let autoTimer=null


function toggleAuto(){

player.auto=!player.auto

let btn=document.getElementById("auto")


if(player.auto){

btn.className="on"

btn.innerText="AUTO ON"

autoTimer=setInterval(attack,300)

}else{

btn.className="off"

btn.innerText="AUTO OFF"

clearInterval(autoTimer)

}

}


// ===== UI =====

function updateUI(){

playerStats.innerHTML=

`階:${player.floor}
Lv:${player.level}
HP:${player.hp}/${player.maxhp}
ATK:${player.atk}
DEF:${player.def}
JOB:${player.job}`


enemyStats.innerHTML=

`${enemy.name}
HP:${enemy.hp}/${enemy.maxhp}`


exptext.innerText=

player.exp+"/"+player.expMax


hpbar.style.width=(player.hp/player.maxhp*100)+"%"

enemyhp.style.width=(enemy.hp/enemy.maxhp*100)+"%"

expbar.style.width=(player.exp/player.expMax*100)+"%"

}


// ===== log（修正済み） =====

function log(t){

document.getElementById("log").innerHTML=

t+"<br>"+

document.getElementById("log").innerHTML

}


// ===== その他 =====

function rand(a,b){

return Math.floor(Math.random()*(b-a+1))+a

}

function showTab(id){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")

}


// ===== 起動 =====

recalc()

createEnemy()

updateUI()

</script>


</body>
</html>
