<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>RELICORE v1.0</title>
    <style>
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: 'Sawarabi Mincho', serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #game-container { width: 100%; max-width: 900px; border: 2px solid #444; background: #1a1a1a; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .status-panel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .stat-item { background: #252525; padding: 10px; border-radius: 4px; border: 1px solid #3d3d3d; text-align: center; }
        .log-container { height: 400px; overflow-y: auto; background: #000; border: 1px solid #333; padding: 15px; margin-bottom: 20px; font-size: 0.95em; border-left: 4px solid #555; }
        .relic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top: 10px; max-height: 150px; overflow-y: auto; padding: 10px; background: #111; border: 1px solid #333; }
        .relic-item { font-size: 0.8em; color: #aaa; background: #222; padding: 4px 8px; border-radius: 2px; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn { background: #333; color: #fff; border: 1px solid #555; padding: 12px 24px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .btn:hover { background: #555; border-color: #888; }
        .btn-save { background: #1a3a1a; border-color: #2e5a2e; }
        .special-msg { color: #ff4444; font-weight: bold; padding: 10px; border: 1px solid #ff4444; margin: 10px 0; background: rgba(255,0,0,0.1); }
        .saiki-msg { color: #88ccff; font-style: italic; font-size: 0.9em; margin-bottom: 8px; }
        hr { border: 0; border-top: 1px solid #444; margin: 20px 0; }
    </style>
</head>
<body>

<div id="game-container">
    <h1 style="text-align: center; letter-spacing: 0.5em; color: #fff;">RELICORE <span style="font-size: 0.5em;">v1.0</span></h1>
    
    <div class="status-panel">
        <div class="stat-item">HP: <span id="hp">100</span> / <span id="maxHp">100</span></div>
        <div class="stat-item">ATK: <span id="atk">10</span></div>
        <div class="stat-item">Floor: <span id="stage">1</span></div>
    </div>

    <div id="battle-log" class="log-container"></div>

    <div class="btn-group">
        <button class="btn" onclick="processTurn()">探索を進める</button>
        <button class="btn btn-save" onclick="saveGame()">記録を刻む</button>
        <button class="btn" style="background:#3a1a1a" onclick="resetGame()">記憶を消去</button>
    </div>

    <hr>
    <div>【所持遺物】<span id="relic-count">0</span> / 54</div>
    <div id="relic-grid" class="relic-grid"></div>
</div>

<script>
/**
 * RELICORE v1.0
 * System Rules:
 * - 終末神アポカリス＝ティア(神)は「パンドラの箱」を所持し一撃で倒す必要がある
 * - 討伐メッセージは初回のみ表示
 * - ダメージ後は「再起の誓いによって新たなる力を得た」と表示
 */

let gameState = {
    version: "1.0",
    hp: 100,
    maxHp: 100,
    atk: 10,
    stage: 1,
    relics: [],
    defeatedBosses: [], // 初回討伐フラグ
    saveKey: "RELICORE_SYSTEM_DATA_V1"
};

const BOSS_NAME = "終末神アポカリス＝ティア";

// 遺物定義データ (54種類の一部抜粋、構造維持)
const RELIC_DATABASE = [
    { id: "R001", name: "古びた短剣", atk: 5, hp: 0, rank: 1 },
    { id: "R002", name: "鉄の胸当て", atk: 0, hp: 20, rank: 1 },
    { id: "R054", name: "パンドラの箱", atk: 500, hp: 1000, rank: 7 }
    // ... 他の51種も同様の構造で処理
];

function init() {
    const saved = localStorage.getItem(gameState.saveKey);
    if (saved) {
        const parsed = JSON.parse(saved);
        // バージョンアップに伴うフラグ追加
        if (!parsed.defeatedBosses) parsed.defeatedBosses = [];
        gameState = { ...gameState, ...parsed };
        log("深淵の記録を読み込みました。");
    } else {
        log("魂の循環が始まった。");
    }
    updateDisplay();
}

function log(msg, className = "") {
    const logEl = document.getElementById('battle-log');
    const div = document.createElement('div');
    if (className) div.className = className;
    div.textContent = msg;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
}

function updateDisplay() {
    document.getElementById('hp').textContent = Math.ceil(gameState.hp);
    document.getElementById('maxHp').textContent = Math.ceil(gameState.maxHp);
    document.getElementById('atk').textContent = Math.ceil(gameState.atk);
    document.getElementById('stage').textContent = gameState.stage;
    
    const grid = document.getElementById('relic-grid');
    grid.innerHTML = "";
    gameState.relics.forEach(r => {
        const item = document.createElement('div');
        item.className = 'relic-item';
        item.textContent = r;
        grid.appendChild(item);
    });
    document.getElementById('relic-count').textContent = gameState.relics.length;
}

function processTurn() {
    if (gameState.stage % 10 === 0) {
        battleBoss();
    } else {
        normalEncounter();
    }
    updateDisplay();
}

function normalEncounter() {
    const dmg = gameState.atk;
    log(`${gameState.stage}層の魔物に ${dmg} のダメージを与えた。`);
    log("再起の誓いによって新たなる力を得た", "saiki-msg");
    
    // 遺物獲得シミュレーション (簡略化)
    if (Math.random() < 0.2) {
        const relic = RELIC_DATABASE[Math.floor(Math.random() * (RELIC_DATABASE.length - 1))];
        if (!gameState.relics.includes(relic.name)) {
            gameState.relics.push(relic.name);
            gameState.atk += relic.atk;
            gameState.maxHp += relic.hp;
            log(`遺物【${relic.name}】を獲得した。`, "special-msg");
        }
    }
    
    gameState.stage++;
}

function battleBoss() {
    log(`--- ${BOSS_NAME} が現れた ---`);
    const bossHp = 2000 + (gameState.stage * 10);
    const damage = gameState.atk;
    const hasPandora = gameState.relics.includes("パンドラの箱");

    log(`${BOSS_NAME} に ${damage} のダメージを与えた。`);
    log("再起の誓いによって新たなる力を得た", "saiki-msg");

    // 神の撃破判定
    if (damage >= bossHp) {
        if (hasPandora) {
            handleBossDefeat(BOSS_NAME);
        } else {
            log(`${BOSS_NAME} のHPが1になった瞬間に全て回復した！`, "special-msg");
            log("「パンドラの箱」なき者に終わりは訪れない。");
        }
    } else {
        log(`${BOSS_NAME} は傷を一瞬で修復した。一撃で屠らねば倒すことはできない。`);
    }
}

function handleBossDefeat(bossId) {
    // 初回討伐時のみ特殊メッセージ
    if (!gameState.defeatedBosses.includes(bossId)) {
        const msg = document.createElement('div');
        msg.className = 'special-msg';
        msg.textContent = `【終末の終焉】${bossId}を完全に沈黙させた。世界の因果が逆転する。`;
        document.getElementById('battle-log').appendChild(msg);
        
        gameState.defeatedBosses.push(bossId);
    } else {
        log(`${bossId} を再び虚無へ送った。`);
    }
    
    gameState.stage++;
    log("次の階層への道が開かれた。");
}

function saveGame() {
    localStorage.setItem(gameState.saveKey, JSON.stringify(gameState));
    log("--- 進行状況を固定した ---");
}

function resetGame() {
    if (confirm("全ての記録を抹消しますか？")) {
        localStorage.removeItem(gameState.saveKey);
        location.reload();
    }
}

window.onload = init;
</script>

</body>
</html>
