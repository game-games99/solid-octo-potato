<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haxla Tower</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
font-size:18px;
margin:0;
}

#top{
background:#1a1a1a;
padding:10px;
position:sticky;
top:0;
}

button{
font-size:18px;
padding:10px;
margin:3px;
border:none;
border-radius:8px;
}

#auto.on{background:#00c853;}
#auto.off{background:#444;}

.bar{
height:18px;
background:#333;
border-radius:5px;
}

.fill{
height:100%;
background:#00e676;
}

.enemyfill{background:#ff5252;}
.expfill{background:#40c4ff;}

.tab{display:none;padding:10px;}
.active{display:block;}

.item{
border-bottom:1px solid #333;
padding:5px;
}

.common{color:white;}
.uncommon{color:#00e676;}
.rare{color:#00b0ff;}
.epic{color:#aa00ff;}
.legend{color:#ffd600;}

</style>
</head>
<body>


<div id="top">

<div id="stats"></div>

HP
<div class="bar"><div id="hpbar" class="fill"></div></div>

EXP
<div class="bar"><div id="expbar" class="fill expfill"></div></div>

<button onclick="attack()">攻撃</button>
<button id="auto" class="off" onclick="autoToggle()">AUTO</button>

<br>

<button onclick="tab('battle')">戦闘</button>
<button onclick="tab('equip')">装備</button>

</div>


<div id="battle" class="tab active">

<div id="enemy"></div>

<div class="bar">
<div id="enemybar" class="fill enemyfill"></div>
</div>

<div id="log"></div>

</div>


<div id="equip" class="tab">

装備中<br>

<div id="equipped"></div>

<hr>

所持品

<div id="inv"></div>

</div>


<script>


// ===== セーブ =====

function save(){

localStorage.haxla=JSON.stringify(player)

}

function load(){

if(localStorage.haxla){

player=JSON.parse(localStorage.haxla)

}

}


// ===== プレイヤー =====

let player={

floor:1,

level:1,

exp:0,

expMax:50,

hp:100,
maxhp:100,

atk:10,
def:5,

auto:false,

weapon:null,
armor:null,

inventory:[]

}

load()


// ===== 装備 =====

let weaponNames=[
"折れた剣","鉄の剣","騎士剣","聖剣","魔剣","神剣"
]

let armorNames=[
"布","革鎧","鎖鎧","騎士鎧","聖鎧","神鎧"
]

let rar=["common","uncommon","rare","epic","legend"]


// ===== 敵 =====

let enemy


function createEnemy(){

let f=player.floor

let name=""

if(f<50)name=["スライム","ウルフ","ゴブリン"][rand(0,2)]

else if(f<100)name=["スケルトン","ゾンビ","ガーゴイル"][rand(0,2)]

else if(f<200)name=["オーク","トロール"][rand(0,1)]

else if(f<400)name=["デーモン","魔騎士"][rand(0,1)]

else if(f<700)name=["堕天使","深淵竜"][rand(0,1)]

else if(f<1000)name=["神兵","天使"][rand(0,1)]

else name="塔の管理者"


enemy={

name,

hp:80+f*25,

atk:8+f*4,

def:4+f*2

}

enemy.maxhp=enemy.hp

}


// ===== 戦闘 =====

function attack(){

let dmg=Math.max(1,player.atk-enemy.def)

enemy.hp-=dmg

log("→"+dmg)


if(enemy.hp<=0){

win()

}else{

enemyAttack()

}

update()

}


function enemyAttack(){

let dmg=Math.max(1,enemy.atk-player.def)

player.hp-=dmg

log("被"+dmg)

if(player.hp<=0){

player.hp=player.maxhp

player.floor--

}

}


function win(){

log("撃破")

player.exp+=15

player.floor++

drop()

levelup()

createEnemy()

save()

}


// ===== レベル =====

function levelup(){

while(player.exp>=player.expMax){

player.exp-=player.expMax

player.level++

player.expMax*=1.25

player.maxhp+=25
player.atk+=6
player.def+=4

player.hp=player.maxhp

log("LvUP")

}

}


// ===== ドロップ =====

function drop(){

if(Math.random()<0.6){

let type=Math.random()<0.5?"weapon":"armor"

let name=(type=="weapon"?weaponNames:armorNames)[rand(0,5)]

let r=rar[rand(0,4)]

let item={

type,
name,

atk:rand(2,10),
def:rand(2,10),

rarity:r

}

player.inventory.push(item)

updateInv()

}

}


// ===== 装備 =====

function equip(i){

let item=player.inventory[i]

if(item.type=="weapon")player.weapon=item
else player.armor=item

recalc()

updateInv()

save()

}


function discard(i){

player.inventory.splice(i,1)

updateInv()

save()

}


function recalc(){

player.atk=10+player.level*3
player.def=5+player.level*2

if(player.weapon){

player.atk+=player.weapon.atk

}

if(player.armor){

player.def+=player.armor.def

}

}


// ===== UI =====

function update(){

stats.innerHTML=

`
階:${player.floor}

Lv:${player.level}

HP:${player.hp}/${player.maxhp}

ATK:${player.atk}

DEF:${player.def}
`

enemy.innerHTML=

`
${enemy.name}

HP:${enemy.hp}/${enemy.maxhp}
`

hpbar.style.width=(player.hp/player.maxhp*100)+"%"

enemybar.style.width=(enemy.hp/enemy.maxhp*100)+"%"

expbar.style.width=(player.exp/player.expMax*100)+"%"

updateInv()

}


function updateInv(){

equipped.innerHTML=

`
武器:${player.weapon?player.weapon.name:"なし"}

防具:${player.armor?player.armor.name:"なし"}
`

let html=""

player.inventory.forEach((i,x)=>{

html+=`

<div class="item ${i.rarity}">

${i.name}

<button onclick="equip(${x})">装備</button>

<button onclick="discard(${x})">捨てる</button>

</div>
`

})

inv.innerHTML=html

}


// ===== AUTO =====

function autoToggle(){

player.auto=!player.auto

auto.className=player.auto?"on":"off"

loop()

}


function loop(){

if(!player.auto)return

attack()

setTimeout(loop,350)

}


// ===== タブ =====

function tab(t){

document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"))

document.getElementById(t).classList.add("active")

}


// ===== その他 =====

function log(t){

log.innerHTML=t+"<br>"+log.innerHTML

}


function rand(a,b){

return Math.floor(Math.random()*(b-a+1))+a

}


// ===== 起動 =====

recalc()

createEnemy()

update()


</script>

</body>
</html>
