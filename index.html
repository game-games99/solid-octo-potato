<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RELICORE - v1.6 Debug</title>
<style>
 :root { --bg: #ffffff; --panel: #f8f9fa; --border: #dee2e6; --primary: #007bff; --text: #212529; --hp: #dc3545; --dark: #1a1a1a; --gold: #d4af37; --growth: #ff69b4; --relic-purple: #6610f2; --relic-bg: #fcfaff; }
 * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
 body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }

 .rank-display { text-align: center; padding: 10px 15px; border-radius: 12px; margin-bottom: 10px; border: 2px solid #333; transition: all 0.5s ease; background: #000; color: #fff; }
 .rank-lv { font-size: 0.75em; margin-bottom: 4px; font-weight: bold; }
 .rank-title { font-size: 1.25em; font-weight: bold; letter-spacing: 2px; }
 .rank-glow-mid { box-shadow: 0 0 15px rgba(102, 16, 242, 0.4); border-color: var(--relic-purple); }
 .rank-glow-high { box-shadow: 0 0 25px rgba(212, 175, 55, 0.6); border-color: var(--gold); animation: rank-pulse 2s infinite alternate; }
 .rank-glow-max { box-shadow: 0 0 40px rgba(255, 255, 255, 0.8); border-color: #fff; background: linear-gradient(135deg, #000 0%, #444 100%); animation: rank-ultra-glow 1.5s infinite alternate; }

 @keyframes rank-pulse { from { transform: scale(1); } to { transform: scale(1.02); } }
 @keyframes rank-ultra-glow { from { box-shadow: 0 0 20px #fff; } to { box-shadow: 0 0 50px gold, 0 0 20px #fff; } }

 #rank-up-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 50000; justify-content: center; align-items: center; padding: 20px; }
 .rank-up-content { background: #000; border: 2px solid var(--growth); border-radius: 20px; padding: 40px 20px; text-align: center; color: #fff; max-width: 450px; width: 95%; box-shadow: 0 0 40px rgba(255, 105, 180, 0.4); animation: heartbeat-pulse 2s infinite; }
 @keyframes heartbeat-pulse { 0% { transform: scale(1); } 5% { transform: scale(1.05); } 10% { transform: scale(1); } 100% { transform: scale(1); } }
 .rank-up-title { color: var(--growth); font-size: 1.6em; font-weight: bold; margin-bottom: 20px; }

 #rare-drop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 40000; justify-content: center; align-items: center; pointer-events: none; }
 .rare-card { background: #000; border: 2px solid #fff; border-radius: 15px; padding: 30px; text-align: center; color: #fff; transform: scale(0); animation: card-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; pointer-events: auto; min-width: 280px; }
 @keyframes card-pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
 .rare-star { font-size: 1.2em; margin-bottom: 10px; display: block; }
 .rare-name { font-size: 1.6em; font-weight: bold; margin-bottom: 15px; display: block; }
 .glow-6 { box-shadow: 0 0 35px #fd7e14; border-color: #fd7e14; }
 .glow-7 { box-shadow: 0 0 40px #ff0000; border-color: #ff0000; }

 #hado-awaken-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 30000; justify-content: center; align-items: center; padding: 20px; }
 .hado-content { background: #000; border: 3px solid var(--gold); border-radius: 20px; padding: 40px 20px; text-align: center; color: #fff; max-width: 450px; width: 95%; }

 #story-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; justify-content: center; align-items: center; padding: 20px; }
 .story-content { max-width: 500px; color: #fff; text-align: center; line-height: 2.2; }
 .story-vow { color: gold; font-weight: bold; animation: heart-beat 1.5s infinite; }
 @keyframes heart-beat { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
 .story-btn { background: none; border: 1px solid gold; color: gold; padding: 12px 40px; font-size: 1em; cursor: pointer; }

 .c1 { color: #888888; font-weight: bold; } .c2 { color: #28a745; font-weight: bold; } .c3 { color: #007bff; font-weight: bold; } .c4 { color: #6610f2; font-weight: bold; } .c5 { color: #e83e8c; font-weight: bold; } .c6 { color: #fd7e14; font-weight: bold; } .c7 { color: #ff0000; font-weight: bold; } .c8 { color: gold; font-weight: bold; }

 #header { background: var(--dark); color: #fff; padding: 12px 10px; border-bottom: 2px solid #000; }
 .hp-bar-container { background: #333; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 5px; width: 100%; }
 #hp-bar-fill { height: 100%; background: linear-gradient(90deg, #b02a37, #dc3545); width: 100%; transition: width 0.1s ease-out; }
 .hp-val-display { font-size: 1.4em; font-weight: bold; color: #ff6b6b; font-family: monospace; }
 .status-box { display: flex; gap: 8px; margin-top: 10px; }
 .stat-card { flex: 1; background: rgba(255,255,255,0.08); padding: 5px 10px; border-radius: 6px; border-left: 3px solid var(--primary); }
 .stat-val { font-size: 0.9em; font-weight: bold; color: #fff; }

 .nav { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); }
 .nav button { flex: 1; padding: 12px 0; border: none; background: none; color: #6c757d; font-weight: bold; }
 .nav button.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #fff; }

 #content-area { flex-grow: 1; overflow: hidden; background: #fff; }
 .tab { display: none; padding: 10px; height: 100%; overflow-y: auto; }
 .tab.active { display: block; }
 .btn-attack { width: 100%; padding: 16px; background: var(--primary); color: #fff; font-size: 1.3em; font-weight: bold; border: none; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 4px 0 #0056b3; }
 #log { height: 400px; font-size: 0.82em; background: #fafafa; border: 1px solid var(--border); padding: 10px; overflow-y: auto; border-radius: 8px; }
 .log-set { border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 8px; }

 .relic-list-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
 .relic-card { position: relative; border: 1px solid #e0d5f0; padding: 6px; border-radius: 6px; background: var(--relic-bg); display: flex; flex-direction: column; min-height: 70px; }
 .relic-card.star-low { grid-column: span 2; }
 .relic-card.star-high { grid-column: span 3; border-width: 2px; background: #fff; }
 .relic-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--relic-purple); border-radius: 6px 0 0 6px; }
 .relic-name { font-weight: bold; font-size: 0.65em; line-height: 1.2; }
 .relic-effect-box { font-size: 0.6em; color: #444; margin-top: 2px; }

 .st-box { background: #fff; border-left: 4px solid #28a745; border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; font-size: 0.82em; }
 .btn-reset { width: 100%; padding: 16px; background: #dc3545; color: #fff; border: none; border-radius: 8px; font-weight: bold; }
 .ver-footer { position: fixed; bottom: 4px; right: 4px; color: #bbb; font-size: 0.65em; pointer-events: none; }
</style>
</head>
<body>
<div id="rank-up-modal"><div class="rank-up-content"><div class="rank-up-title">覚醒</div><div class="rank-up-msg" id="rank-up-msg-text"></div><button class="story-btn" onclick="closeRankUpModal()">高みへ</button></div></div>
<div id="rare-drop-modal" onclick="closeRareModal()"><div id="rare-card-content" class="rare-card"><span id="rare-star-label" class="rare-star"></span><span id="rare-name-label" class="rare-name"></span><div id="rare-desc-label" class="rare-desc"></div></div></div>
<div id="hado-awaken-modal"><div class="hado-content"><div style="color:gold; font-size:1.5em; font-weight:bold;">【破軍の号令】覚醒</div><button class="story-btn" onclick="closeHadoModal()">承知した</button></div></div>
<div id="story-modal"><div class="story-content"><div class="story-text">...すべては虚無に飲まれたはずだった。しかし、<span class="story-vow">『再起の誓い』</span>が魂を激しく鼓動させる。奴を一撃で葬るその日まで、わたしは止まるときを知らない。</div><button class="story-btn" onclick="closeStory()">魂に刻印する</button></div></div>
<div id="clear-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center;"><div style="background:#1a1a1a; border:2px solid gold; border-radius:15px; padding:25px; text-align:center; color:#fff;"><h3>討伐成功</h3><p>神を討伐しました。</p><button class="story-btn" onclick="location.reload()">再誕へ</button></div></div>

<div id="header"><div style="text-align:center;"><div class="boss-name" id="boss-display-name">終末神アポカリス＝ティア</div><div class="hp-bar-container"><div id="hp-bar-fill"></div></div><div class="hp-val-display" id="bosshp-cur">0</div></div><div class="status-box"><div class="stat-card"><div class="stat-val" id="p-atk">0</div></div><div class="stat-card" style="border-left-color:var(--hp);"><div class="stat-val" id="p-hp">0</div></div></div></div>
<div class="nav"><button onclick="showTab('battle')" id="nav-battle" class="active">討伐</button><button onclick="showTab('vow')" id="nav-vow">再起</button><button onclick="showTab('relic')" id="nav-relic">遺物</button><button onclick="showTab('status')" id="nav-status">詳細</button></div>
<div id="content-area">
 <div id="battle" class="tab active"><button class="btn-attack" id="attackBtn">こうげき</button><div id="log"></div></div>
 <div id="vow" class="tab"><div id="vow-list"></div></div>
 <div id="relic" class="tab"><div class="relic-list-container" id="relic-list"></div></div>
 <div id="status" class="tab">
    <div class="rank-display" id="st-rank-area"><div class="rank-lv" id="st-rank-lv">Lv.1</div><div class="rank-title" id="st-rank-title"></div></div>
    <div class="st-box">累計遺物: <span id="st-totalrelics">0</span><br>最高ダメージ: <span id="st-maxdmg">0</span></div>
    <button class="btn-reset" onclick="resetData()">データリセット</button>
 </div>
</div>
<div class="ver-footer">RELICORE v1.6 (Debug)</div>

<script>
const BOSS_MAX_HP_BASE = 100000000000000000000n;
const MAJIN_ATK_BASE = 999999999999n;
const BASE_DROP_DATA = { 1:{p:98.88889,cond:0n}, 2:{p:1.0,cond:0n}, 3:{p:0.1,cond:0n}, 4:{p:0.01,cond:0n}, 5:{p:0.001,cond:0n}, 6:{p:0.0001,cond:0n}, 7:{p:0.00001,cond:0n} };

// デバッグ用初期データ（★6と★7を10個ずつ）
let player = { 
    inventory: { 
        0:1, 
        601:10, 602:10, 603:10, 604:10, 
        701:10, 702:10, 703:10 
    }, 
    deathCount:10000000, baseAtk:1000n, baseHP:10000n, maxDmg:0n, storySeen:true, hasHado:true, isUra:false, bossMaxHP: BOSS_MAX_HP_BASE.toString(), uraAtkMult: "1", totalClicks: 0, totalRelics: 70 
};
let currentBossHP = BigInt(player.bossMaxHP);
let attackInterval = null;
let isModalOpen = false;

const PLAYER_TITLES = ["初心者", "修練者", "熟練者", "探求者", "到達者", "解放者", "支配者", "超越者", "救世主", "極致：唯一神"];
const RELIC_MASTER = [
 {id:0, star:8, name:"再起の誓い", atk:0, hp:0, desc:"再誕の原点。"},
 {id:101, star:1, name:"剣士の欠片", atk:10, hp:0}, {id:106, star:1, name:"衛兵の欠片", atk:0, hp:100},
 {id:201, star:2, name:"聖騎士の欠片", atk:100, hp:1000}, {id:301, star:3, name:"聖龍騎士の欠片", atk:1000, hp:10000},
 {id:401, star:4, name:"【不退転】武神の魂", atk:65000, hp:180000}, {id:501, star:5, name:"断絶の権能", atk:382660, hp:916330},
 {id:601, star:6, name:"絶対統率レリック・オーバーロード", atk:1500000, hp:4500000, mult:1.1},
 {id:602, star:6, name:"魂律解放レリ・クシア", atk:2500000, hp:3500000, mult:1.1},
 {id:603, star:6, name:"原初核冠レリコア・レガリア", atk:2000000, hp:4000000, mult:1.1},
 {id:604, star:6, name:"虚無終焉レリ・ノヴァ", atk:5000000, hp:0, mult:1.1},
 {id:701, star:7, name:"パンドラの箱", atk:150000000, hp:350000000, mult:100.0},
 {id:702, star:7, name:"終焉の福音", atk:200000000, hp:450000000, mult:150.0},
 {id:703, star:7, name:"神滅のアカシックレコード", atk:100000000, hp:550000000, mult:200.0}
];

function getLevelByDeath() { return 10; }
function calcFinalDmgMult() { return 1000000.0; } // デバッグ用超火力

function attack() {
 if(isModalOpen) return;
 player.totalClicks++;
 const b = getRelicBonus();
 let finalDmg = BigInt(Math.floor(Number(player.baseAtk + b.atk) * b.mult * calcFinalDmgMult()));
 if(finalDmg > player.maxDmg) player.maxDmg = finalDmg;

 let logHtml = `<div><span style="color:#007bff; font-weight:bold;">攻撃！${finalDmg.toLocaleString()} ダメージ！</span></div>`;
 logHtml += getDropLog(100); // デバッグ用に100個ドロップさせて軽量化を確認

 if(finalDmg >= currentBossHP) {
     if((player.inventory[701] || 0) > 0) {
         currentBossHP = 0n; isModalOpen = true; document.getElementById("clear-modal").style.display = "flex";
     } else {
         currentBossHP = BigInt(player.bossMaxHP);
         logHtml += `<div><span style="color:#ff0000; font-weight:bold;">終焉の回帰……！ (HP全回復)</span></div>`;
     }
 } else {
     currentBossHP -= finalDmg;
 }
 addLog(logHtml); refreshUI();
}

function getDropLog(count) {
 let starGroups = { 1: {}, 2: {}, 3: {} };
 let others = {}; 
 for(let i=0; i < count; i++) {
     let rv = Math.random()*100, star=1;
     if(rv < 0.1) star=3; else if(rv < 2) star=2;
     let cands = RELIC_MASTER.filter(m => m.star === star && m.id !== 0); 
     let sel = cands[Math.floor(Math.random() * cands.length)];
     player.inventory[sel.id] = (player.inventory[sel.id] || 0) + 1;
     player.totalRelics++;
     if (star <= 3) starGroups[star][sel.id] = (starGroups[star][sel.id] || 0) + 1;
     else others[sel.id] = (others[sel.id] || 0) + 1;
 }
 
 let finalEntries = [];
 [1, 2, 3].forEach(s => {
     let group = starGroups[s];
     let totalInStar = Object.values(group).reduce((a, b) => a + b, 0);
     if (totalInStar >= 30) {
         finalEntries.push(`<span class="c${s}">★${s}遺物 合計${totalInStar}個</span>`);
     } else if (totalInStar > 0) {
         Object.entries(group).forEach(([id, c]) => {
             const m = RELIC_MASTER.find(x => x.id == id);
             finalEntries.push(`<span class="c${s}">★${s} ${m.name}${c > 1 ? '×' + c : ''}</span>`);
         });
     }
 });
 return finalEntries.length > 0 ? `<div style="font-size:0.82em;">獲得：${finalEntries.join(", ")}</div>` : "";
}

function getRelicBonus() {
 let atk = 0, hp = 0, mult = 1.0;
 Object.entries(player.inventory).forEach(([id, count]) => {
     const r = RELIC_MASTER.find(m => m.id == id); if(!r) return;
     atk += (r.atk || 0) * count; hp += (r.hp || 0) * count;
     if(r.mult) mult *= Math.pow(r.mult, count);
 });
 return { atk: BigInt(Math.floor(atk)), hp: BigInt(Math.floor(hp)), mult };
}

function refreshUI() {
 const b = getRelicBonus();
 document.getElementById("p-atk").textContent = "ATK: " + BigInt(Math.floor(Number(player.baseAtk + b.atk) * b.mult)).toLocaleString();
 document.getElementById("p-hp").textContent = "HP: " + BigInt(Math.floor(Number(player.baseHP + b.hp) * b.mult)).toLocaleString();
 document.getElementById("bosshp-cur").textContent = currentBossHP.toLocaleString();
 document.getElementById("hp-bar-fill").style.width = `${Number(currentBossHP * 100n / BigInt(player.bossMaxHP))}%`;
 document.getElementById("st-totalrelics").textContent = player.totalRelics.toLocaleString();
 document.getElementById("st-maxdmg").textContent = player.maxDmg.toLocaleString();
 if(document.getElementById("relic").classList.contains("active")) renderRelics();
}

function renderRelics() {
 const container = document.getElementById("relic-list");
 container.innerHTML = Object.entries(player.inventory).filter(([id, c]) => c > 0).map(([id, c]) => {
     const m = RELIC_MASTER.find(x => x.id == id);
     return `<div class="relic-card ${m.star>=4?'star-high':'star-low'}"><div class="relic-name c${m.star}">★${m.star} ${m.name}×${c}</div></div>`;
 }).join("");
}

function addLog(html) {
    const l = document.getElementById("log");
    const d = document.createElement("div"); d.className = "log-set"; d.innerHTML = html;
    l.insertBefore(d, l.firstChild);
    while (l.children.length > 15) l.removeChild(l.lastChild);
}

function showTab(id) {
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    refreshUI();
}

function stopAttack() { if (attackInterval) { clearInterval(attackInterval); attackInterval = null; } }
function resetData() { localStorage.clear(); location.reload(); }
function closeStory() { document.getElementById("story-modal").style.display = "none"; }
function closeRareModal() { document.getElementById("rare-drop-modal").style.display = "none"; isModalOpen = false; }

const btn = document.getElementById("attackBtn");
btn.addEventListener("pointerdown", (e) => { e.preventDefault(); if(!isModalOpen) { attack(); attackInterval = setInterval(attack, 120); } });
window.addEventListener("pointerup", stopAttack);

refreshUI();
</script>
</body>
</html>
