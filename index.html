<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Haxla Tower</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
font-size:18px;
}

#top{
padding:10px;
background:#1a1a1a;
position:sticky;
top:0;
z-index:10;
}

button{
font-size:18px;
padding:12px;
margin:4px;
border:none;
border-radius:8px;
}

.big{
width:48%;
}

#autoBtn.off{
background:#444;
color:white;
}

#autoBtn.on{
background:#00c853;
color:white;
box-shadow:0 0 10px #00c853;
}

.tab{
display:none;
padding:10px;
}

.active{
display:block;
}

.enemy{
font-size:22px;
margin:10px 0;
}

.hpbar{
height:20px;
background:#400;
margin:5px 0;
border-radius:5px;
}

.hp{
height:100%;
background:#f00;
border-radius:5px;
}

.playerhp{
background:#0f0;
}

.item{
padding:8px;
border-bottom:1px solid #333;
}

.equip{
background:#444;
}

.common{color:white;}
.uncommon{color:#00e676;}
.rare{color:#00b0ff;}
.epic{color:#aa00ff;}
.legend{color:#ffd600;}

</style>
</head>
<body>

<div id="top">

<div>
階層: <span id="floor">1</span>
Lv: <span id="level">1</span>
</div>

<div class="hpbar">
<div id="playerhp" class="hp playerhp"></div>
</div>

<button id="attackBtn" class="big">攻撃</button>
<button id="autoBtn" class="big off">AUTO OFF</button>

<br>

<button onclick="showTab('battle')">戦闘</button>
<button onclick="showTab('equip')">装備</button>
<button onclick="showTab('job')">ジョブ</button>
<button onclick="showTab('move')">移動</button>

</div>

<div id="battle" class="tab active">

<div class="enemy" id="enemyName"></div>

<div class="hpbar">
<div id="enemyhp" class="hp"></div>
</div>

<div id="log"></div>

</div>

<div id="equip" class="tab">

<h3>装備</h3>

<div id="equipped"></div>

<h3>所持品</h3>

<div id="inventory"></div>

</div>

<div id="job" class="tab">

<h3>ジョブ</h3>

<div id="jobList"></div>

</div>

<div id="move" class="tab">

<input id="moveInput" type="number" placeholder="移動階層">

<button onclick="move()">移動</button>

</div>

<script>

let player={
hp:100,
maxhp:100,
atk:10,
def:5,
level:1,
exp:0,
floor:1,
weapon:null,
armor:null,
job:"剣士"
}

let auto=false

let enemy

let inventory=[]

let jobs={
剣士:{
atk:1.2,
def:1
},
ナイト:{
atk:1,
def:1.5
},
アサシン:{
atk:1.5,
def:0.8
}
}

let enemyNames=[
"スライム",
"ゴブリン",
"ウルフ",
"オーク",
"ナイト",
"ドラゴン"
]

let weapons=[
"折れた剣",
"騎士の剣",
"聖剣",
"魔剣",
"神殺しの剣"
]

let armors=[
"革の鎧",
"騎士鎧",
"聖鎧",
"魔王鎧",
"神鎧"
]

let rarity=["common","uncommon","rare","epic","legend"]

function createEnemy(){

let tier=Math.floor(player.floor/10)

let name=enemyNames[Math.min(tier,enemyNames.length-1)]

enemy={
name:name,
hp:50+player.floor*10,
maxhp:50+player.floor*10,
atk:5+player.floor*2,
def:3+player.floor
}

}

function attack(){

let damage=Math.max(1,player.atk-enemy.def)

enemy.hp-=damage

log("敵に"+damage+"ダメージ")

if(enemy.hp<=0){

win()

}else{

enemyAttack()

}

update()

}

function enemyAttack(){

let damage=Math.max(1,enemy.atk-player.def)

player.hp-=damage

log("被ダメ "+damage)

if(player.hp<=0){

player.hp=player.maxhp

player.floor=Math.max(1,player.floor-1)

createEnemy()

}

}

function win(){

log(enemy.name+"撃破")

player.exp+=10

player.floor++

drop()

levelup()

createEnemy()

}

function levelup(){

let need=player.level*20

if(player.exp>=need){

player.exp-=need

player.level++

player.maxhp+=20

player.atk+=5

player.def+=3

player.hp=player.maxhp

log("レベルアップ！")

}

}

function drop(){

if(Math.random()<0.5){

let type=Math.random()<0.5?"weapon":"armor"

let name=(type=="weapon"?weapons:armors)[rand(0,4)]

let rar=rarity[rand(0,4)]

let item={
type:type,
name:name,
atk:rand(1,10),
def:rand(1,10),
rarity:rar
}

inventory.push(item)

updateInventory()

}

}

function update(){

playerhp.style.width=(player.hp/player.maxhp*100)+"%"

enemyhp.style.width=(enemy.hp/enemy.maxhp*100)+"%"

enemyName.innerText=enemy.name

floor.innerText=player.floor

level.innerText=player.level

}

function updateInventory(){

let html=""

inventory.forEach((i,index)=>{

html+=`

<div class="item ${i.rarity}">

${i.name}

<button onclick="equip(${index})">装備</button>

<button onclick="discard(${index})">捨てる</button>

</div>

`

})

inventory.innerHTML=html

}

function equip(i){

let item=inventory[i]

if(item.type=="weapon")player.weapon=item
if(item.type=="armor")player.armor=item

player.atk+=item.atk
player.def+=item.def

updateInventory()

}

function discard(i){

inventory.splice(i,1)

updateInventory()

}

function log(t){

logDiv.innerHTML=t+"<br>"+logDiv.innerHTML

}

function rand(a,b){

return Math.floor(Math.random()*(b-a+1))+a

}

attackBtn.onclick=attack

autoBtn.onclick=()=>{

auto=!auto

autoBtn.className=auto?"big on":"big off"

autoBtn.innerText=auto?"AUTO ON":"AUTO OFF"

autoLoop()

}

function autoLoop(){

if(!auto)return

attack()

setTimeout(autoLoop,1000)

}

function showTab(t){

document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"))

document.getElementById(t).classList.add("active")

}

function move(){

let f=parseInt(moveInput.value)

if(isNaN(f))return

player.floor=f

createEnemy()

update()

}

let logDiv=document.getElementById("log")

createEnemy()

updateInventory()

update()

</script>

</body>
</html>
