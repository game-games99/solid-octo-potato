<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NecroRise</title>
<style>
    body { font-family: 'Consolas', 'Courier New', monospace; background: #050505; color: #d1d1d1; text-align: center; margin: 0; }
    #game { max-width: 500px; margin: 0 auto; padding: 20px; }
    
    /* タブ */
    .tabs { display: flex; justify-content: center; margin-bottom: 15px; border-bottom: 1px solid #333; }
    .tab-btn { background: none; border: none; color: #666; padding: 10px 20px; cursor: pointer; font-family: inherit; }
    .tab-btn.active { color: #ff3e3e; border-bottom: 2px solid #ff3e3e; font-weight: bold; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* HPバー */
    .hp-wrapper { width: 100%; height: 18px; background: #222; border-radius: 4px; margin: 5px 0; overflow: hidden; border: 1px solid #444; position: relative; }
    .hp-bar { height: 100%; transition: width 0.1s ease; }
    .p-hp { background: linear-gradient(90deg, #27ae60, #2ecc71); }
    .e-hp { background: linear-gradient(90deg, #c0392b, #e74c3c); }
    .hp-text { position: absolute; width: 100%; top: 0; left: 0; font-size: 11px; line-height: 18px; color: white; text-shadow: 1px 1px 0 #000; }

    /* 敵表示エリア */
    .enemy-card { background: #111; padding: 15px; border-radius: 8px; border: 1px solid #222; margin-bottom: 20px; min-height: 140px; }
    .e-rank { font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .rank-1 { color: #888; } .rank-2 { color: #3498db; } .rank-3 { color: #9b59b6; } .rank-4 { color: #f1c40f; } .rank-5 { color: #e67e22; }
    .e-name { font-size: 18px; font-weight: bold; color: #eee; margin-bottom: 10px; }

    /* ボタン */
    #attackBtn { 
        width: 100%; height: 80px; font-size: 22px; font-weight: bold; font-family: inherit;
        background: #1a1a1a; color: #ff3e3e; border: 2px solid #ff3e3e; border-radius: 5px; cursor: pointer;
        box-shadow: 0 0 10px rgba(255, 62, 62, 0.2); transition: 0.1s; touch-action: manipulation;
    }
    #attackBtn:active { background: #ff3e3e; color: #fff; }

    /* ステータス */
    .stat-list { text-align: left; background: #111; padding: 15px; border-radius: 5px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-item { border-bottom: 1px solid #222; padding-bottom: 5px; }
    .stat-label { font-size: 10px; color: #666; display: block; }

    /* ログ */
    #log { text-align: left; height: 160px; overflow-y: auto; background:#000; padding:10px; border-radius:5px; margin-top:15px; font-size:12px; color: #888; border: 1px solid #111; }
    .log-win { color: #f1c40f; } .log-lose { color: #ff3e3e; }
</style>
</head>
<body>

<div id="game">
    <h2 style="color: #ff3e3e; letter-spacing: 4px;">NECR0RISE</h2>

    <div class="tabs">
        <button id="tab-b" class="tab-btn active" onclick="showTab('battle')">BATTLE</button>
        <button id="tab-s" class="tab-btn" onclick="showTab('status')">STATUS</button>
    </div>

    <div id="battle" class="tab-content active">
        <div class="enemy-card">
            <div id="eInfo" style="font-size: 11px; color: #555;">FLOOR 1</div>
            <div id="eRank" class="e-rank">COMMON</div>
            <div id="eName" class="e-name">---</div>
            <div class="hp-wrapper">
                <div id="eBar" class="hp-bar e-hp" style="width: 100%;"></div>
                <div id="eHPText" class="hp-text">0 / 0</div>
            </div>
            <div style="font-size: 13px;">ATK: <span id="eATK">0</span></div>
        </div>

        <div style="text-align: left; margin-bottom: 10px;">
            <div style="font-size: 11px; color: #555;">PLAYER HP</div>
            <div class="hp-wrapper">
                <div id="pBar" class="hp-bar p-hp" style="width: 100%;"></div>
                <div id="pHPText" class="hp-text">0 / 0</div>
            </div>
        </div>

        <button id="attackBtn">ATTACK</button>
    </div>

    <div id="status" class="tab-content">
        <div class="stat-list">
            <div class="stat-item"><span class="stat-label">BASE ATK</span><span id="sBaseATK">0</span></div>
            <div class="stat-item"><span class="stat-label">GEAR ATK</span><span id="sGearATK">0</span></div>
            <div class="stat-item"><span class="stat-label">BASE HP</span><span id="sBaseHP">0</span></div>
            <div class="stat-item"><span class="stat-label">GEAR HP</span><span id="sGearHP">0</span></div>
            <div class="stat-item"><span class="stat-label">DEATHS</span><span id="sDeath">0</span></div>
            <div class="stat-item"><span class="stat-label">DUNGEON</span><span id="sDungeon">---</span></div>
        </div>
    </div>

    <div id="log"></div>
</div>

<script>
// データ定義
const dungeonTypes = ["辺境の村", "荒廃した街", "鉄血の砦", "呪われた城"];
const adjectives = ["狂気の", "闇の", "虚無の", "混沌の", "影の", "血塗られた", "静寂の", "魂を喰らう", "震える", "異形の"];
const nicknames = [
    { n: "ありふれた", m: 1.0, r: "COMMON", c: "rank-1", p: 0.5 },
    { n: "珍しい", m: 1.8, r: "RARE", c: "rank-2", p: 0.3 },
    { n: "強力な", m: 3.2, r: "EPIC", c: "rank-3", p: 0.15 },
    { n: "英雄の", m: 6.5, r: "HEROIC", c: "rank-4", p: 0.04 },
    { n: "伝説の", m: 15.0, r: "LEGENDARY", c: "rank-5", p: 0.01 }
];
const professions = Array.from({length: 200}, (_, i) => `職業${i+1}`);

// プレイヤー
let player = {
    baseATK: 15,
    baseHP: 150,
    gearATK: 0,
    gearHP: 0,
    deathCount: 0,
    currentHP: 150
};

// 進行
let dungeon = { type: "", floor: 1, maxFloors: 30, enemy: null };

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById(id === 'battle' ? 'tab-b' : 'tab-s').classList.add('active');
}

function updateUI() {
    const maxP = player.baseHP + player.gearHP;
    document.getElementById("pHPText").innerText = `${player.currentHP} / ${maxP}`;
    document.getElementById("pBar").style.width = (player.currentHP / maxP * 100) + "%";

    const e = dungeon.enemy;
    document.getElementById("eHPText").innerText = `${e.currentHP} / ${e.maxHP}`;
    document.getElementById("eBar").style.width = (e.currentHP / e.maxHP * 100) + "%";
    document.getElementById("eName").innerText = e.fullName;
    document.getElementById("eRank").innerText = e.rankName;
    document.getElementById("eRank").className = `e-rank ${e.rankClass}`;
    document.getElementById("eATK").innerText = e.ATK;
    document.getElementById("eInfo").innerText = `${dungeon.type} - 第${dungeon.floor}階`;

    document.getElementById("sBaseATK").innerText = player.baseATK;
    document.getElementById("sGearATK").innerText = player.gearATK;
    document.getElementById("sBaseHP").innerText = player.baseHP;
    document.getElementById("sGearHP").innerText = player.gearHP;
    document.getElementById("sDeath").innerText = player.deathCount;
    document.getElementById("sDungeon").innerText = dungeon.type;
}

function log(msg, cls = "") {
    const l = document.getElementById("log");
    l.innerHTML = `<div class="${cls}">${msg}</div>` + l.innerHTML;
    if (l.children.length > 20) l.lastElementChild.remove();
}

function generateEnemy() {
    // レア度判定
    const r = Math.random();
    let rank = nicknames[0];
    let cumulative = 0;
    for (let n of nicknames) {
        cumulative += n.p;
        if (r <= cumulative) { rank = n; break; }
    }

    const adj = adjectives[Math.floor(Math.random()*adjectives.length)];
    const prof = professions[Math.floor(Math.random()*professions.length)];
    
    // バランス調整：階層による成長を以前より鋭く設定
    const difficultyScale = Math.pow(1.18, dungeon.floor - 1); 
    const hpBase = (50 + dungeon.floor * 15) * rank.m * difficultyScale;
    const atkBase = (8 + dungeon.floor * 2.5) * rank.m * difficultyScale;

    return {
        fullName: `${rank.n}${adj}${prof}`,
        rankName: rank.r,
        rankClass: rank.c,
        maxHP: Math.floor(hpBase),
        currentHP: Math.floor(hpBase),
        ATK: Math.floor(atkBase)
    };
}

function generateDungeon() {
    dungeon.type = dungeonTypes[Math.floor(Math.random()*dungeonTypes.length)];
    dungeon.floor = 1;
    dungeon.enemy = generateEnemy();
    player.currentHP = player.baseHP + player.gearHP;
    log(`>> ${dungeon.type}へ踏み込んだ...`);
    updateUI();
}

function attackEnemy() {
    if (player.currentHP <= 0) return;

    const pDmg = player.baseATK + player.gearATK;
    dungeon.enemy.currentHP -= pDmg;

    if (dungeon.enemy.currentHP <= 0) {
        dungeon.enemy.currentHP = 0;
        log(`${dungeon.enemy.fullName}を葬った。`, "log-win");
        
        // ドロップ：敵の強さに比例
        const dropAtk = Math.floor(dungeon.enemy.ATK * 0.15) + 1;
        const dropHp = Math.floor(dungeon.enemy.maxHP * 0.08) + 2;
        player.gearATK += dropAtk;
        player.gearHP += dropHp;
        
        if (dungeon.floor >= dungeon.maxFloors) {
            log(`【制覇】ダンジョンを食い尽くした。`);
            player.baseATK += 20; player.baseHP += 100;
            generateDungeon();
        } else {
            dungeon.floor++;
            dungeon.enemy = generateEnemy();
        }
    } else {
        // 反撃
        player.currentHP -= dungeon.enemy.ATK;
        if (player.currentHP <= 0) {
            player.currentHP = 0;
            playerDies();
        }
    }
    updateUI();
}

function playerDies() {
    player.deathCount++;
    log(`[DEATH] ${dungeon.enemy.fullName}に敗北。`, "log-lose");
    log(`死を糧に、能力が僅かに上昇した。`);
    player.baseATK += 5;
    player.baseHP += 20;
    generateDungeon();
}

// オートバトル
let autoTimer = null;
const startAuto = (e) => {
    e.preventDefault();
    if (autoTimer) return;
    attackEnemy();
    autoTimer = setInterval(attackEnemy, 250);
};
const stopAuto = () => { clearInterval(autoTimer); autoTimer = null; };

const btn = document.getElementById("attackBtn");
btn.addEventListener("mousedown", startAuto);
btn.addEventListener("mouseup", stopAuto);
btn.addEventListener("mouseleave", stopAuto);
btn.addEventListener("touchstart", startAuto);
btn.addEventListener("touchend", stopAuto);

generateDungeon();
</script>
</body>
</html>
