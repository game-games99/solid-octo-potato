<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Infinite Relic - Unique Loot Edition</title>
<style>
    :root {
        --bg: #0d0d0d; --card: #1a1a1a; --primary: #00e676; 
        --secondary: #40c4ff; --danger: #ff5252; --text: #eee;
        --common: #9e9e9e; --uncommon: #4caf50; --rare: #2196f3; 
        --epic: #9c27b0; --legend: #ffc107; --boss: #ff1744;
    }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
    
    #header-ctrl { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.9); padding: 8px; border-radius: 8px; border: 1px solid #444; font-size: 0.75em; z-index: 1000; }
    .ctrl-item { display: flex; align-items: center; margin-bottom: 5px; }
    .ctrl-item input, .ctrl-item select { margin-left: 8px; background: #333; color: #fff; border: 1px solid #555; }

    #top { background: var(--card); padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #333; }
    .bar { height: 6px; background: #333; border-radius: 3px; margin: 3px 0; overflow: hidden; }
    .fill { height: 100%; transition: width 0.1s; }
    #hp { background: var(--primary); }
    #exp { background: var(--secondary); }
    #jobexp { background: #ff4081; }

    .nav { display: flex; background: #222; }
    .nav button { flex: 1; padding: 12px; border: none; background: transparent; color: #888; font-size: 0.8em; }
    .nav button.active { color: var(--secondary); border-bottom: 3px solid var(--secondary); }

    .tab { display: none; padding: 15px; }
    .tab.active { display: block; }

    .item-card { background: #222; padding: 10px; margin-bottom: 8px; border-radius: 8px; border-left: 5px solid; display: flex; flex-direction: column; gap: 5px; }
    .item-card.common { border-color: var(--common); }
    .item-card.uncommon { border-color: var(--uncommon); }
    .item-card.rare { border-color: var(--rare); }
    .item-card.epic { border-color: var(--epic); }
    .item-card.legend { border-color: var(--legend); box-shadow: 0 0 10px rgba(255,193,7,0.3); }

    .item-info { display: flex; justify-content: space-between; align-items: center; }
    .item-btns { display: flex; gap: 5px; margin-top: 5px; }
    .item-btns button { flex: 1; padding: 8px; font-size: 0.8em; border: none; border-radius: 4px; cursor: pointer; }
    .btn-eq { background: #444; color: #fff; }
    .btn-del { background: #522; color: #ff8a8a; }

    .btn-main { width:100%; padding:15px; background:var(--primary); font-weight:bold; border-radius:8px; border:none; color:#000; font-size: 1.2em; touch-action: none; margin-bottom: 8px; }
    #log { height: 160px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.75em; border-radius: 5px; display: flex; flex-direction: column-reverse; line-height: 1.4; }
    .eq-badge { background: var(--legend); color: #000; padding: 2px 4px; border-radius: 3px; font-size: 0.7em; font-weight: bold; margin-right: 5px; }
</style>
</head>
<body>

<div id="header-ctrl">
    <div class="ctrl-item"><input type="checkbox" id="checkAuto" onchange="toggleAuto(this.checked)">オート</div>
    <div class="ctrl-item"><input type="checkbox" id="checkStay" onchange="toggleStay(this.checked)">階層維持</div>
    <div class="ctrl-item">
        拾う: 
        <select id="lootFilter" onchange="p.lootFilter = this.value; save();">
            <option value="common">全部</option>
            <option value="uncommon">UC↑</option>
            <option value="rare">R↑</option>
            <option value="epic">E↑</option>
        </select>
    </div>
</div>

<div id="top">
    <div style="display:flex; justify-content:space-between; font-size:0.85em; margin-bottom:4px; width: 60%;">
        <span id="p-info"></span>
        <span id="p-stats"></span>
    </div>
    HP <div class="bar"><div id="hp" class="fill"></div></div>
    EXP <div class="bar"><div id="exp" class="fill"></div></div>
    JOB <div class="bar"><div id="jobexp" class="fill"></div></div>
    <button class="btn-main" id="attackBtn">ATTACK</button>
</div>

<div class="nav">
    <button onclick="showTab('battle', this)" class="active">戦闘</button>
    <button onclick="showTab('equip', this)">装備</button>
    <button onclick="showTab('job', this)">職業</button>
    <button onclick="showTab('move', this)">移動</button>
</div>

<div id="battle" class="tab active">
    <div id="e-name" style="font-weight:bold;"></div>
    <div class="bar" style="height:12px;"><div id="enemyhp" class="fill"></div></div>
    <div id="log"></div>
</div>

<div id="equip" class="tab">
    <div style="display:flex; gap:5px; margin-bottom:10px;">
        <button onclick="setEquipTab('weapon')" style="flex:1">武器</button>
        <button onclick="setEquipTab('armor')" style="flex:1">防具</button>
        <button onclick="setEquipTab('acc')" style="flex:1">装飾</button>
        <button onclick="sortInv()" style="background:var(--secondary); color:#000; font-weight:bold;">最強順</button>
    </div>
    <div id="inventory"></div>
</div>

<div id="job" class="tab"><div id="jobList"></div></div>

<div id="move" class="tab">
    最高到達: <span id="maxFloorDisp">1</span>F
    <input type="range" id="floorRange" min="1" style="width:100%; margin: 20px 0;" oninput="updateFloorVal(this.value)">
    <div id="floorVal" style="text-align:center; font-size:2em; font-weight: bold; color: var(--secondary);">1</div>
    <button onclick="moveFloor()" style="width:100%; padding:15px; background:var(--secondary); font-weight:bold; border-radius:8px;">移動実行</button>
    <hr style="border:0; border-top:1px solid #444; margin:20px 0;">
    <textarea id="saveCode" class="save-box" rows="3" readonly></textarea>
</div>

<script>
let p, e, autoIdx, pressIdx;
let currentEquipTab = 'weapon';
const SAVE_KEY = "IR_FINAL_SAVE_SYSTEM_V3";
const RARE_LEVELS = { "common": 0, "uncommon": 1, "rare": 2, "epic": 3, "legend": 4 };

// 二つ名リスト
const itemPrefixes = [
    {n:"壊れた", m:0.6}, {n:"鈍い", m:0.8}, {n:"普通の", m:1.0}, {n:"鋭い", m:1.2}, 
    {n:"熟練の", m:1.4}, {n:"王家の", m:1.6}, {n:"伝説の", m:2.0}, {n:"神話の", m:2.5},
    {n:"不滅の", m:1.8}, {n:"血に飢えた", m:2.2}, {n:"輝く", m:1.5}, {n:"太古の", m:1.9}
];

const jobData = {
    "剣士": { skill: "連撃", desc: "攻撃2倍", proc: 0.2 },
    "ナイト": { skill: "パリィ", desc: "被ダメ0", proc: 0.15 },
    "アサシン": { skill: "急所", desc: "攻撃4倍", proc: 0.1 },
    "魔法使い": { skill: "ドレイン", desc: "50%回復", proc: 0.15 },
    "狩人": { skill: "集中", desc: "1.5倍必中", proc: 0.25 },
    "聖騎士": { skill: "慈愛", desc: "被ダメ回復", proc: 0.2 },
    "暗殺王": { skill: "即死", desc: "攻撃10倍", proc: 0.05 },
    "賢者": { skill: "連鎖", desc: "3倍＋回復", proc: 0.15 }
};

function init() {
    const saved = localStorage.getItem(SAVE_KEY);
    p = saved ? JSON.parse(saved) : createNewPlayer();
    if(!p.lootFilter) p.lootFilter = "common";
    document.getElementById("checkAuto").checked = p.auto;
    document.getElementById("checkStay").checked = p.stay;
    document.getElementById("lootFilter").value = p.lootFilter;
    if (p.auto) autoIdx = setInterval(attack, 600);

    const btn = document.getElementById("attackBtn");
    const start = (ev) => { ev.preventDefault(); attack(); pressIdx = setInterval(attack, 200); };
    const stop = () => clearInterval(pressIdx);
    btn.addEventListener("mousedown", start); btn.addEventListener("mouseup", stop); 
    btn.addEventListener("touchstart", start); btn.addEventListener("touchend", stop);

    spawn(); refresh();
}

function createNewPlayer() {
    return { floor: 1, maxFloor: 1, lv: 1, exp: 0, expMax: 40, hp: 100, maxhp: 100, job: "剣士", inventory: [], weapon: null, armor: null, acc: null, auto: false, stay: false, lootFilter: "common", jobLevels: { "剣士": 1, "ナイト": 1, "アサシン": 1, "魔法使い": 1, "狩人": 1, "聖騎士": 1, "暗殺王": 1, "賢者": 1 }, jobExp: { "剣士": 0, "ナイト": 0, "アサシン": 0, "魔法使い": 0, "狩人": 0, "聖騎士": 0, "暗殺王": 0, "賢者": 0 } };
}

function save() { 
    localStorage.setItem(SAVE_KEY, JSON.stringify(p)); 
    document.getElementById("saveCode").value = btoa(unescape(encodeURIComponent(JSON.stringify(p))));
}

function spawn() {
    const f = p.floor;
    const isBoss = f % 10 === 0;
    const isBigBoss = f % 50 === 0;
    const mult = isBigBoss ? 12 : isBoss ? 5 : 1;
    e = { name: (isBigBoss ? "【大ボス】" : isBoss ? "【ボス】" : "") + "モンスター", hp: Math.floor((20+f*12)*mult), maxhp: Math.floor((20+f*12)*mult), atk: Math.floor((2+f*2.5)*(isBoss?1.5:1)), def: Math.floor((1+f*1.2)*(isBoss?1.8:1)), isBoss: isBoss||isBigBoss };
}

function calc() {
    p.maxhp = Math.floor(80 + p.lv * 20);
    let a = 12 + p.lv * 4, d = 6 + p.lv * 2.5;
    if (p.weapon) a += p.weapon.atk; if (p.armor) d += p.armor.def; if (p.acc) { a += (p.acc.atk || 0); d += (p.acc.def || 0); }
    const jobMult = 1.0 + (p.jobLevels[p.job] * 0.06); 
    p.atk = Math.floor(a * jobMult); p.def = Math.floor(d * jobMult);
}

function attack() {
    if (e.hp <= 0) return;
    const drift = () => (0.85 + Math.random() * 0.3);
    let dmg = Math.max(1, p.atk - e.def) * drift();
    Object.keys(jobData).forEach(jName => {
        let activeProc = (p.job === jName) ? jobData[jName].proc : (p.jobLevels[jName] >= 10 ? jobData[jName].proc * 0.5 : 0);
        if (Math.random() < activeProc) {
            if (jName === "剣士") dmg *= 2;
            if (jName === "アサシン") dmg *= 4;
            if (jName === "魔法使い") p.hp = Math.min(p.maxhp, p.hp + Math.floor(dmg*0.5));
        }
    });
    e.hp -= Math.floor(dmg);
    addLog(`⚔️ ${Math.floor(dmg)}ダメ`);
    if (e.hp <= 0) return win();
    let edmg = Math.max(1, e.atk - p.def) * drift();
    if (Math.random() < (p.job==="ナイト" ? 0.15 : (p.jobLevels["ナイト"]>=10 ? 0.07 : 0))) edmg = 0;
    p.hp -= Math.floor(edmg);
    if (p.hp <= 0) { p.hp = p.maxhp; if(!p.stay) p.floor = Math.max(1, p.floor-1); spawn(); addLog("💀敗北"); }
    refresh();
}

function win() {
    let gain = Math.floor(12 + p.floor * 2.2);
    if (p.acc && p.acc.expUp) gain = Math.floor(gain * (1 + p.acc.expUp/100));
    p.exp += gain; p.jobExp[p.job] += 15;
    if (p.jobExp[p.job] >= (p.jobLevels[p.job] * 50)) { p.jobExp[p.job] = 0; p.jobLevels[p.job]++; }
    while (p.exp >= p.expMax) { p.lv++; p.exp -= p.expMax; p.expMax = Math.floor(p.expMax * 1.25); p.hp = p.maxhp; }
    if (!p.stay) { p.floor++; if(p.floor > p.maxFloor) p.maxFloor = p.floor; }
    if (Math.random() < 0.3 || e.isBoss) drop();
    spawn(); save(); refresh();
}

function drop() {
    const r = Math.random();
    let rare = "common";
    if (r < 0.05) rare = "legend"; else if (r < 0.15) rare = "epic"; else if (r < 0.35) rare = "rare"; else if (r < 0.6) rare = "uncommon";
    if (RARE_LEVELS[rare] < RARE_LEVELS[p.lootFilter]) return;

    let type = ["weapon", "armor", "acc"][Math.floor(Math.random()*3)];
    const pre = itemPrefixes[Math.floor(Math.random()*itemPrefixes.length)];
    const rareBonus = 1 + (RARE_LEVELS[rare] * 0.4); 
    const randomRange = 0.8 + Math.random() * 0.4;
    
    let item = { id: Date.now()+Math.random(), type: type, rarity: rare, name: pre.n + (type==="weapon"?"剣":type==="armor"?"鎧":"珠"), atk: 0, def: 0, expUp: 0 };
    if (type === "weapon") item.atk = Math.floor(p.floor * 2 * rareBonus * pre.m * randomRange);
    else if (type === "armor") item.def = Math.floor(p.floor * 1.5 * rareBonus * pre.m * randomRange);
    else item.expUp = Math.floor(10 * rareBonus * pre.m * randomRange);

    p.inventory.push(item);
    addLog(`<span style="color:var(--${rare})">🎁${item.name}入手</span>`);
}

function refresh() {
    calc();
    document.getElementById("p-info").innerText = `Lv.${p.lv} ${p.job} (${p.floor}F)`;
    document.getElementById("p-stats").innerText = `⚔️${p.atk} 🛡️${p.def}`;
    document.getElementById("hp").style.width = (p.hp/p.maxhp*100) + "%";
    document.getElementById("exp").style.width = (p.exp/p.expMax*100) + "%";
    document.getElementById("jobexp").style.width = (p.jobExp[p.job]/(p.jobLevels[p.job]*50)*100) + "%";
    document.getElementById("enemyhp").style.width = (e.hp/e.maxhp*100) + "%";
    document.getElementById("e-name").innerText = e.name;
    document.getElementById("maxFloorDisp").innerText = p.maxFloor;
    document.getElementById("floorRange").max = p.maxFloor;

    document.getElementById("inventory").innerHTML = p.inventory
        .filter(it => it.type === currentEquipTab)
        .map(it => {
            const isEq = (p.weapon?.id === it.id || p.armor?.id === it.id || p.acc?.id === it.id);
            let stat = it.atk ? "⚔️"+it.atk : (it.def ? "🛡️"+it.def : "EXP+"+it.expUp+"%");
            return `<div class="item-card ${it.rarity}">
                <div class="item-info">
                    <div>${isEq ? '<span class="eq-badge">E</span>' : ''}<b>${it.name}</b><br><small>${stat}</small></div>
                    <div style="font-size:0.7em; opacity:0.7;">${it.rarity.toUpperCase()}</div>
                </div>
                <div class="item-btns">
                    <button class="btn-eq" onclick="toggleEquip(${it.id})">${isEq?'外す':'装備'}</button>
                    <button class="btn-del" onclick="deleteItem(${it.id})">売却</button>
                </div>
            </div>`;
        }).join("");

    document.getElementById("jobList").innerHTML = Object.keys(jobData).map(j => {
        const lv = p.jobLevels[j];
        return `<div class="item-card ${lv>=10?'legend':''}" style="flex-direction:row; justify-content:space-between; align-items:center;">
            <div><b>${j} (Lv.${lv})</b><br><small>${jobData[j].skill}</small></div>
            <button onclick="p.job='${j}';save();refresh();" ${p.job===j?'disabled':''}>転職</button>
        </div>`;
    }).join("");
}

function deleteItem(id) {
    if (p.weapon?.id === id || p.armor?.id === id || p.acc?.id === id) {
        alert("装備中は売却できません"); return;
    }
    p.inventory = p.inventory.filter(i => i.id !== id);
    save(); refresh();
}

function toggleAuto(val) { p.auto = val; if(val) autoIdx = setInterval(attack, 600); else clearInterval(autoIdx); save(); }
function toggleStay(val) { p.stay = val; save(); }
function setEquipTab(t) { currentEquipTab = t; refresh(); }
function toggleEquip(id) {
    const it = p.inventory.find(i => i.id === id);
    if (it.type === "weapon") p.weapon = (p.weapon?.id === id) ? null : it;
    else if (it.type === "armor") p.armor = (p.armor?.id === id) ? null : it;
    else p.acc = (p.acc?.id === id) ? null : it;
    save(); refresh();
}
function sortInv() { p.inventory.sort((a,b) => (b.atk+b.def+b.expUp)-(a.atk+a.def+a.expUp)); refresh(); }
function updateFloorVal(v) { document.getElementById("floorVal").innerText = v; }
function moveFloor() { p.floor = parseInt(document.getElementById("floorVal").innerText); spawn(); save(); refresh(); }
function showTab(id, btn) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}
function addLog(m) {
    const l = document.getElementById("log");
    l.innerHTML += `<div>${m}</div>`;
    if(l.childNodes.length > 25) l.removeChild(l.firstChild);
}

init();
</script>
</body>
</html>
