<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>RELICORE v1.3</title>
    <style>
        body { background:#000; color:#ccc; font-family:monospace; margin:20px; line-height:1.4; }
        #game { max-width:600px; margin:auto; border:1px solid #444; padding:15px; }
        .stat-box { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px; border-bottom:1px dashed #444; padding-bottom:10px; }
        .log-box { height:200px; overflow-y:auto; font-size:0.9em; background:#111; padding:5px; border:1px solid #222; }
        .log-entry { border-bottom:1px solid #222; padding:2px 0; }
        .relic-list { font-size:0.8em; color:#888; margin-top:10px; }
        .critical { color:#ff4444; font-weight:bold; }
        h2 { border-left:4px solid #666; padding-left:10px; font-size:1.2em; margin:0 0 15px 0; }
    </style>
</head>
<body>

<div id="game">
    <h2>RELICORE <span id="ver"></span></h2>
    <div class="stat-box">
        <div>[PLAYER]<br>HP: <span id="p-hp">0</span>/<span id="p-mhp">0</span><br>ATK: <span id="p-atk">0</span></div>
        <div>[ENEMY]<br><span id="e-name">-</span><br>HP: <span id="e-hp">0</span>/<span id="e-mhp">0</span><br>ATK: <span id="e-atk">0</span></div>
    </div>
    <div class="stat-box">
        <div>KILLS: <span id="p-kills">0</span></div>
        <div>GOLD: <span id="p-gold">0</span></div>
    </div>
    <div id="log" class="log-box"></div>
    <div id="relics" class="relic-list"></div>
</div>

<script>
(function() {
    'use strict';
    const G = {
        ver: "1.3",
        saveKey: "RELICORE_PLAYER_DATA",
        p: {
            hp: 100n, mhp: 100n, atk: 15n, def: 5n,
            relics: [], kills: 0n, gold: 0n,
            skills: ["不退転の力", "刹那の堆積", "因果の拒絶", "反撃の狼煙", "魂の研磨", "死を刻む"]
        },
        enemy: null, log: []
    };

    const $ = id => document.getElementById(id);

    // --- Core Logic ---
    const calcDmg = (atker, defer, isP) => {
        let dmg = atker.atk - (defer.def / 2n);
        if (dmg < 1n) dmg = 1n;
        // 再起スキル: 不退転の力 (HP25%以下で1.5倍)
        if (isP && G.p.hp <= G.p.mhp / 4n) dmg = (dmg * 15n) / 10n;
        return dmg;
    };

    const spawn = () => {
        const isGod = G.p.kills > 0n && G.p.kills % 100n === 0n;
        const lv = G.p.kills;
        G.enemy = {
            name: isGod ? "終末神アポカリス＝ティア" : `魔物 Lv.${lv}`,
            hp: 50n + lv * 15n, mhp: 50n + lv * 15n,
            atk: 8n + lv * 3n, def: 5n + lv, gold: 10n + lv * 2n
        };
    };

    const battle = () => {
        if (!G.enemy) spawn();
        
        // Player Turn
        let d = calcDmg(G.p, G.enemy, true);
        G.enemy.hp -= d;
        addLog(`${G.enemy.name}に${d}のダメージ。再起の誓いによって新たなる力を得た`);

        // 神のギミック
        if (G.enemy.name === "終末神アポカリス＝ティア") {
            if (G.enemy.hp <= 0n) {
                if (!G.p.relics.includes("パンドラの箱")) {
                    G.enemy.hp = G.enemy.mhp;
                    addLog("神の権能により絶望が回帰する。");
                }
            } else if (G.enemy.hp < 1n) { G.enemy.hp = 1n; }
        }

        if (G.enemy.hp <= 0n) {
            addLog(`${G.enemy.name}を討伐。${G.enemy.gold}G獲得。`);
            G.p.kills++; G.p.gold += G.enemy.gold;
            spawn();
        } else {
            // Enemy Turn
            let ed = calcDmg(G.enemy, G.p, false);
            G.p.hp -= ed;
            if (G.p.hp <= 0n) {
                addLog("敗北したが、再起の誓いが魂を繋ぎ止めた。");
                G.p.hp = G.p.mhp; // 復活処理
            }
        }
        update();
    };

    // --- System ---
    const addLog = m => {
        G.log.unshift(m);
        if (G.log.length > 15) G.log.pop();
    };

    const save = () => {
        localStorage.setItem(G.saveKey, JSON.stringify(G.p, (k, v) => typeof v === 'bigint' ? v.toString() : v));
    };

    const load = () => {
        const d = localStorage.getItem(G.saveKey);
        if (d) {
            const parsed = JSON.parse(d, (k, v) => /^\d+$/.test(v) && k !== 'skills' && k !== 'relics' ? BigInt(v) : v);
            G.p = { ...G.p, ...parsed };
        }
    };

    const update = () => {
        $('ver').innerText = `v${G.ver}`;
        $('p-hp').innerText = G.p.hp; $('p-mhp').innerText = G.p.mhp;
        $('p-atk').innerText = G.p.atk; $('p-kills').innerText = G.p.kills;
        $('p-gold').innerText = G.p.gold;
        $('e-name').innerText = G.enemy.name;
        $('e-hp').innerText = G.enemy.hp; $('e-mhp').innerText = G.enemy.mhp;
        $('e-atk').innerText = G.enemy.atk;
        $('log').innerHTML = G.log.map(l => `<div class="log-entry">${l}</div>`).join('');
        $('relics').innerText = "所持遺物: " + (G.p.relics.length ? G.p.relics.join(", ") : "なし");
    };

    window.onload = () => {
        load();
        spawn();
        setInterval(battle, 1000);
        setInterval(save, 5000);
        update();
    };
})();
</script>
</body>
</html>
