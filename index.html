];

function saveGame() { const data = { ...player, baseAtk: player.baseAtk.toString(), baseHP: player.baseHP.toString(), maxDmg: player.maxDmg.toString(), currentBossHP: currentBossHP.toString() }; localStorage.setItem(SAVE_KEY, JSON.stringify(data)); }
function loadGame() { let saved = localStorage.getItem(SAVE_KEY); if(saved) { const p = JSON.parse(saved); Object.assign(player, p); player.baseAtk = BigInt(p.baseAtk || "10"); player.baseHP = BigInt(p.baseHP || "100"); player.maxDmg = BigInt(p.maxDmg || "0"); currentBossHP = BigInt(p.currentBossHP || p.bossMaxHP || BOSS_MAX_HP_BASE.toString()); } if(!player.storySeen) document.getElementById("story-modal").style.display = "flex"; }

function getExpThreshold(lv) { if (lv <= 1) return 0; let threshold = 1000; for (let i = 2; i < lv; i++) threshold *= i; return threshold; }
function getLevelByDeath() { let lv = 1; while (lv < 10 && player.deathCount >= getExpThreshold(lv + 1)) lv++; return lv; }

function calcFinalDmgMult() {
 const lv = getLevelByDeath() + (player.inventory[601] || 0);
 let multAdd = (player.totalClicks * (0.0000004 * lv + (player.inventory[406] || 0) * 0.000004));
 multAdd += ((player.inventory[504] || 0) * 0.01) + ((player.inventory[503] || 0) * 0.10);
 multAdd += (Object.keys(player.inventory).length * 0.01 * (player.inventory[603] || 0));
 multAdd += (9.99 * (player.inventory[604] || 0));
 return 1.0 + multAdd;
}

function getRelicBonus() {
 let atk = 0, hp = 0; let totalCount = 0;
 Object.entries(player.inventory).forEach(([id, count]) => {
     if(id != "0") totalCount += count;
     const r = RELIC_MASTER.find(m => m.id == id); if(!r) return;
     let bA = (r.atk || 0) * count, bH = (r.hp || 0) * count;
     if(player.hasHado && r.star === 1) { bA *= 10; bH *= 10; }
     atk += bA; hp += bH;
 });
 if(player.inventory[602]) atk += (totalCount * (player.inventory[602]));
 return { atk: BigInt(Math.floor(atk)), hp: BigInt(Math.floor(hp)) };
}

function attack() {
 if(isModalOpen) return;
 player.totalClicks++;
 const b = getRelicBonus(); const finalDmgMult = calcFinalDmgMult();
 let rawBase = Number(player.baseAtk + b.atk);
 let finalDmg = BigInt(Math.floor(rawBase * (0.8 + Math.random() * 0.4) * finalDmgMult)) || 1n;
 if(finalDmg > player.maxDmg) player.maxDmg = finalDmg;

 const lv = getLevelByDeath() + (player.inventory[601] || 0);
 let logHtml = `<div><span style="color:#007bff; font-weight:bold;">攻撃！${finalDmg.toLocaleString()} ダメージ！</span></div>` + getDropLog(1 + (player.inventory[401] || 0) + lv - 1 + ((player.inventory[502] || 0) * 5));

 if(finalDmg >= currentBossHP) {
     if((player.inventory[701] || 0) > 0) { currentBossHP = 0n; isModalOpen = true; document.getElementById("clear-modal").style.display = "flex"; }
     else { currentBossHP = BigInt(player.bossMaxHP); logHtml += `<div><span style="color:#ff0000; font-weight:bold;">終焉の回帰……！ (HP全回復)</span></div>`; }
 } else {
     currentBossHP -= finalDmg; if(currentBossHP < 1n) currentBossHP = BigInt(player.bossMaxHP);
 }

 if(currentBossHP > 0n) {
     const currentTotalHP = BigInt(Math.floor(Number(player.baseHP + b.hp)));
     let minCut = (lv * 2) + Math.min(30, player.inventory[403] || 0);
     let finalMitigated = BigInt(Math.floor(Number(MAJIN_ATK_BASE * BigInt(player.uraAtkMult)) * (1 - (Math.floor(Math.random() * (101 - minCut)) + minCut) / 100))) - BigInt((player.inventory[501] || 0) * 500000);
     if(finalMitigated < 0n) finalMitigated = 0n;

     if (currentTotalHP > finalMitigated) { player.deathCount += (lv + (player.inventory[405] || 0)); logHtml += `<div><span style="color:#28a745; font-weight:bold;">敵の攻撃！障壁展開！</span></div>`; }
     else {
         let totalUpHP = BigInt(Math.floor(Math.random() * Math.max(1, player.deathCount)) + 1 + lv + (player.inventory[402] || 0) * 5);
         player.baseHP += totalUpHP; player.deathCount += (lv + (player.inventory[405] || 0));
         logHtml += `<div><span style="color:#007bff; font-weight:bold;">再起の誓いによって新たなる力を得た (HP+${totalUpHP.toLocaleString()})</span></div>`;
     }
 }
 addLog(logHtml); saveGame(); refreshUI();
}

function getDropLog(count) {
 const rates = player.hasHado ? HADO_DROP_DATA : BASE_DROP_DATA;
 let obtained = {}; let showRare = null;
 for(let i=0; i < count; i++) {
     let rv = Math.random()*100, star=1, curP=0;
     for(let s in rates) { curP += rates[s].p; if(rv <= curP) { star=parseInt(s); break; } }
     if (player.maxDmg < rates[star].cond) star=1;
     
     let cands = RELIC_MASTER.filter(m => {
         if(m.id === 0) return false;
         if(m.star !== star) return false;
         if(m.star >= 6 && player.inventory[m.id] >= 1) return false; // 所持条件1
         return true;
     });
     if(cands.length === 0) continue;
     let sel = cands[Math.floor(Math.random() * cands.length)];
     if (sel.star >= 4 && !player.inventory[sel.id]) { if (!showRare || sel.star > showRare.star) showRare = sel; }
     player.inventory[sel.id] = (player.inventory[sel.id] || 0) + 1;
     obtained[sel.id] = (obtained[sel.id] || 0) + 1;
     player.totalRelics++;
 }
 if(showRare) openRareModal(showRare);
 const itemsStr = Object.entries(obtained).map(([id, c]) => { const m = RELIC_MASTER.find(x=>x.id==id); return `<span class="c${m.star}">★${m.star} ${m.name}${c > 1 ? '×' + c : ''}</span>`; }).join(", ");
 return itemsStr ? `<div style="font-size:0.82em;">獲得：${itemsStr}</div>` : "";
}

function addLog(html) { const l = document.getElementById("log"); const d = document.createElement("div"); d.innerHTML = html; l.insertBefore(d, l.firstChild); if(l.children.length > 20) l.removeChild(l.lastChild); }
function showTab(id) { document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active")); document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active")); document.getElementById(id).classList.add("active"); document.getElementById("nav-"+id).classList.add("active"); refreshUI(); }

function refreshUI() {
 const b = getRelicBonus(); const lv = getLevelByDeath();
 document.getElementById("p-atk").textContent = BigInt(Math.floor(Number(player.baseAtk + b.atk) * calcFinalDmgMult())).toLocaleString();
 document.getElementById("p-hp").textContent = BigInt(Math.floor(Number(player.baseHP + b.hp))).toLocaleString();
 document.getElementById("bosshp-cur").textContent = currentBossHP.toLocaleString();
 document.getElementById("hp-bar-fill").style.width = `${Number(currentBossHP * 100n / BigInt(player.bossMaxHP))}%`;
 document.getElementById("st-rank-lv").textContent = `Lv.${lv}`;
 document.getElementById("st-rank-title").textContent = PLAYER_TITLES[Math.min(9, lv - 1)];
 if(document.querySelector(".tab.active").id === 'relic') renderRelics();
 if(document.querySelector(".tab.active").id === 'status') renderStatus();
}

function renderRelics() {
 const container = document.getElementById("relic-list");
 const sorted = Object.entries(player.inventory).filter(([id, c]) => c > 0).sort((a, b) => (RELIC_MASTER.find(x=>x.id==a[0])?.star || 0) - (RELIC_MASTER.find(x=>x.id==b[0])?.star || 0));
 container.innerHTML = sorted.map(([id, c]) => {
     const m = RELIC_MASTER.find(x => x.id == id);
     return `<div class="relic-card ${m.star>=4?'star-high':'star-low'}"><div class="relic-name c${m.star}">★${m.star} ${m.name}${m.star<6?'×'+c:''}</div><div class="relic-effect-box">${m.desc || ''}</div></div>`;
 }).join("");
}

function renderStatus() {
 document.getElementById("st-totalclicks").textContent = player.totalClicks.toLocaleString();
 document.getElementById("v-death").textContent = player.deathCount.toLocaleString();
 document.getElementById("st-totalrelics").textContent = player.totalRelics.toLocaleString();
 document.getElementById("st-dmgmult").textContent = "x" + calcFinalDmgMult().toFixed(6);
}

function openRareModal(relic) { isModalOpen = true; const card = document.getElementById("rare-card-content"); card.className = "rare-card glow-" + relic.star; document.getElementById("rare-star-label").innerText = "★" + relic.star; document.getElementById("rare-name-label").innerText = relic.name; document.getElementById("rare-desc-label").innerText = relic.desc || ""; document.getElementById("rare-drop-modal").style.display = "flex"; }
function closeRareModal() { document.getElementById("rare-drop-modal").style.display = "none"; isModalOpen = false; }
function closeStory() { player.storySeen = true; document.getElementById("story-modal").style.display = "none"; saveGame(); }
function closeClearModal() { document.getElementById("clear-modal").style.display = "none"; isModalOpen = false; player.isUra = true; player.bossMaxHP = (BigInt(player.bossMaxHP) * 2n).toString(); currentBossHP = BigInt(player.bossMaxHP); saveGame(); refreshUI(); }
function resetData() { if(confirm("リセット？")) { localStorage.clear(); location.reload(); } }

const btn = document.getElementById("attackBtn");
btn.addEventListener("pointerdown", (e) => { e.preventDefault(); if(!attackInterval && !isModalOpen) { attack(); attackInterval = setInterval(attack, 120); } });
window.addEventListener("pointerup", () => { clearInterval(attackInterval); attackInterval = null; });

loadGame(); refreshUI();
</script>
</body>
</html>
