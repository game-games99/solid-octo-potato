<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RELICORE v2.1</title>
<style>
body{font-family:sans-serif;margin:0;background:#111;color:#fff}
button{padding:12px;font-size:18px}
</style>
</head>
<body>

<h2>RELICORE v2.1 統合計算版</h2>
<button onclick="attack()">攻撃</button>
<div id="log"></div>

<script>
const BOSS_MAX_HP = 100000000000000000000n;

let bossHP = BOSS_MAX_HP;

let player = {
    baseAtk: 10n,
    baseHP: 100n,
    totalClicks: 0,
    deathCount: 0,
    inventory: {},
    maxDmg: 0n
};

/* =========================
   🔥 統合倍率計算システム
========================= */

function getUnifiedMultiplier(){

    let additivePercent = 0;     // +◯%
    let multiplicative = 1.0;    // ×◯

    const lv = 1 + player.deathCount / 1000;

    // 再起由来
    additivePercent += lv * 0.00004;

    // ★5 破壊の権能（加算）
    additivePercent += (player.inventory[504] || 0) * 0.01;

    // ★6 603（種類依存）
    const relicKinds = Object.keys(player.inventory).length;
    additivePercent += relicKinds * 0.01 * (player.inventory[603] || 0);

    // ★6 604（固定加算）
    additivePercent += 9.99 * (player.inventory[604] || 0);

    // ★5 503（乗算）
    multiplicative *= Math.pow(1.1, (player.inventory[503] || 0));

    // クリック蓄積
    additivePercent += player.totalClicks * (lv * 0.0000004);

    return {
        add: additivePercent,
        mul: multiplicative
    };
}

/* =========================
   🔥 攻撃処理（統合適用）
========================= */

function attack(){

    player.totalClicks++;

    // ① 基礎ATK（純BigInt）
    let atkBase = player.baseAtk;

    // ② 統合倍率取得
    const unified = getUnifiedMultiplier();

    // ③ 乱数補正（0.8～1.2）
    const randomFactor = 0.8 + Math.random() * 0.4;

    // ④ 最終ダメージ計算（ここで初めてfloat使用）
    let damageFloat =
        Number(atkBase) *
        randomFactor *
        (1 + unified.add) *
        unified.mul;

    let finalDamage = BigInt(Math.floor(damageFloat));

    if(finalDamage < 1n) finalDamage = 1n;

    if(finalDamage > player.maxDmg)
        player.maxDmg = finalDamage;

    bossHP -= finalDamage;

    if(bossHP <= 0n){
        bossHP = BOSS_MAX_HP;
        player.deathCount++;
        log("🔥 討伐成功！");
    }

    log("💥 " + finalDamage.toLocaleString());
}

/* ========================= */

function log(t){
    document.getElementById("log").innerHTML =
        t + "<br>" +
        document.getElementById("log").innerHTML;
}
</script>
</body>
</html>
