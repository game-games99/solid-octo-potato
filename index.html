<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Infinite Relic - Job Master & Relic Hunter</title>
<style>
    :root {
        --bg: #0d0d0d; --card: #1a1a1a; --primary: #00e676; 
        --secondary: #40c4ff; --danger: #ff5252; --text: #eee;
        --common: #9e9e9e; --uncommon: #4caf50; --rare: #2196f3; 
        --epic: #9c27b0; --legend: #ffc107; --lock: #ff4081;
    }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; user-select: none; touch-action: manipulation; }
    #control-panel { background: #000; padding: 10px; border-bottom: 1px solid #333; font-size: 0.8em; position: sticky; top: 0; z-index: 1000; }
    .ctrl-row { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; }
    
    #top { background: var(--card); padding: 15px; border-bottom: 2px solid #333; }
    .status-row { display: flex; justify-content: space-between; font-size: 0.85em; margin-bottom: 5px; color: var(--secondary); }
    .bar { height: 8px; background: #333; border-radius: 4px; margin: 4px 0; overflow: hidden; }
    .fill { height: 100%; transition: width 0.15s; }
    #hp { background: var(--primary); }
    #exp { background: var(--secondary); }
    #jobexp { background: #ff4081; }

    .nav { display: flex; background: #222; position: sticky; top: 110px; z-index: 100; }
    .nav button { flex: 1; padding: 12px; border: none; background: transparent; color: #888; font-size: 0.75em; }
    .nav button.active { color: var(--secondary); border-bottom: 3px solid var(--secondary); }

    .tab { display: none; padding: 15px; }
    .tab.active { display: block; }

    .item-card { background: #222; padding: 10px; margin-bottom: 8px; border-radius: 8px; border-left: 5px solid; position: relative; }
    .item-card.common { border-color: var(--common); }
    .item-card.uncommon { border-color: var(--uncommon); }
    .item-card.rare { border-color: var(--rare); }
    .item-card.epic { border-color: var(--epic); }
    .item-card.legend { border-color: var(--legend); box-shadow: 0 0 8px rgba(255,193,7,0.4); }

    .btn-main { width:100%; padding:15px; background:var(--primary); font-weight:bold; border-radius:8px; border:none; color:#000; font-size: 1.1em; margin-bottom: 8px; cursor: pointer; }
    #log { height: 120px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.7em; border-radius: 5px; display: flex; flex-direction: column-reverse; }
    .btn-action { padding: 8px 10px; border-radius: 4px; border: none; background: #444; color: #fff; font-size: 0.75em; cursor: pointer; }
    .btn-lock.active { background: var(--lock); color: #fff; }

    .skill-info { font-size: 0.65em; background: rgba(0,0,0,0.5); padding: 8px; margin-top: 5px; border-radius: 4px; line-height: 1.5; }
    .job-req { font-size: 0.7em; color: var(--danger); }
</style>
</head>
<body>

<div id="control-panel">
    <div class="ctrl-row">
        <label><input type="checkbox" id="checkAuto" onchange="toggleAuto(this.checked)"> オート</label>
        <label><input type="checkbox" id="checkStay" onchange="toggleStay(this.checked)"> 階層維持</label>
        <span style="margin-left:auto">拾う: </span>
        <select id="lootFilter" onchange="p.lootFilter = this.value; save();">
            <option value="common">全部</option>
            <option value="uncommon">UC以上</option>
            <option value="rare">R以上</option>
            <option value="epic">E以上</option>
            <option value="legend">Lのみ</option>
        </select>
    </div>
</div>

<div id="top">
    <div class="status-row">
        <span id="p-main-info">Lv.1 (1F)</span>
        <span id="p-job-info">剣士 Lv.1</span>
    </div>
    <div style="font-size:0.75em; margin-bottom:4px; display:flex; justify-content:space-between;">
        <span id="p-stats">⚔️0 🛡️0</span>
        <span id="p-crit">🎯5%</span>
    </div>
    <div class="bar"><div id="hp" class="fill"></div></div>
    <div class="bar"><div id="exp" class="fill"></div></div>
    <div class="bar"><div id="jobexp" class="fill"></div></div>
    <button class="btn-main" id="attackBtn">ATTACK (長押し可)</button>
</div>

<div class="nav">
    <button onclick="showTab('battle', this)" class="active">戦闘</button>
    <button onclick="showTab('equip', this)">装備</button>
    <button onclick="showTab('job', this)">職業</button>
    <button onclick="showTab('move', this)">移動</button>
</div>

<div id="battle" class="tab active">
    <div id="e-name" style="font-weight:bold; font-size:0.9em; margin-bottom:5px; color:var(--danger);"></div>
    <div class="bar" style="height:12px;"><div id="enemyhp" class="fill" style="background:var(--danger)"></div></div>
    <div id="log"></div>
</div>

<div id="equip" class="tab">
    <div style="display:flex; gap:5px; margin-bottom:10px;">
        <button class="btn-action" onclick="setEquipTab('weapon')" style="flex:1">武器</button>
        <button class="btn-action" onclick="setEquipTab('armor')" style="flex:1">防具</button>
        <button class="btn-action" onclick="setEquipTab('acc')" style="flex:1">装飾</button>
    </div>
    <div style="display:flex; gap:5px; margin-bottom:10px;">
        <button class="btn-action" onclick="sortInventory()" style="flex:1; background:var(--secondary); color:#000;">最強順</button>
        <button class="btn-action" onclick="bulkDelete()" style="flex:1; background:var(--danger);">ロック以外売却</button>
    </div>
    <div id="inventory"></div>
</div>

<div id="job" class="tab">
    <div id="jobList"></div>
</div>

<div id="move" class="tab">
    <input type="range" id="floorRange" min="1" max="1" style="width:100%; margin:20px 0;" oninput="updateFloorVal(this.value)">
    <div id="floorVal" style="text-align:center; font-size:2em; font-weight:bold; color:var(--secondary);">1</div>
    <button class="btn-main" onclick="moveFloor()" style="background:var(--secondary)">移動</button>
    <textarea id="saveInput" style="width:100%; background:#000; color:#0f0; font-size:0.6em; margin-top:20px;" rows="4"></textarea>
    <button class="btn-action" onclick="copySaveCode()" style="width:100%; margin-top:5px;">セーブ出力</button>
    <button class="btn-action" onclick="importSave()" style="width:100%; margin-top:5px;">セーブ入力</button>
</div>

<script>
let p, e, autoIdx, longPressIdx;
let currentEquipTab = 'weapon';
const SAVE_KEY = "IR_SERIOUS_V11";

// --- ジョブデータ (下級10, 上級10) ---
const JOBS = {
    // 下級
    "剣士": { req:[], s:["剛腕","剣気","受け","鍛錬","一閃"], eff:["攻撃+5%","攻撃+10%","防御+5%","全ステ+5%","ダメ2倍(5%)"] },
    "騎士": { req:[], s:["防陣","挑発","守護","献身","不屈"], eff:["防御+10%","HP+5%","防御+15%","全ステ+5%","致死回避(5%)"] },
    "魔術師": { req:[], s:["魔力","詠唱","瞑想","波導","爆裂"], eff:["攻撃+10%","クリ+2%","攻撃+15%","全ステ+5%","ダメ2.5倍(5%)"] },
    "盗賊": { req:[], s:["俊足","隠密","強奪","目利き","急所"], eff:["ドロップ+5%","回避+5%","経験値+10%","全ステ+5%","クリ倍率UP"] },
    "弓使い": { req:[], s:["集中","遠射","追撃","心眼","必中"], eff:["クリ+3%","攻撃+5%","追加ダメ","全ステ+5%","必殺撃"] },
    "僧侶": { req:[], s:["祈り","加護","浄化","慈愛","聖域"], eff:["HP+10%","防御+5%","被ダメ-5%","全ステ+5%","自動回復"] },
    "拳闘士": { req:[], s:["練気","連撃","剛拳","回避","旋風"], eff:["速度+5%","攻撃+10%","クリ+5%","全ステ+5%","連撃発生"] },
    "侍": { req:[], s:["切落","見切","波紋","無心","一太刀"], eff:["攻撃+15%","回避+5%","全ステ+5%","全ステ+5%","反撃発生"] },
    "槍使い": { req:[], s:["刺突","貫通","払撃","不動","龍突"], eff:["攻撃+12%","防御+8%","全ステ+5%","全ステ+5%","防御無視"] },
    "冒険者": { req:[], s:["幸運","直感","解体","歩行","万能"], eff:["経験値+15%","ドロップ+10%","全ステ+5%","全ステ+5%","全ステ+10%"] },
    // 上級
    "勇者": { req:["剣士","騎士"], s:["勇気","聖光","英雄","天断","不滅"], eff:["全ステ+10%","全ステ+10%","攻撃+20%","防御+20%","最終ダメ+50%"] },
    "魔王": { req:["魔術師","盗賊"], s:["威圧","虚無","深淵","壊魂","終焉"], eff:["全ステ+10%","攻撃+25%","クリ+10%","全ステ+15%","敵防御0化"] },
    "聖騎士": { req:["騎士","僧侶"], s:["神罰","聖盾","福音","降臨","審判"], eff:["防御+30%","HP+30%","被ダメ-20%","リジェネ","無敵化(3%)"] },
    "忍者": { req:["盗賊","侍"], s:["分身","変わり","手裏剣","隠刀","闇討"], eff:["回避+20%","速度+20%","クリ+15%","即死(1%)","追撃発生"] },
    "賢者": { req:["魔術師","僧侶"], s:["叡智","万象","全知","魔導","究極"], eff:["攻撃+30%","防御+30%","経験値+50%","MP無限","全能"] },
    "銃士": { req:["弓使い","盗賊"], s:["狙撃","速射","装填","跳弾","制圧"], eff:["クリ+20%","攻撃+20%","全ステ+10%","追撃","必中"] },
    "覇王": { req:["戦士","拳闘士"], s:["覇気","粉砕","蹂躙","天壊","無双"], eff:["攻撃+50%","防御-20%","クリ+20%","最終ダメUP","全破壊"] },
    "守護神": { req:["騎士","槍使い"], s:["鉄壁","反撃","天界","拒絶","創世"], eff:["防御+50%","被ダメ-30%","HP+50%","反射","完全防御"] },
    "死神": { req:["盗賊","魔術師"], s:["即死","魂狩","冥府","腐敗","収穫"], eff:["即死(5%)","攻撃+40%","HP吸収","全ステ+20%","魂滅"] },
    "錬金術師": { req:["冒険者","魔術師"], s:["等価","変異","賢石","創造","黄金"], eff:["ドロップ+50%","経験値+50%","全ステ+20%","アイテム強化","黄金化"] }
};

const enemyPre = ["凶暴な", "深淵の", "光る", "汚染された", "幻影の", "呪われた", "震える", "静かな"];
const enemyName = ["スライム", "ゴブリン", "スケルトン", "オーク", "ドラゴン", "魔導士", "ゴーレム", "悪魔"];

const itemPre = [
    {n:"壊れた", m:0.5}, {n:"なまくらな", m:0.8}, {n:"普通の", m:1.0}, {n:"鋭い", m:1.3}, 
    {n:"名匠の", m:1.8}, {n:"魔力の", m:2.2}, {n:"神の", m:3.5}, {n:"呪われた", m:5.0}
];

function init() {
    const saved = localStorage.getItem(SAVE_KEY);
    p = saved ? JSON.parse(saved) : createNewPlayer();
    
    // バグ防止用補完
    Object.keys(JOBS).forEach(j => {
        if(!p.jobLevels[j]) p.jobLevels[j] = 1;
        if(p.jobExp[j] === undefined) p.jobExp[j] = 0;
    });

    const btn = document.getElementById("attackBtn");
    const start = (ev) => { ev.preventDefault(); attack(); longPressIdx = setInterval(attack, 150); };
    const stop = () => clearInterval(longPressIdx);
    btn.addEventListener("mousedown", start); btn.addEventListener("mouseup", stop); btn.addEventListener("mouseleave", stop);
    btn.addEventListener("touchstart", start); btn.addEventListener("touchend", stop);

    if (p.auto) autoIdx = setInterval(attack, 600);
    spawn(); refresh();
}

function createNewPlayer() {
    let base = { floor:1, maxFloor:1, lv:1, exp:0, expMax:40, hp:100, maxhp:100, job:"剣士", inventory:[], weapon:null, armor:null, acc:null, auto:false, stay:false, lootFilter:"common", jobLevels:{}, jobExp:{} };
    Object.keys(JOBS).forEach(j => { base.jobLevels[j] = 1; base.jobExp[j] = 0; });
    return base;
}

function spawn() {
    const f = p.floor;
    const isBoss = f % 50 === 0;
    const pre = enemyPre[Math.floor(Math.random()*enemyPre.length)];
    const name = enemyName[Math.floor(Math.random()*enemyName.length)];
    const mult = isBoss ? 15 : 1;
    e = { name: (isBoss ? "【BOSS】" : "") + pre + name, hp: (20+f*25)*mult, maxhp: (20+f*25)*mult, atk: (5+f*5)*(isBoss?1.5:1), def: (2+f*3)*(isBoss?1.5:1) };
}

function calc() {
    p.maxhp = 100 + (p.lv * 30);
    let a = 10 + (p.lv * 6), d = 5 + (p.lv * 4), c = 5;

    // 装備
    if(p.weapon){ a += p.weapon.atk; }
    if(p.armor){ d += p.armor.def; }
    if(p.acc){ p.maxhp += p.acc.hp; c += p.acc.crit; }

    // 全ジョブパッシブ (Lv10で1つ目の効果が全体適用)
    Object.keys(JOBS).forEach(j => {
        if(p.jobLevels[j] >= 10) {
            // 簡易的に全職Lv10につき全ステ1%UPのパッシブ
            a *= 1.01; d *= 1.01; p.maxhp *= 1.01;
        }
    });

    p.atk = Math.floor(a); p.def = Math.floor(d); p.critRate = c;
}

function attack() {
    if (!e || e.hp <= 0) return;
    calc();
    let dmg = Math.max(1, p.atk - e.def) * (0.9 + Math.random()*0.2) * (Math.random() < p.critRate/100 ? 2 : 1);
    e.hp -= Math.floor(dmg);
    if (e.hp <= 0) return win();
    p.hp -= Math.max(1, e.atk - p.def);
    if (p.hp <= 0) { p.hp = p.maxhp; if(!p.stay) p.floor = Math.max(1, p.floor-5); spawn(); addLog("💀敗北"); }
    refresh();
}

function win() {
    p.exp += Math.floor(20 + p.floor * 2);
    p.jobExp[p.job] += 20;
    if (p.jobExp[p.job] >= p.jobLevels[p.job]*100) { p.jobExp[p.job]=0; p.jobLevels[p.job]++; addLog(`✨Job Up!`); }
    if (p.exp >= p.expMax) { p.lv++; p.exp=0; p.expMax *= 1.3; p.hp=p.maxhp; addLog(`🎉Lv Up!`); }
    if (!p.stay) { p.floor++; if(p.floor > p.maxFloor) p.maxFloor = p.floor; }
    if (Math.random() < 0.4) drop();
    spawn(); save(); refresh();
}

const RARE_LEVELS = { "common": 0, "uncommon": 1, "rare": 2, "epic": 3, "legend": 4 };

function drop() {
    const r = Math.random();
    let rare = r < 0.05 ? "legend" : r < 0.15 ? "epic" : r < 0.3 ? "rare" : r < 0.6 ? "uncommon" : "common";
    
    // フィルタチェック
    if (RARE_LEVELS[rare] < RARE_LEVELS[p.lootFilter]) return;

    const pre = itemPre[Math.floor(Math.random()*itemPre.length)];
    const type = ["weapon", "armor", "acc"][Math.floor(Math.random()*3)];
    const suf = { weapon:"剣", armor:"鎧", acc:"珠" }[type];
    
    // 名称生成（「普通のの剣」にならないように「の」の有無を調整）
    let itemName = pre.n.endsWith("な") || pre.n.endsWith("の") ? `${pre.n}${suf}` : `${pre.n}の${suf}`;

    let item = { 
        id: Date.now()+Math.random(), type, rarity: rare, lock: false, name: itemName,
        atk: type==="weapon" ? Math.floor(p.floor * 5 * pre.m * (0.8+Math.random()*0.4)) : 0,
        def: type==="armor" ? Math.floor(p.floor * 4 * pre.m * (0.8+Math.random()*0.4)) : 0,
        hp: type==="acc" ? Math.floor(p.floor * 30 * pre.m) : 0,
        crit: type==="acc" ? Math.floor(Math.random()*15) : 0
    };
    p.inventory.push(item);
    addLog(`<span style="color:var(--${rare})">🎁${item.name}</span>`);
}

function refresh() {
    calc();
    document.getElementById("p-main-info").innerText = `Lv.${p.lv} (${p.floor}F)`;
    document.getElementById("p-job-info").innerText = `${p.job} Lv.${p.jobLevels[p.job]}`;
    document.getElementById("p-stats").innerText = `⚔️${p.atk} 🛡️${p.def}`;
    document.getElementById("hp").style.width = (p.hp/p.maxhp*100) + "%";
    document.getElementById("exp").style.width = (p.exp/p.expMax*100) + "%";
    document.getElementById("jobexp").style.width = (p.jobExp[p.job]/(p.jobLevels[p.job]*100)*100) + "%";
    document.getElementById("enemyhp").style.width = (e.hp/e.maxhp*100) + "%";
    document.getElementById("e-name").innerText = e.name;
    document.getElementById("maxFloorDisp").innerText = p.maxFloor;
    document.getElementById("floorRange").max = p.maxFloor;

    document.getElementById("inventory").innerHTML = p.inventory.filter(it => it.type === currentEquipTab).map(it => {
        const isEq = (p.weapon?.id===it.id || p.armor?.id===it.id || p.acc?.id===it.id);
        return `<div class="item-card ${it.rarity}">
            <b>${isEq?'[E] ':''}${it.name}</b><br>
            <small>${it.atk?`⚔️${it.atk}`:it.def?`🛡️${it.def}`:`HP${it.hp}`} ${it.crit?`🎯${it.crit}%`:''}</small>
            <div style="margin-top:5px; display:flex; gap:5px;">
                <button class="btn-action" onclick="toggleEquip(${it.id})">${isEq?'外す':'装備'}</button>
                <button class="btn-action btn-lock ${it.lock?'active':''}" onclick="toggleLock(${it.id})">${it.lock?'🔒':'🔓'}</button>
                <button class="btn-action" onclick="deleteItem(${it.id})">売却</button>
            </div>
        </div>`;
    }).join("");

    document.getElementById("jobList").innerHTML = Object.keys(JOBS).map(j => {
        const lv = p.jobLevels[j];
        const can = JOBS[j].req.every(r => (p.jobLevels[r]||0) >= 10);
        return `<div class="item-card" style="opacity:${can?1:0.5}; border-color:${p.job===j?'var(--legend)':'#444'}">
            <b>${j} (Lv.${lv})</b> ${can?'':'<span class="job-req">未解放</span>'}<br>
            ${!can?`<small class="job-req">必要: ${JOBS[j].req.join(",")}(各Lv10)</small>`:''}
            <div class="skill-info">
                ${JOBS[j].s.map((s,i) => `<div style="color:${lv>(i*2)?'var(--primary)':'#666'}">Lv.${i*2} ${s}: ${JOBS[j].eff[i]}</div>`).join("")}
            </div>
            <button class="btn-action" onclick="p.job='${j}';save();refresh();" ${!can||p.job===j?'disabled':''} style="width:100%; margin-top:5px;">転職</button>
        </div>`;
    }).join("");
}

function toggleLock(id) { let it = p.inventory.find(i=>i.id===id); it.lock = !it.lock; save(); refresh(); }
function toggleEquip(id) {
    let it = p.inventory.find(i=>i.id===id);
    if(it.type==="weapon") p.weapon = p.weapon?.id===id?null:it;
    else if(it.type==="armor") p.armor = p.armor?.id===id?null:it;
    else p.acc = p.acc?.id===id?null:it;
    save(); refresh();
}
function deleteItem(id) { p.inventory = p.inventory.filter(i=>i.id!==id); save(); refresh(); }
function bulkDelete() {
    p.inventory = p.inventory.filter(it => it.type !== currentEquipTab || it.lock || p.weapon?.id===it.id || p.armor?.id===it.id || p.acc?.id===it.id);
    save(); refresh();
}
function sortInventory() {
    p.inventory.sort((a,b) => (b.atk+b.def+b.hp+b.crit) - (a.atk+a.def+a.hp+a.crit));
    refresh();
}
function toggleAuto(v) { p.auto=v; clearInterval(autoIdx); if(v) autoIdx=setInterval(attack,600); save(); }
function toggleStay(v) { p.stay=v; save(); }
function save() { localStorage.setItem(SAVE_KEY, JSON.stringify(p)); }
function copySaveCode() { save(); document.getElementById("saveInput").value = btoa(unescape(encodeURIComponent(JSON.stringify(p)))); }
function importSave() { try{ p = JSON.parse(decodeURIComponent(escape(atob(document.getElementById("saveInput").value)))); save(); location.reload(); }catch(e){alert("失敗");} }
function updateFloorVal(v) { document.getElementById("floorVal").innerText = v; }
function moveFloor() { p.floor = parseInt(document.getElementById("floorRange").value); spawn(); save(); refresh(); }
function showTab(id, btn) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}
function addLog(m) {
    const l = document.getElementById("log");
    l.innerHTML += `<div>${m}</div>`;
    if(l.childNodes.length > 15) l.removeChild(l.firstChild);
}
init();
</script>
</body>
</html>
